source_type: python
source_description: "Mooring line material library and safety factor constants from models.py and test_mooring_analysis_unit.py"
extracted_date: "2026-03-16"
legal_scan_passed: true
category: "mooring_risers"
subcategory: "mooring_materials"
equations:
  - name: "Safety factor"
    latex: "SF = MBL / T_{max}"
    description: "Safety factor is minimum breaking load divided by maximum tension"
  - name: "Utilization"
    latex: "U = T_{max} / MBL"
    description: "Utilization is inverse of safety factor"
inputs:
  - name: "Chain diameter"
    symbol: "d"
    unit: "mm"
    test_value: 84.0
  - name: "Chain MBL"
    symbol: "MBL"
    unit: "kN"
    test_value: 8500.0
outputs:
  - name: "Chain weight in water"
    symbol: "w_water"
    unit: "kg/m"
    test_expected: 145.0
    tolerance: 0.1
  - name: "Chain axial stiffness"
    symbol: "EA"
    unit: "kN"
    test_expected: 850000.0
    tolerance: 1.0
worked_examples:
