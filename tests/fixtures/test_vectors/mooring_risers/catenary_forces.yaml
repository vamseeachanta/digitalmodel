equations:
  - name: "Vertical force"
    latex: "F_v = w \\cdot S"
    description: "Vertical force equals weight per length times arc length"
  - name: "Total force from vertical and angle"
    latex: "F = F_v / \\sin(90^\\circ - q)"
    description: "Total force from vertical component and complementary angle"
  - name: "Horizontal force"
    latex: "F_h = F \\cdot \\cos(90^\\circ - q)"
    description: "Horizontal component of total force"
  - name: "Force-based arc length"
    latex: "S = d \\cdot (2 F/w - d)"
    description: "Arc length from applied force, weight, and vertical distance"
  - name: "Force-based horizontal distance"
    latex: "X = (F/w - d) \\cdot \\ln\\left(\\frac{S + F/w}{F/w - d}\\right)"
    description: "Horizontal distance from force-based catenary formulation"
