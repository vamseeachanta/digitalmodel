# Shared physical constants and engineering parameters
# Referenced by all test vector fixture files to avoid duplication
# Sources: standard engineering references and SI definitions

physical_constants:
  - name: "Gravitational acceleration"
    symbol: "g"
    unit: "m/s²"
    value: 9.80665
    source: "SI standard"

  - name: "Seawater density"
    symbol: "rho_sw"
    unit: "kg/m³"
    value: 1025.0
    source: "DNV-RP-C205 §2.3 (typical)"

  - name: "Freshwater density"
    symbol: "rho_fw"
    unit: "kg/m³"
    value: 1000.0
    source: "SI standard"

  - name: "Steel density"
    symbol: "rho_s"
    unit: "kg/m³"
    value: 7850.0
    source: "EN 1991-1-1 Table A.4"

  - name: "Kinematic viscosity of seawater"
    symbol: "nu_sw"
    unit: "m²/s"
    value: 1.19e-6
    source: "DNV-RP-C205 §6.7 (15°C, 35‰ salinity)"

  - name: "Dynamic viscosity of seawater"
    symbol: "mu_sw"
    unit: "Pa·s"
    value: 1.22e-3
    source: "Derived from rho_sw × nu_sw"

material_properties:
  - name: "Structural steel yield stress (S355)"
    symbol: "f_y"
    unit: "MPa"
    value: 355.0
    source: "EN 10025-2 Grade S355"

  - name: "Structural steel Young's modulus"
    symbol: "E"
    unit: "GPa"
    value: 210.0
    source: "EN 1993-1-1 §3.2.6"

  - name: "Steel Poisson's ratio"
    symbol: "nu"
    unit: "-"
    value: 0.3
    source: "EN 1993-1-1 §3.2.6"

  - name: "Structural steel ultimate tensile strength (S355)"
    symbol: "f_u"
    unit: "MPa"
    value: 510.0
    source: "EN 10025-2 Grade S355 (min)"

  - name: "Steel thermal expansion coefficient"
    symbol: "alpha_T"
    unit: "1/°C"
    value: 1.2e-5
    source: "EN 1993-1-2 §3.4.1.1"

hydrodynamic_coefficients:
  - name: "Drag coefficient (smooth cylinder)"
    symbol: "C_d"
    unit: "-"
    value: 1.05
    source: "DNV-RP-C205 Table 6-5 (Re > 5×10⁵)"

  - name: "Inertia coefficient (smooth cylinder)"
    symbol: "C_m"
    unit: "-"
    value: 2.0
    source: "DNV-RP-C205 §6.3 (potential flow)"

  - name: "Added mass coefficient (smooth cylinder)"
    symbol: "C_a"
    unit: "-"
    value: 1.0
    source: "DNV-RP-C205 §6.3 (C_m - 1)"

  - name: "Drag coefficient (rough cylinder)"
    symbol: "C_d_rough"
    unit: "-"
    value: 1.2
    source: "DNV-RP-C205 Table 6-5 (marine growth)"

unit_conversions:
  - name: "Feet to metres"
    factor: 0.3048
  - name: "Inches to metres"
    factor: 0.0254
  - name: "Knots to m/s"
    factor: 0.5144
  - name: "Bar to Pa"
    factor: 1.0e5
  - name: "PSI to Pa"
    factor: 6894.757
  - name: "Nautical miles to metres"
    factor: 1852.0
