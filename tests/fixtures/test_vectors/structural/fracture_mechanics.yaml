  - description: "API RP 1111 burst — 10.75in OD, 0.625in WT, X65, Fd=0.9"
    inputs:
      SMYS_psi: 65000
      SMUS_psi: 77000
      Fd: 0.9
      t_in: 0.625
      D_in: 10.75
    outputs:
      P_burst_psi: 7102.22
    use_as_test: true
  - description: "API STD 2RD burst — 10.75in OD, 1.0in WT, X65, Fd=0.67"
    inputs:
      SMYS_psi: 65000
      SMUS_psi: 77000
      Fd: 0.67
      k: 1.0
      t_in: 1.0
      D_in: 10.75
    outputs:
      P_burst_psi: 19483.6
    use_as_test: true
  - description: "Collapse propagation pressure — 10.75in OD, 0.625in WT, X65, Fp=0.8"
    inputs:
      SMYS_psi: 65000
      t_in: 0.625
      D_in: 10.75
      Fp: 0.8
    outputs:
      t_over_D: 0.05814
      Pp_psi: 2221.44
    use_as_test: true
assumptions:
  - "BS7910:2013 Option 1 FAD curve uses mu parameter from material properties"
  - "Kr at Lr=0 equals 1.0 by definition (no applied load)"
  - "Kr at Lr_max equals 0.0 (cutoff point of FAD curve)"
  - "FAD curve is monotonically non-increasing from Lr=0 to Lr_max"
  - "ASME B31.4 thin-wall/thick-wall transition at D/t = 30"
  - "API RP 1111 thin-wall branch for D/t > 15"
references:
  - "BS 7910:2013+A1:2015, Guide to Methods for Assessing the Acceptability of Flaws in Metallic Structures"
  - "ASME B31.4-2016, Pipeline Transportation Systems for Liquids and Slurries"
  - "ASME B31.8-2016, Gas Transmission and Distribution Piping"
  - "API RP 1111:2009, Design, Construction, Operation and Maintenance of Offshore Hydrocarbon Pipelines"
  - "API STD 2RD:2013, Design of Risers for Floating Production Systems"
