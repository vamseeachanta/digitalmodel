      ct_tolerance_pct: 15.0
    use_as_test: true

  - id: tanker_cb080
    description: "Tanker form Cb=0.80 at Fn=0.172"
    inputs:
      lwl: 205.0
      beam: 32.0
      draft: 12.0
      cb: 0.80
      cm: 0.995
      cwp: 0.88
      cp: 0.804
      lcb_pct: -0.5
      cstern: 0
      speed_ms: 7.72
      abt: 0.0
      tf: 12.0
      at: 0.0
      hb: 0.0
