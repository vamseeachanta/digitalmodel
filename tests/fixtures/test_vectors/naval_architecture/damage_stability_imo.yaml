source_type: standard
source_description: "IMO IS Code 2008 (MSC.267(85)) — Intact Stability Criteria"
extracted_date: "2026-03-20"
legal_scan_passed: true
category: "naval_architecture"
subcategory: "stability"
equations:
  - name: "GZ Area to 30°"
    latex: "A_{30} = \\int_0^{30°} GZ \\, d\\phi \\geq 0.055 \\text{ m·rad}"
    description: "Minimum area under righting lever curve up to 30 degrees"
  - name: "GZ Area to 40°"
    latex: "A_{40} = \\int_0^{40°} GZ \\, d\\phi \\geq 0.09 \\text{ m·rad}"
    description: "Minimum area under righting lever curve up to 40 degrees"
  - name: "GZ at 30°"
    latex: "GZ_{30} \\geq 0.20 \\text{ m}"
    description: "Minimum righting lever at 30 degrees heel"
  - name: "Initial GM"
    latex: "GM_0 \\geq 0.15 \\text{ m}"
    description: "Minimum initial metacentric height"
worked_examples:
  - description: "DDG-51 IMO intact stability check — all criteria pass"
    inputs:
      angles_deg: [0, 10, 20, 30, 40, 50, 60, 70]
      gz_m: [0.0, 0.286, 0.594, 0.945, 1.326, 1.402, 1.219, 0.823]
      gm_m: 1.10
    outputs:
      overall_pass: true
      criteria_passed: 6
    use_as_test: true
  - description: "Lost buoyancy sinkage — 500 m³ compartment, mu=0.85, Awp=2000 m²"
    inputs:
      compartment_volume_m3: 500.0
      permeability: 0.85
      waterplane_area_m2: 2000.0
    outputs:
      sinkage_m: 0.2125
    use_as_test: true
  - description: "Flooded GM — intact GM=1.5, lost I=5000 m⁴, disp=10000 t"
    inputs:
      intact_gm_m: 1.5
      lost_waterplane_inertia_m4: 5000.0
      displacement_tonnes: 10000.0
    outputs:
      flooded_gm_m: 1.0
    use_as_test: true
references:
  - "IMO Resolution MSC.267(85) — International Code on Intact Stability, 2008"
  - "USNA EN400 Principles of Ship Performance, Chapter 4"
