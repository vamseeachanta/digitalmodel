# High-value document sources for test vector extraction
# Generated: 2026-03-16
# Purpose: Catalogue of engineering standards and textbooks with potential test vectors
# Source: Codebase grep of digitalmodel/src, specs/, docs/, config/, knowledge/

domains:
  - name: cathodic_protection
    documents:
      - standard_number: DNV-RP-B401
        title: Cathodic Protection Design
        availability_status: in_repo
        potential_test_vectors: 20
        priority: high
        notes: >
          Four editions available locally (1993, 2005, 2011, 2021). Implemented
          as DNV_RP_B401_offshore route in cathodic_protection.py. Coating
          breakdown formulas, current density tables, anode mass calculations
          all provide worked examples. Standards-inventory.md has full version
          diff analysis. 2021 edition has 4 coating categories with explicit
          formula constants.

      - standard_number: DNV-RP-F103
        title: Cathodic Protection of Submarine Pipelines by Galvanic Anodes
        availability_status: in_repo
        potential_test_vectors: 18
        priority: high
        notes: >
          2003 and 2010 editions locally available. Implemented as
          DNV_RP_F103_2010 class. Eq.1-18 cover current demand, anode mass,
          anode resistance, metallic resistance, attenuation. Table 5-1
          current densities by burial/temperature. Annex 1 coating breakdown
          linear formula. Critical defects G-1 through G-5 were identified
          and fixed per standards-inventory.md audit.

      - standard_number: API RP 1632
        title: Cathodic Protection of Underground Petroleum Storage Tanks
        availability_status: referenced_only
        potential_test_vectors: 8
        priority: medium
        notes: >
          Implemented in api_rp_1632.py. Protection criteria from section 4.2,
          Dwight equation for anode resistance, bare-steel current density.
          Extended by fuel_system_cp.py for impressed current systems.

      - standard_number: ISO 15589-2
        title: "Petroleum and Natural Gas \u2014 CP of Pipeline Transport Systems \u2014 Part 2: Offshore Pipelines"
        availability_status: in_repo
        potential_test_vectors: 10
        priority: medium
        notes: >
          2004 first edition PDF available at /mnt/ace/O&G-Standards/ISO/.
          Implemented in iso_15589_2.py. Table 1 current densities, section
          5.2 protection criteria. Normative annexes A (GACP design), B
          (performance testing), C (monitoring). F103-2010 is explicitly
          based on this standard.

      - standard_number: ABS GN Ships 2017
        title: Guidance Notes on Cathodic Protection of Ships
        availability_status: in_repo
        potential_test_vectors: 12
        priority: high
        notes: >
          Fully implemented as ABS_gn_ships_2018 route. Three anode resistance
          formulas (Dwight slender-offset, long-flush, short-flat-plate).
          Compound exponential coating breakdown model. Tables 3 and 5 for
          current densities. Mass formula and disbonding model all verified
          against standard in code audit.

      - standard_number: ABS GN Offshore 2018
        title: Guidance Notes on Cathodic Protection of Offshore Structures
        availability_status: in_repo
        potential_test_vectors: 8
        priority: medium
        notes: >
          PDF locally available. Not yet implemented in code. Covers FPSOs,
          TLPs, DDCVs, fixed jackets. Tables 1-2 for current densities.
          Section 5 retrofit systems. Gap identified in standards-inventory.md.

      - standard_number: SNAME T&R R-21
        title: Fundamentals of Cathodic Protection for Marine Service
        availability_status: in_repo
        potential_test_vectors: 5
        priority: low
        notes: >
          1976 report. PDF available. Referenced in literature.md.
          Foundational CP concepts for marine service.

  - name: fatigue
    documents:
      - standard_number: DNV-RP-C203
        title: Fatigue Design of Offshore Steel Structures
        availability_status: referenced_only
        potential_test_vectors: 25
        priority: high
        notes: >
          Core standard for fatigue module. 221 S-N curves from 17 standards
          implemented in sn_curves.py. Covers in-air and seawater cathodic
          protection curves. SCF lookup via Efthymiou parametric equations.
          Thickness correction factors. Module rated production maturity.

      - standard_number: BS 7608
        title: Fatigue Design and Assessment of Steel Structures
        availability_status: referenced_only
        potential_test_vectors: 15
        priority: high
        notes: >
          Weld classification S-N curves implemented in sn_curves.py alongside
          DNV-RP-C203. Referenced in structural module spec as external
          dependency. Mission item calls for expanding S-N curve library to
          include BS 7608 latest revision.

      - standard_number: ASTM E1049-85
        title: Standard Practices for Cycle Counting in Fatigue Analysis
        availability_status: referenced_only
        potential_test_vectors: 8
        priority: medium
        notes: >
          Rainflow counting algorithm implemented in rainflow.py. Compliant
          implementation per standard. Module description confirms ASTM
          E1049-85 compliance.

      - standard_number: AWS D1.1
        title: Structural Welding Code - Steel
        availability_status: referenced_only
        potential_test_vectors: 6
        priority: low
        notes: >
          Simplified S-N curves implemented in sn_curves.py. Part of the
          17-standard S-N curve library.

      - standard_number: ISO 19902
        title: Fixed Offshore Structures - Annex O Fatigue
        availability_status: referenced_only
        potential_test_vectors: 8
        priority: medium
        notes: >
          Annex O S-N curves partially implemented in sn_curves.py
