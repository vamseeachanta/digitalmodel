    enabled: true
    order: 1
    description: "Aggregator for all domain test gates"
    depends_on: ["tests-asset-integrity", "tests-cathodic-protection", "tests-citations", "tests-contracts", "tests-field-development", "tests-hydrodynamics-diffraction", "tests-hydrodynamics-passing-ship", "tests-hydrodynamics-other", "tests-infrastructure-core", "tests-infrastructure-other", "tests-marine-engineering", "tests-marine-ops-other", "tests-naval-architecture", "tests-orcaflex", "tests-orcaflex-solver", "tests-solver-smoke", "tests-specialized", "tests-structural", "tests-subsea", "tests-workflows", "tests-misc"]
    aggregate: true
    command: "uv run --no-sources --with-editable . python -c 'print(\"domain test gates complete\")'"
    failure_action: "block"
    warning_action: "report"

  # Gate 2: Code coverage check
  coverage:
    enabled: true
    order: 2
    description: "Repo-wide test coverage requirements"
    depends_on: ["tests-all"]
    thresholds:
      failure: 60.0  # Below 60% = failure
      warning: 80.0  # 60-80% = warning, >=80% = pass
    report_format: "json"
    output_file: "coverage.json"
    failure_action: "block"
    warning_action: "warn"

  # Gate 3: Code quality (complexity + linting)
  quality:
    enabled: true
    order: 3
    description: "Code quality and complexity checks"
    depends_on: ["tests-all", "coverage"]
    tools:
      ruff:
        enabled: true
        complexity_threshold:
          warning: 10  # Cyclomatic complexity >=10 = warning
          failure: 15  # Cyclomatic complexity >=15 = failure
        command: "ruff check"
        config_file: "pyproject.toml"
    failure_action: "block"
    warning_action: "warn"

  # Gate 4: Security scanning
  security:
    enabled: true
    order: 4
    description: "Security vulnerability scanning"
    depends_on: ["tests-all", "coverage", "quality"]
    tools:
      bandit:
        enabled: true
        command: "bandit -r src/ -f json -o reports/bandit_report.json"
        severity_threshold:
          high: "failure"
          medium: "warning"
          low: "report"
        confidence_threshold: "medium"
    failure_action: "block"
    warning_action: "warn"

  # Gate 5: Documentation coverage
  documentation:
    enabled: true
    order: 5
    description: "Documentation coverage check"
    depends_on: []
    threshold: 75.0
    scan_paths:
      - "src/digitalmodel"
    exclude_paths:
      - "*/tests/*"
      - "*/__pycache__/*"
      - "*/migrations/*"
    failure_action: "warn"
    warning_action: "report"

# Global settings
settings:
  execution_mode: "dag"
  cli:
    strict_mode: false
    verbose: true
    show_details: true
    color_output: true
  pre_commit:
    enabled: true
    strict_mode: true
    fail_fast: true
  ci_cd:
    enabled: true
    strict_mode: true
    export_results: true
    result_format: "json"
    result_file: "reports/quality_gates_results.json"
  reporting:
    console:
      enabled: true
      format: "detailed"
    json:
      enabled: true
      output_file: "reports/quality_gates_results.json"
    html:
      enabled: false
      output_file: "reports/quality_gates_report.html"
  paths:
    source_root: "src"
    test_root: "tests"
    reports_dir: "reports"
    cache_dir: ".quality-gates-cache"
  performance:
    cache_enabled: true
    cache_duration: 3600
    parallel_execution: true
    timeout: 600
