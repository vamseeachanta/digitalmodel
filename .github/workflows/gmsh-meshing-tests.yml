name: Gmsh and OpenFOAM Bridge Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "src/digitalmodel/solvers/gmsh_meshing/**"
      - "src/digitalmodel/solvers/openfoam/**"
      - "tests/solvers/gmsh_meshing/**"
      - "tests/solvers/openfoam/**"
      - "tests/scripts/test_cfd_python_install.py"
      - "tests/scripts/test_dispatch_cfd_run.py"
      - "tests/scripts/test_synthetic_tank_3d_smoke.py"
      - "scripts/cfd/run_synthetic_tank_3d_smoke.py"
      - "scripts/setup/dispatch-cfd-run.py"
      - "scripts/setup/provision-cfd-box.sh"
      - "scripts/setup/verify-cfd-box.sh"
      - "examples/cfd/synthetic_l_tank/input.yml"
      - "docs/api/cfd/synthetic-l-tank-smoke.json"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/gmsh-meshing-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/digitalmodel/solvers/gmsh_meshing/**"
      - "src/digitalmodel/solvers/openfoam/**"
      - "tests/solvers/gmsh_meshing/**"
      - "tests/solvers/openfoam/**"
      - "tests/scripts/test_cfd_python_install.py"
      - "tests/scripts/test_dispatch_cfd_run.py"
      - "tests/scripts/test_synthetic_tank_3d_smoke.py"
      - "scripts/cfd/run_synthetic_tank_3d_smoke.py"
      - "scripts/setup/dispatch-cfd-run.py"
      - "scripts/setup/provision-cfd-box.sh"
      - "scripts/setup/verify-cfd-box.sh"
      - "examples/cfd/synthetic_l_tank/input.yml"
      - "docs/api/cfd/synthetic-l-tank-smoke.json"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/gmsh-meshing-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: repos/digitalmodel
    steps:
      - name: Checkout digitalmodel
        uses: actions/checkout@v4
        with:
          path: repos/digitalmodel
          persist-credentials: false

      - name: Checkout pinned assetutilities sibling
        uses: actions/checkout@v4
        with:
          repository: vamseeachanta/assetutilities
          ref: 993f1b5ddc90b56ecf531bedb1b84f5efe096700
          path: repos/assetutilities
          persist-credentials: false

      - name: Verify assetutilities identity
        run: |
          test "$(git -C ../assetutilities rev-parse HEAD)" = \
            "993f1b5ddc90b56ecf531bedb1b84f5efe096700"
          test "$(git -C ../assetutilities rev-parse 'HEAD^{tree}')" = \
            "5f7434fcb3a348a7e04bf9de228e6ce2c49a87cb"

      - name: Install pinned actionlint
        run: >-
          go install github.com/rhysd/actionlint/cmd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca

      - name: Lint workflow syntax
        run: |
          "$(go env GOPATH)/bin/actionlint" .github/workflows/gmsh-meshing-tests.yml

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync locked environment
        run: uv sync --frozen --extra cfd --extra test

      - name: Verify Gmsh import
        run: >-
          uv run --frozen --extra cfd python -c
          'import gmsh; assert gmsh.__version__ == "4.15.1"'

      - name: Validate committed smoke evidence
        run: >-
          uv run --frozen --extra cfd python -m digitalmodel.solvers.openfoam.smoke_evidence docs/api/cfd/synthetic-l-tank-smoke.json

      - name: Run bridge tests
        run: |
          uv run --frozen --extra cfd --extra test pytest -q \
            tests/solvers/gmsh_meshing/test_tank_fixture.py \
            tests/solvers/openfoam/test_poly_mesh_contract.py \
            tests/solvers/openfoam/test_gmsh_bridge.py \
            tests/solvers/openfoam/test_runner.py \
            tests/solvers/openfoam/test_runner_prebuilt.py \
            tests/solvers/openfoam/test_smoke.py \
            tests/solvers/openfoam/validation/test_sloshing_3d.py \
            tests/scripts/test_cfd_python_install.py \
            tests/scripts/test_dispatch_cfd_run.py \
            tests/scripts/test_synthetic_tank_3d_smoke.py

      - name: Lint bridge paths
        run: |
          uv run --frozen --extra cfd ruff check \
            src/digitalmodel/solvers/gmsh_meshing/_msh2_contract.py \
            src/digitalmodel/solvers/gmsh_meshing/_tank_fixture_gmsh.py \
            src/digitalmodel/solvers/gmsh_meshing/tank_fixture.py \
            src/digitalmodel/solvers/openfoam/gmsh_bridge.py \
            src/digitalmodel/solvers/openfoam/poly_mesh_contract.py \
            src/digitalmodel/solvers/openfoam/prebuilt_mesh.py \
            src/digitalmodel/solvers/openfoam/runner.py \
            src/digitalmodel/solvers/openfoam/smoke.py \
            src/digitalmodel/solvers/openfoam/validation/sloshing_3d.py \
            scripts/cfd/run_synthetic_tank_3d_smoke.py \
            scripts/setup/dispatch-cfd-run.py \
            tests/solvers/gmsh_meshing/test_tank_fixture.py \
            tests/solvers/openfoam/test_poly_mesh_contract.py \
            tests/solvers/openfoam/test_gmsh_bridge.py \
            tests/solvers/openfoam/test_runner_prebuilt.py \
            tests/solvers/openfoam/test_smoke.py \
            tests/scripts/test_cfd_python_install.py \
            tests/scripts/test_dispatch_cfd_run.py \
            tests/scripts/test_synthetic_tank_3d_smoke.py
