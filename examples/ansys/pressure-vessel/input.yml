# Pressure-vessel screening FE — dispatchable through the licensed-run lane
# (#940/#948). Runs pv.inp on a licensed MAPDL host:
#   uv run python -m digitalmodel examples/ansys/pressure-vessel/input.yml
# Off-license this fails closed (dry-run fallback raises). Regenerate pv.inp
# with: uv run python examples/ansys/pressure-vessel/build.py
basename: ansys
ansys:
  operation: run_ansys
  script: pv.inp
  output_directory: results
  dry_run: false
