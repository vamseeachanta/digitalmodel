basename: parametric_query

# Instant interpolated weather-window planned-operability (%) from the
# pre-computed atlas (atlases/weather_window). Offline, no licence:
#   uv run python -m digitalmodel examples/workflows/weather-window-atlas-query/input.yml
# The response is workability x window-persistence against a FIXED reference
# hindcast baked into the atlas; the axes are the operation's Hs limit and the
# continuous window it needs. Out-of-range points (outside the atlas grid box)
# escalate to a real, site-hindcast run.
parametric_query:
  atlas: weather_window
  point:
    hs_limit_m: 2.75
    required_window_hours: 30.0
  policy:
    on_out_of_range: escalate
    confidence: required
  output_dir: results

default:
  log_level: INFO
  config:
    overwrite:
      output: true
