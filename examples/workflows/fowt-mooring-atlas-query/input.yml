basename: parametric_query

# Instant interpolated FOWT watch-circle vs dynamic-cable MBR utilisation from the
# pre-computed atlas (atlases/fowt_mooring). Offline, no licence:
#   uv run python -m digitalmodel examples/workflows/fowt-mooring-atlas-query/input.yml
# Out-of-range points (outside the atlas grid box) escalate to a real run.
parametric_query:
  atlas: fowt_mooring
  point:
    watch_circle_radius: 22.0
    mbr_limit_m: 4.5
  policy:
    on_out_of_range: escalate
    confidence: required
  output_dir: results

default:
  log_level: INFO
  config:
    overwrite:
      output: true
