basename: parametric_query

parametric_query:
  atlas: drilling_riser_envelope
  point:
    mode: drilling
    offset_pct: 2.0
    current_speed_mps: 1.0
    hs_m: 3.0
    tp_s: 12.0
  policy:
    on_out_of_range: escalate
    confidence: required
  output_dir: results

default:
  log_level: INFO
  config:
    overwrite:
      output: true
