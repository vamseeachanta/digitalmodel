basename: parametric_query

# Instant operability screen from the pre-computed drilling-riser operability
# atlas (#1283). Exact node-cache of the analytical operating envelope; a marginal
# (band straddles 1.0) or out-of-range point escalates to the exact run.
parametric_query:
  atlas: drilling_riser_operability
  point:
    config: rsu_a__drilling
    offset_pct: 2.0
    current_speed_mps: 0.0
  policy:
    on_out_of_range: escalate
    confidence: required
  output_dir: results

default:
  log_level: INFO
  config:
    overwrite:
      output: true
