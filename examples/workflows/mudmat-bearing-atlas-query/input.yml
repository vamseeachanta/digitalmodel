basename: parametric_query

# Instant interpolated mudmat bearing-capacity governing utilisation from the
# pre-computed atlas (atlases/mudmat_bearing_capacity). Offline, no licence:
#   uv run python -m digitalmodel examples/workflows/mudmat-bearing-atlas-query/input.yml
# Out-of-range points (outside the atlas grid box) escalate to a real run.
parametric_query:
  atlas: mudmat_bearing_capacity
  point:
    vertical_load_kN: 2200.0
    undrained_shear_strength_kpa: 22.0
  policy:
    on_out_of_range: escalate
    confidence: required
  output_dir: results

default:
  log_level: INFO
  config:
    overwrite:
      output: true
