basename: parametric_query

parametric_query:
  atlas: free_span
  point:
    span_length_m: 34.0
    od_m: 0.30
    wt_m: 0.018
    current_velocity_ms: 0.8
  policy:
    on_out_of_range: escalate
    confidence: required
  output_dir: results

default:
  log_level: INFO
  config:
    overwrite:
      output: true
