basename: parametric_query

parametric_query:
  atlas: pile_capacity
  point:
    diameter_m: 1.0
    embedded_length_m: 30.0
    Su_kpa: 60.0
    sigma_v_kpa: 150.0
    demand_kN: 2000.0
    factor_of_safety: 2.0
  policy:
    on_out_of_range: escalate
    confidence: required
  output_dir: results

default:
  log_level: INFO
  config:
    overwrite:
      output: true
