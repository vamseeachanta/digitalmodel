# Standard marine engineering report pack — hull-girder screening demo.
#
# End-to-end demo (pattern of the fatg report-pack example): the
# hull_girder_screening workflow run defined by screening_input.yml produces
# the station / utilisation / summary CSVs committed under data/
# (regenerate with make_demo_data.py), and this config renders them into the
# standard report pack (md + self-contained html + optional pdf + citations
# sidecar + report-layer provenance manifest) with the SF/BM utilisation
# table and the utilisation-margin plot. All document metadata is
# placeholder-only (B0000 / Example Client).
#
# Run: python -m digitalmodel examples/workflows/hull-girder-report-pack/input.yml

basename: report_pack

report_pack:
  document:
    number: B0000-RPT-002-00
    revision: "00"
    title: Example Vessel Hull-Girder Longitudinal Strength Screening
    project: B0000
    client: Example Client
    date: "2026-07-14"
    prepared_by: Author Placeholder
    checked_by: Checker Placeholder
    approved_by: Approver Placeholder
    revision_history:
      - rev: "00"
        date: "2026-07-14"
        description: Issued for internal review
        prepared: AP
        checked: CP
        approved: XP

  sections:
    - title: Introduction and Scope
      content: |
        This report presents a screening-level hull-girder longitudinal
        strength assessment of a representative vessel for one loading
        condition. Still-water shear force and bending moment are integrated
        from the weight and buoyancy distributions, combined with the IACS
        UR S11 closed-form wave bending moment and wave shear force
        envelopes, and screened against total (seagoing) allowable curves at
        the reporting frames. A hull-girder section-modulus check against
        the IACS permissible bending stress (175/k) is included.

        Excluded from scope: the class-approved loading instrument
        calculation, ultimate-strength (UR S11A) assessment, local strength,
        and any class compliance conclusion.
    - title: References and Traceability
      content: |
        - Analysis workflow: `digitalmodel.hull_girder_screening` (still-water
          SF/BM screening with IACS UR S11 wave loads via
          `digitalmodel.naval_architecture.hull_girder_strength`).
        - Report generator: `digitalmodel.report_pack` standard report-pack
          workflow.
        - Cited standards are listed in the References cited section and the
          machine-readable citations sidecar emitted with this pack.
    - title: Design Data and Basis
      content: |
        - Hull: L = 100 m, B = 20 m, block coefficient 0.9 (synthetic
          box-barge textbook fixture; public worked-example form).
        - Loading condition: 10 000 t cargo block over the middle half of
          the hull; box (uniform-waterplane) buoyancy.
        - Wave loads: IACS UR S11 (Rev.7, 2010) 2.2.1-2.2.2 closed-form
          envelopes, unrestricted service.
        - Allowable SF/BM curves and the approved section moduli are
          placeholder project inputs standing in for the approved loading
          manual values.
    - title: Methodology and Assumptions
      content: |
        The screening chain per condition:

        ```text
        q(x) = w(x) - b(x);  SF = integral(q);  BM = integral(SF)
        Mwv(x) = S11 wave bending envelope (hog/sag, distribution factor M)
        Fwv(x) = S11 wave shear envelope (F1/F2 distribution factors)
        total utilisation = |SF + Fwv| / SF_allow,total ;
                            |BM + Mwv| / BM_allow,total  (per sign)
        SM check: sigma = (Msw + Mwv) / Z  vs  175/k (IACS)
        ```

        - Both sign combinations (sw + wave positive, sw + wave negative)
          are screened at every frame; the governing utilisation is
          reported.
        - Cb is floored at 0.60 in the wave-load formulae per UR S11 2.2.1.
        - SCREENING TIER ONLY: results rank and gate loading conditions;
          the class-approved loading instrument governs compliance.
    - title: Results
      content: |
        The total (still-water + wave) SF/BM utilisation at the reporting
        frames and the screening summary are tabulated below; the margin
        plot shows the governing utilisations against the unity limit.
        Case coverage: 1 loading condition, 5 reporting frames, 4 section-
        modulus screens (2 requested engineering rows, 0 extra rows).
    - title: Conclusions and Limitations
      content: |
        All frame utilisations and the section-modulus screens are below
        the unity limit, so the condition passes this screening basis.

        - This is a screening-level estimate against placeholder allowable
          curves, not a loading-manual compliance statement.
        - The S11 wave loads are the unrestricted-service rule envelopes.
        - No class compliance conclusion is drawn.

  results:
    tables:
      - title: Total (still-water + S11 wave) SF/BM utilisation at frames
        csv: data/hull_girder_report_utilization.csv
      - title: Screening summary
        csv: data/hull_girder_report_summary.csv
    figures:
      - title: Total SF/BM utilisation by frame vs unity limit (margin plot)
        path: data/hull_girder_margin_plot.svg

  appendices:
    - letter: A
      title: Reference Documents
      content: |
        Source documents and standards backing the analysis basis (see also
        the References cited section).
    - letter: B
      title: Calculation Records
      files:
        - data/screening_input_hull_girder_stations.csv
        - data/screening_input_hull_girder_utilization.csv
        - data/screening_input_hull_girder_total_utilization.csv
        - data/screening_input_hull_girder_summary.csv

  citations:
    - code_id: IACS-UR-S11
      publisher: IACS
      revision: "Rev.7, 2010"
      section: "2.2.1-2.2.2 wave bending moments and shear forces; distribution factors Figs. 1-3"
      wiki_path: wikis/marine-engineering/wiki/standards/iacs-ur-s11.md
      note: Closed-form wave BM/SF envelopes and the 175/k permissible-stress basis.

  manifest:
    issue: https://github.com/vamseeachanta/digitalmodel/issues/1593
    parent_issue: https://github.com/vamseeachanta/digitalmodel/issues/1585
    project: B0000
    artifact_class: example-report-pack-output
    privacy_classification: public-example
    publishability_decision: public repository example; placeholder metadata only
    input_source_ids:
      - EXAMPLE-HULL-GIRDER-SCREENING-RESULTS
    source_artifacts:
      screening_config: examples/workflows/hull-girder-report-pack/screening_input.yml
      utilization_csv: examples/workflows/hull-girder-report-pack/data/hull_girder_report_utilization.csv
      summary_csv: examples/workflows/hull-girder-report-pack/data/hull_girder_report_summary.csv
    raw_output_path: digitalmodel:examples/workflows/hull-girder-report-pack/data
    final_output_path: digitalmodel:examples/workflows/hull-girder-report-pack/results
    compute_environment: not-recorded

  pdf: auto
  output_dir: results
