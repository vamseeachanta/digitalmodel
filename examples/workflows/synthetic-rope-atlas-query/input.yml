basename: parametric_query

parametric_query:
  atlas: synthetic_rope_mooring_fatigue
  point:
    MBL_kN: 18000.0
    dff: 60.0
    design_life_years: 25.0
    tension_range_bins:
      - {tension_range_kN: 900.0, n_cycles: 600000}
      - {tension_range_kN: 1800.0, n_cycles: 250000}
  policy:
    on_out_of_range: escalate
    confidence: required
  output_dir: results

default:
  log_level: INFO
  config:
    overwrite:
      output: true
