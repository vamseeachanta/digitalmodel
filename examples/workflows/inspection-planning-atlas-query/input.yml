basename: parametric_query

# Instant interpolated API 510/570/653 remaining life (yr) from the pre-computed
# atlas (atlases/inspection_planning). Offline, no licence:
#   uv run python -m digitalmodel examples/workflows/inspection-planning-atlas-query/input.yml
# Out-of-range points (outside the atlas grid box) escalate to a real run.
parametric_query:
  atlas: inspection_planning
  point:
    corrosion_rate_mm_yr: 0.4
    current_wall_thickness_mm: 11.0
  policy:
    on_out_of_range: escalate
    confidence: required
  output_dir: results

default:
  log_level: INFO
  config:
    overwrite:
      output: true
