basename: parametric_query

parametric_query:
  atlas: diffraction_library
  point:
    case: fpso-design-draft
    frequency_rad_s: 0.55
    heading_deg: 30.0
  policy:
    on_out_of_range: escalate
    confidence: required
  output_dir: results

default:
  log_level: INFO
  config:
    overwrite:
      output: true
