basename: parametric_query

# Instant interpolated combined wave+VIV riser fatigue life from the pre-computed
# annual-damage atlas (atlases/riser_fatigue). Offline, no licence:
#   uv run python -m digitalmodel examples/workflows/riser-fatigue-atlas-query/input.yml
# The atlas predicts annual damage over (scf, viv_stress_scale); design_life_years
# and dff are applied at query time. Out-of-range points escalate to a real run.
parametric_query:
  atlas: riser_fatigue
  point:
    scf: 1.15
    viv_stress_scale: 1.0
    design_life_years: 25.0
    dff: 10.0
  policy:
    on_out_of_range: escalate
    confidence: required
  output_dir: results

default:
  log_level: INFO
  config:
    overwrite:
      output: true
