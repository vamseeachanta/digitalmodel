basename: parametric_query

parametric_query:
  atlas: code_check
  point:
    outer_diameter: 0.2731
    wall_thickness: 0.0254
    smys: 448000000.0
    effective_tension_kN: 1200.0
    bending_moment_kNm: 180.0
  policy:
    on_out_of_range: escalate
    confidence: required
  output_dir: results

default:
  log_level: INFO
  config:
    overwrite:
      output: true
