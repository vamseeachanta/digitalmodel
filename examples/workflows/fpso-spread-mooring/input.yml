basename: fpso_mooring

vessel:
  vessel_type: fpso
  length: 250.0
  beam: 42.0
  draft: 16.0
  displacement: 120000.0
  windage_area: 5000.0
  name: registry_fpso

mooring:
  name: registry_fpso_spread_mooring
  water_depth: 150.0
  n_lines: 8
  anchor_radius: 600.0
  fairlead_radius: 35.0
  fairlead_depth: 18.0
  anchor_holding_capacity: 6500.0
  material: chain_r3_102
  line_length: 1200.0
  pretension: 200.0

environment:
  wave_hs: 3.0
  wave_tp: 8.0
  wave_direction: 0.0
  current_speed: 0.3
  current_direction: 0.0
  wind_speed: 8.0
  wind_direction: 0.0
  return_period: 1
  name: benign_screening

analysis:
  load_case: intact_screening
  dynamic_factor: 1.0

output:
  summary_json: examples/workflows/fpso-spread-mooring/results/fpso_spread_mooring_summary.json

default:
  log_level: INFO
  config:
    generate_plots: false
    overwrite:
      output: true
