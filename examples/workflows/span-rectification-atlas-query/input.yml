basename: parametric_query

# Instant interpolated DNV-RP-F105 free-span screening utilisation (as-surveyed
# span / allowable span) from the pre-computed atlas (atlases/span_rectification).
# Offline, no licence:
#   uv run python -m digitalmodel examples/workflows/span-rectification-atlas-query/input.yml
# Out-of-range points (outside the atlas grid box) escalate to a real run.
parametric_query:
  atlas: span_rectification
  point:
    actual_span_length_m: 11.0
    current_velocity_ms: 0.7
  policy:
    on_out_of_range: escalate
    confidence: required
  output_dir: results

default:
  log_level: INFO
  config:
    overwrite:
      output: true
