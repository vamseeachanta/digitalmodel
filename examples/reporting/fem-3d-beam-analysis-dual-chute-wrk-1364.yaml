metadata:
  title: "3D FEM Beam Analysis — GT1R Parachute Mounting Frame — Dual Chute"
  doc_id: "CALC-WRK-1364-DC"
  revision: 1
  date: "2026-03-29"
  author: "Vamsee Achanta"
  status: draft
  project: "GT1R R35 Parachute Frame — WRK-5082"
  change_log:
    - rev: 1
      date: "2026-03-29"
      description: "Dual chute configuration — 250 MPH deployment with two parachutes"

scope:
  objective: |
    Structural assessment of the GT1R R35 parachute mounting frame under dual
    parachute deployment at 250 MPH. This is the most severe loading condition
    for the frame. Determines stress distribution, deformation, and reaction
    forces to evaluate frame adequacy for dual-chute drag racing applications.
  inclusions:
    - "3D beam FEM with 15 nodes, 16 elements, and PIPE cross-section"
    - "Governing load case: 250 MPH dual chute deployment (52,731 lbs)"
    - "Von Mises stress distribution and utilisation ratios"
    - "Reaction forces at all boundary condition nodes (C3 fixed, B1 bolted)"
  exclusions:
    - "Single chute configuration (see CALC-WRK-1364-SC)"
    - "Nonlinear material behavior (elastic analysis only)"
    - "Connection detail stress (bolt holes, weld toes)"
    - "Dynamic/impact loading (static equivalent applied)"
    - "Buckling analysis"
  limitations:
    - "Linear elastic analysis — utilisation > 1.0 indicates yield exceedance, not actual failure"
    - "PIPE section assumes uniform wall thickness; local thinning at bends not modeled"
  validity_range: "Elastic regime only; results valid for utilisation < 1.0"

design_basis:
  codes:
    - "CalculiX v2.21 — Timoshenko beam theory (B32R element)"
    - "ASTM A519 — 4130 chromoly steel mechanical properties"
  design_life: "N/A — single-event deployment loading"
  safety_class: "High — driver safety system"
  environment: "Sea-level atmosphere; ambient temperature (no thermal effects)"

