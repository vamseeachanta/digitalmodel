validation:
  method: |
    Multi-method validation: (1) Independent 3D direct stiffness solver confirms
    exact equilibrium and perfect symmetry. (2) CalculiX cantilever benchmark —
    B32R deflection vs PL³/3EI, 0.35% error.
  test_file: "tests/structural/parachute/test_fem_3d.py"
  result: "All tests pass"
  status: "PASS"

conclusions:
  adequacy: |
    INADEQUATE — The current tube section (1.75" OD × 0.120" wall, 4130 chromoly
    normalized) is severely overstressed under dual chute deployment at 250 MPH.
    Utilisation ratio is 6.66 — the frame exceeds yield capacity by 6.7×.
    This represents the most demanding loading condition for the frame.
  governing_check: |
    250 MPH dual chute — UR = 6.66 (max σ_vm = 419,703 psi vs F_y = 63,000 psi).
    C3 frame rail mounts carry 87.1% of Fy load (22,977 lbs each, |F| = 24,013 lbs each).
    B1 bolted connections carry 12.9% of Fy load (3,388 lbs each, |F| = 9,776 lbs each).
    Load distribution is perfectly symmetric (verified by independent solver to machine precision).
  recommendations:
    - "Current frame section is NOT suitable for dual chute deployment"
    - "Minimum upgrade path: heat-treated 4130 (Fy = 100 ksi) reduces UR to 4.20 — still fails"
    - "Larger section required: 2.0\" OD × 0.188\" wall with HT 4130 for target UR < 1.0"
    - "Check C3 weld capacity for 24,013 lbs reaction force per side"
    - "Check B1 bolt group for 9,776 lbs reaction per side — 6× M8 bolts"
    - "Consider adding diagonal bracing or redesigning load path to reduce C3 concentration"

references:
