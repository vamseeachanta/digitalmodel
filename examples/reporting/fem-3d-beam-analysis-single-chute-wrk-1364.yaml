validation:
  method: |
    Multi-method validation: (1) Independent 3D direct stiffness solver confirms
    exact equilibrium and perfect symmetry. (2) CalculiX cantilever benchmark —
    B32R deflection vs PL³/3EI, 0.35% error.
  test_file: "tests/structural/parachute/test_fem_3d.py"
  result: "All tests pass"
  status: "PASS"

conclusions:
  adequacy: |
    INADEQUATE — The current tube section (1.75" OD × 0.120" wall, 4130 chromoly
    normalized) is significantly overstressed under both single-chute deployment cases.
    Utilisation ratios are 3.07 at 200 MPH and 4.80 at 250 MPH.
    The frame exceeds yield capacity by 3–5× under single parachute deployment.
  governing_check: |
    250 MPH single chute (governing) — UR = 4.80 (max σ_vm = 302,186 psi vs F_y = 63,000 psi).
    C3 frame rail mounts carry 87.1% of Fy load (16,544 lbs each, |F| = 17,289 lbs each).
    B1 bolted connections carry 12.9% of Fy load (2,439 lbs each, |F| = 7,039 lbs each).
    Load distribution is perfectly symmetric (verified by independent solver to machine precision).
  recommendations:
    - "Investigate larger tube section (e.g., 2.0\" OD × 0.188\" wall) or heat-treated 4130 (Fy = 100 ksi)"
    - "Check C3 weld capacity for 17,289 lbs reaction force per side"
    - "Check B1 bolt group for 7,039 lbs reaction per side — 6× M8 bolts"
    - "Consider stiffening at V-strut junction (high stress concentration area)"

references:
