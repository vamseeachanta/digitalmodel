validation:
  method: |
    Multi-method validation: (1) Independent 3D direct stiffness solver confirms
    exact equilibrium (ΣFx=0, ΣFy=F_applied, ΣFz=0 to machine precision) and
    perfect symmetry (all L/R force pairs equal). (2) WRK-1341 cantilever benchmark —
    B32R deflection vs PL³/3EI, 0.35% error. (3) CalculiX B32R+PIPE limitation
    documented — transverse reaction forces (Fx, Fz) unreliable due to reduced
    integration artefact (ΣFx error ~11% of applied load). Reaction forces in this
    report are taken from the independent solver; stress/displacement results from CalculiX.
  test_file: "tests/structural/parachute/test_fem_3d.py"
  result: "All 17 tests pass (12 unit + 4 integration + 1 YAML export)"
  status: "PASS"

conclusions:
  adequacy: |
    INADEQUATE — The current tube section (1.75" OD × 0.120" wall, 4130 chromoly
    normalized) is significantly overstressed under all three drag loading cases.
    Utilisation ratios range from 3.07 (Case 1) to 6.66 (Case 3, governing).
    The frame exceeds yield capacity by 3–7× under parachute deployment loads.
  governing_check: |
    Case 3 (250 MPH dual chute) — UR = 6.66 (max von Mises = 419,703 psi vs Fy = 63,000 psi).
    C3 frame rail mounts carry 87.1% of Fy load (22,977 lbs each, |F| = 24,013 lbs each).
    B1 bolted connections carry 12.9% of Fy load (3,388 lbs each, |F| = 9,776 lbs each).
    Load distribution is perfectly symmetric (verified by independent solver to machine precision).
  recommendations:
    - "Investigate larger tube section (e.g., 2.0\" OD × 0.188\" wall) or heat-treated 4130 (Fy = 100 ksi)"
    - "Check C3 weld capacity for 24,013 lbs reaction force per side (WRK-1367)"
    - "Check B1 bolt group for 9,776 lbs reaction per side — 6× M8 bolts (WRK-1367)"
    - "Consider stiffening at V-strut junction (high stress concentration area)"
    - "For production-grade analysis, use shell or solid FEM elements to avoid B32R+PIPE limitations"

