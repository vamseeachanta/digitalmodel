assumptions:
  - "All connections are rigid (welded joints modeled as continuous beam)"
  - "B1 bolted connections are fully fixed (6-DOF constrained) — conservative"
  - "Load applied as concentrated force at coupler pin node (N2) in -Y direction"
  - "Material is homogeneous, isotropic, and linear elastic"
  - "Cross-section is constant along each member (uniform PIPE)"
  - "Self-weight neglected (small relative to drag forces)"

methodology:
  description: |
    3D beam finite element analysis using two methods:

    1. CalculiX v2.21 with B32R (3-node quadratic, reduced integration) beam
       elements and PIPE cross-section — used for stress/displacement results.
    2. Independent 3D direct stiffness solver with 6-DOF Euler-Bernoulli beam
       elements — used for reaction force verification and load distribution.

    The CalculiX B32R+PIPE formulation was found to produce asymmetric transverse
    reaction forces (Fx, Fz) on this symmetric structure, with ΣFx equilibrium
    error of ~11% of applied load. This is a known reduced-integration artefact.
    Reaction forces are therefore taken from the independent solver, which
    achieves machine-precision equilibrium and exact symmetry.

    Frame geometry: 15 nodes, 16 members from WRK-1360. Boundary conditions:
    C3 nodes (N7, N10) fixed in all 6 DOFs; B1 nodes (N12, N14) fixed in all
    6 DOFs. Drag force applied at coupler pin (N2) in -Y direction.
  standard: "3D Direct Stiffness Method (Euler-Bernoulli beam), verified against CalculiX v2.21"
  equations:
    - id: eq1
      name: "Von Mises Equivalent Stress"
      latex: "\\sigma_{vm} = \\sqrt{\\frac{1}{2}\\left[(\\sigma_{xx}-\\sigma_{yy})^2 + (\\sigma_{yy}-\\sigma_{zz})^2 + (\\sigma_{zz}-\\sigma_{xx})^2 + 6(\\tau_{xy}^2 + \\tau_{yz}^2 + \\tau_{zx}^2)\\right]}"
      description: "Combined stress criterion for ductile materials"
    - id: eq2
      name: "Utilisation Ratio"
      latex: "UR = \\frac{\\sigma_{vm,max}}{F_y}"
      description: "Ratio of maximum von Mises stress to yield strength; UR > 1.0 indicates yield exceedance"
    - id: eq3
      name: "Elastic Strain"
      latex: "\\varepsilon = \\frac{\\sigma}{E}"
      description: "Hooke's law — elastic strain from stress (valid for UR < 1.0)"
    - id: eq4
      name: "Equilibrium Check"
      latex: "\\sum R_y = F_{applied}"
      description: "Sum of vertical reaction forces equals applied load"

calculations:
  - step: 1
    description: "Generate FEM model — 15 frame nodes + 16 mid-nodes = 31 total nodes, 16 B32R elements"
    result: "INP file written with PIPE section (R=0.875 in, t=0.120 in)"
  - step: 2
    description: "Apply boundary conditions — 4 BC nodes (N7, N10, N12, N14) × 6 DOFs = 24 constraints"
    result: "24 single-point constraints applied"
  - step: 3
    description: "Solve 3 load cases via CalculiX ccx v2.21"
    result: "All 3 cases converged in 1 increment (linear static)"
  - step: 4
    description: "Extract results — von Mises stress, displacement, reactions, strains"
    result: "280 integration point results per load case"

