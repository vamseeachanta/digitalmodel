metadata:
  title: "Fetkovich/Blasingame Type Curve Matching"
  doc_id: "CALC-014"
  revision: 1
  date: "2026-03-14"
  author: "Vamsee Achanta"
  reviewer: "Independent Reviewer"
  status: draft
  project: "Unconventional Well Analysis"
  change_log:
    - rev: 1
      date: "2026-03-14"
      description: "Initial calculation"

inputs:
  - name: "Initial Production Rate"
    symbol: "q_i"
    value: 1000
    unit: "bbl/day"
    source: "Production history"
  - name: "Initial Decline Rate"
    symbol: "D_i"
    value: 1.0
    unit: "1/year"
    source: "Type curve match"
  - name: "Arps Hyperbolic Exponent"
    symbol: "b"
    value: 0.5
    unit: "-"
    source: "Fetkovich type curve match"
    notes: "b=0 exponential, b=1 harmonic, 0<b<1 typical for unconventional"
  - name: "Production History Length"
    symbol: "T"
    value: 24
    unit: "months"
    source: "Field data"
  - name: "Number of Data Points"
    symbol: "N"
    value: 24
    unit: "-"
    source: "Monthly production records"

methodology:
  description: |
    Fetkovich type curve matching converts production rate-time data to
    dimensionless coordinates (qDd, tDd) for comparison against analytical
    decline stems. The dimensionless rate qDd = q/qi and dimensionless
    time tDd = Di*t allow production data to be overlaid on pre-computed
    type curves to identify the reservoir depletion character.

    Blasingame extends this by using material balance time tca = Np/q
    (cumulative divided by rate) which linearizes boundary-dominated flow
    and improves late-time matching for unconventional reservoirs.

    The b-factor is identified by nonlinear least-squares fitting of the
    Arps hyperbolic model q(t) = qi / (1 + b*Di*t)^(1/b) using
    scipy.optimize.curve_fit.
  standard: "SPE 4629 (Fetkovich, 1980) / SPE 21513 (Blasingame, 1991)"
  equations:
    - id: 1
      name: "Dimensionless Rate"
      latex: "q_{Dd} = \\frac{q}{q_i}"
      description: "Fetkovich dimensionless decline rate."
      variables:
        - symbol: "q_{Dd}"
          description: "Dimensionless decline rate"
          unit: "-"
        - symbol: "q"
          description: "Current production rate"
          unit: "bbl/day"
        - symbol: "q_i"
          description: "Initial production rate"
          unit: "bbl/day"
    - id: 2
      name: "Dimensionless Time"
      latex: "t_{Dd} = D_i \\cdot t"
      description: "Fetkovich dimensionless decline time."
      variables:
        - symbol: "t_{Dd}"
          description: "Dimensionless decline time"
          unit: "-"
        - symbol: "D_i"
          description: "Initial nominal decline rate"
          unit: "1/year"
        - symbol: "t"
          description: "Time"
          unit: "years"
    - id: 3
      name: "Arps Hyperbolic Decline"
      latex: "q(t) = \\frac{q_i}{(1 + b \\cdot D_i \\cdot t)^{1/b}}"
      description: "General Arps decline equation for hyperbolic model."
      variables:
        - symbol: "b"
          description: "Hyperbolic exponent"
          unit: "-"
    - id: 4
      name: "Material Balance Time"
      latex: "t_{ca} = \\frac{N_p}{q}"
      description: "Blasingame material balance time for boundary-dominated flow."
      variables:
        - symbol: "t_{ca}"
          description: "Material balance time"
          unit: "days"
        - symbol: "N_p"
          description: "Cumulative production"
          unit: "bbl"

outputs:
  - name: "Identified b-factor"
    symbol: "b"
    value: 0.50
    unit: "-"
    notes: "Matched via nonlinear least-squares; true value = 0.50"
  - name: "Identified Decline Rate"
    symbol: "D_i"
    value: 1.00
    unit: "1/year"
    notes: "Recovered from curve fit"
  - name: "Coefficient of Determination"
    symbol: "R^2"
    value: 1.0
    unit: "-"
    pass_fail: "pass"
    limit: 0.95
    notes: "Perfect fit on synthetic data"

assumptions:
  - "Production data represents boundary-dominated flow"
  - "Single-layer homogeneous reservoir (no commingled zones)"
  - "Constant wellbore flowing pressure during decline period"
  - "No operational shutdowns or rate changes during analysis period"
  - "Arps hyperbolic model is appropriate (0 < b < 1)"

references:
  - "Fetkovich, M.J. (1980) SPE 4629 — Decline Curve Analysis Using Type Curves"
  - "Blasingame, T.A. et al. (1991) SPE 21513 — Production Analysis Using Type Curves"
  - "Arps, J.J. (1945) — Analysis of Decline Curves, AIME Trans. 160"

charts:
  - id: "fetkovich_type_curves"
    title: "Fetkovich Type Curve Match"
    type: log_log
    x_label: "Dimensionless Time (tDd)"
    y_label: "Dimensionless Rate (qDd)"
    x_unit: "-"
    y_unit: "-"
    x_scale: log
    y_scale: log
    datasets:
      - label: "b = 0 (Exponential)"
        data: [[0.01, 0.990], [0.1, 0.905], [0.5, 0.607], [1.0, 0.368],
               [2.0, 0.135], [5.0, 0.007]]
        color: "#94a3b8"
      - label: "b = 0.5 (Matched)"
        data: [[0.01, 0.995], [0.1, 0.953], [0.5, 0.816], [1.0, 0.667],
               [2.0, 0.444], [5.0, 0.198]]
        color: "#0f766e"
      - label: "b = 1.0 (Harmonic)"
        data: [[0.01, 0.990], [0.1, 0.909], [0.5, 0.667], [1.0, 0.500],
               [2.0, 0.333], [5.0, 0.167]]
        color: "#94a3b8"
      - label: "Production Data"
        data: [[0.082, 0.955], [0.164, 0.912], [0.247, 0.872], [0.329, 0.833],
               [0.411, 0.797], [0.493, 0.763], [0.575, 0.730], [0.658, 0.699],
               [0.822, 0.642], [0.986, 0.590], [1.151, 0.543], [1.315, 0.500]]
        color: "#b91c1c"

data_tables:
  - id: "match_summary"
    title: "Type Curve Match Results"
    columns:
      - name: "Parameter"
        unit: "-"
      - name: "True Value"
        unit: "-"
      - name: "Identified Value"
        unit: "-"
      - name: "Error"
        unit: "%"
    rows:
      - ["b (Arps exponent)", 0.50, 0.50, 0.0]
      - ["Di (decline rate, 1/yr)", 1.00, 1.00, 0.0]
      - ["qi (initial rate, bbl/d)", 1000, 1000, 0.0]
