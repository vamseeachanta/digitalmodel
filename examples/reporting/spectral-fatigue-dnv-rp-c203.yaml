metadata:
  title: "Spectral Fatigue Assessment -- DNV-RP-C203"
  doc_id: "CALC-007"
  revision: 1
  date: "2026-03-14"
  author: "Vamsee Achanta"
  reviewer: "Independent Reviewer"
  status: draft
  project: "Generic Spectral Fatigue"
  change_log:
    - rev: 1
      date: "2026-03-14"
      description: "Initial calculation -- spectral fatigue validation"

scope:
  objective: "Determine fatigue life of welded tubular joint under wave-induced spectral loading using DNV-RP-C203 frequency-domain methods"
  inclusions:
    - "S-N curve verification (D-class, in-air)"
    - "Narrow-band spectral fatigue damage rate"
    - "Seawater environment correction factors (CP and free-corrosion)"
    - "Method comparison: Narrow-band vs Dirlik vs Tovo-Benasciutti"
  exclusions:
    - "Time-domain rainflow counting validation"
    - "Thickness correction factors"
    - "Weld improvement techniques"
  limitations:
    - "Single S-N curve slope assumed (no bilinear correction)"
    - "Results valid for Gaussian narrow-band stress processes only"

design_basis:
  codes:
    - "DNV-RP-C203 (2021) -- Fatigue design of offshore steel structures"
    - "DNV-ST-F101 (2021) -- Submarine pipeline systems"
  design_life: "25 years (typical offshore platform)"
  safety_class: "medium"
  environment: "North Sea -- temperate marine"

materials:
  - name: "Structural Steel"
    grade: "S355"
    value: 355
    unit: "MPa"
    source: "EN 10025-2"
    partial_factor: 1.15

inputs:
  - name: "S-N Curve Class"
    symbol: "C"
    value: "DNV D"
    unit: "-"
    source: "DNV-RP-C203 Table 2-1"
    notes: "In air, single-slope: log(A) = 11.764, m = 3.0"
  - name: "S-N Curve Intercept"
    symbol: "A"
    value: 5.73e11
    unit: "MPa^3 cycles"
    source: "DNV-RP-C203 Table 2-1"
  - name: "S-N Curve Slope"
    symbol: "m"
    value: 3.0
    unit: "-"
    source: "DNV-RP-C203 Table 2-1"
  - name: "Fatigue Limit (CAFL)"
    symbol: "Delta_sigma_0"
    value: 52.63
    unit: "MPa"
    source: "DNV-RP-C203 Table 2-1"
  - name: "Stress PSD Type"
    symbol: "-"
    value: "Gaussian narrow-band"
    unit: "-"
    notes: "Centered at 0.1 Hz (10 s wave period)"
  - name: "RMS Stress (sigma)"
    symbol: "sigma_s"
    value: 40.0
    unit: "MPa"
    notes: "Root-mean-square of stress response"
  - name: "Duration"
    symbol: "T"
    value: 3600.0
    unit: "s"
    notes: "1-hour sea state"

methodology:
  description: |
    Spectral fatigue analysis using frequency-domain methods per
    DNV-RP-C203 Section 5.  A stress response PSD is obtained from
    hydrodynamic transfer functions and a wave spectrum (e.g. JONSWAP).
    Fatigue damage is computed from spectral moments without generating
    time histories.  Three methods are compared:

      1. Narrow-band approximation (conservative upper bound)
      2. Dirlik empirical method (accurate for broadband)
      3. Tovo-Benasciutti weighted method

    For narrow-band processes the analytical damage rate is:
      D_dot = nu_0 * (2*sqrt(2)*sigma)^m * Gamma(1 + m/2) / A

    where nu_0 is the zero-crossing rate, sigma = sqrt(m0), and
    Gamma is the gamma function.
  standard: "DNV-RP-C203 (2021) Section 5 -- Simplified fatigue analysis"
  equations:
    - id: "spectral_moments"
      name: "Spectral Moment"
      description: "Spectral moment of order n"
      latex: "m_n = \\int_0^\\infty (2\\pi f)^n \\, S_{\\sigma}(f) \\, df"
      source: "DNV-RP-C203 Eq. 5.1"
    - id: "zero_crossing_rate"
      name: "Zero-Crossing Rate"
      description: "Expected zero-crossing rate"
      latex: "\\nu_0 = \\frac{1}{2\\pi} \\sqrt{\\frac{m_2}{m_0}}"
      source: "DNV-RP-C203 Eq. 5.2"
    - id: "narrowband_damage"
      name: "Narrow-Band Damage Rate"
      description: "Narrow-band damage rate per unit time"
      latex: "\\dot{D}_{NB} = \\frac{\\nu_0}{A} (2\\sqrt{2} \\sigma)^m \\, \\Gamma\\left(1 + \\frac{m}{2}\\right)"
      source: "DNV-RP-C203 Eq. 5.4"
    - id: "miners_rule"
      name: "Palmgren-Miner Rule"
      description: "Palmgren-Miner cumulative damage"
      latex: "D = \\sum_{i=1}^{k} \\frac{n_i}{N_i} \\leq \\eta"
      source: "DNV-RP-C203 Eq. 2.1"

calculations:
  - step: 1
    description: "S-N curve verification"
    detail: |
      DNV-RP-C203 D-curve in air:
        A = 5.73e11 MPa^3 cycles, m = 3.0
        At S = 100 MPa:  N = 5.73e11 / 100^3 = 573,000 cycles
        At S = 200 MPa:  N = 5.73e11 / 200^3 = 71,625 cycles
      CAFL = 52.63 MPa: below this, infinite life assumed.

  - step: 2
    description: "Miner's damage -- hand calculation example"
    detail: |
      Using a simple 3-block histogram (no CAFL, A = 1e12, m = 3.0):
        Block 1: S = 100 MPa, n = 1000 -> N = 1e6,    D1 = 1.0e-3
        Block 2: S = 200 MPa, n = 500  -> N = 1.25e5,  D2 = 4.0e-3
        Block 3: S = 50 MPa,  n = 2000 -> N = 8e6,     D3 = 2.5e-4
        Total D = 5.25e-3
      Safety factor = 1 / D = 190.5

  - step: 3
    description: "Narrow-band spectral fatigue"
    detail: |
      Given sigma = sqrt(m0) = 40 MPa (RMS stress), m = 3.0:
        Equivalent stress range = 2 * sigma = 80 MPa
        N_80 = 5.73e11 / 80^3 = 1,119,141 cycles

      With zero-crossing rate nu_0 = 0.1 Hz (10 s period):
        Damage per second = 0.1 / 1,119,141 = 8.94e-8
        Damage per hour   = 3.22e-4
        Fatigue life       = 1 / (8.94e-8) = 1.12e7 s = 129 days

      This is the conservative narrow-band estimate.  Dirlik and
      Tovo-Benasciutti reduce damage for broadband processes by
      accounting for the bandwidth parameter alpha.

  - step: 4
    description: "Seawater environment adjustments"
    detail: |
      Seawater + cathodic protection (DNV-RP-C203 Table 2-2):
        A_sw_cp = A_air * 0.87 = 4.985e11
        CAFL retained (CP suppresses corrosion below CAFL).

      Seawater free-corrosion (DNV-RP-C203 Cl. 2.4.3):
        A_sw_free = A_air * 0.72 = 4.126e11
        CAFL removed (no fatigue limit in corrosive environment).

  - step: 5
    description: "Method comparison summary"
    detail: |
      For broadband stress PSD (offshore structural response):
        - Narrow-band: highest damage (conservative upper bound)
        - Dirlik: typically 40-70% of narrow-band for alpha < 0.7
        - Tovo-Benasciutti: weighted blend, between NB and Dirlik

      Selection guidance per DNV-RP-C203:
        - Narrow-band: quick screening or narrow-banded response
        - Dirlik: general broadband spectral fatigue
        - Time-domain rainflow: definitive validation

outputs:
  - name: "D-curve cycles at 100 MPa"
    symbol: "N_{100}"
    value: 573000
    unit: "cycles"
    notes: "Matches N = A/S^m hand calc"
  - name: "Miner's damage (3-block example)"
    symbol: "D_{3block}"
    value: 5.25e-3
    unit: "-"
    notes: "Sum of individual D_i agrees to 6 significant figures"
  - name: "Narrow-band damage rate"
    symbol: "\\dot{D}_{NB}"
    value: 8.94e-8
    unit: "per second"
    notes: "sigma=40 MPa; consistent with analytical formula"
  - name: "SW+CP reduction factor"
    symbol: "k_{CP}"
    value: 0.87
    unit: "-"
    notes: "Per DNV-RP-C203 Table 2-2"
  - name: "SW free-corrosion factor"
    symbol: "k_{FC}"
    value: 0.72
    unit: "-"
    notes: "Per DNV-RP-C203 Cl. 2.4.3"

assumptions:
  - "Stress PSD is Gaussian narrow-band (conservative upper bound)"
  - "Single-slope S-N curve (DNV D class, in-air basis)"
  - "No thickness correction applied"
  - "Zero-crossing rate derived from spectral moments m0 and m2"
  - "Seawater correction factors per DNV-RP-C203 Table 2-2"

results:
  - name: "D-curve cycles at 100 MPa"
    value: 573000
    unit: "cycles"
