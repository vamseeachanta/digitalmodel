  status: "verified"

conclusions:
  adequacy: "Fatigue life exceeds 25-year design life with DFF=3.0 for all S-N curve classes assessed"
  governing_check: "Narrow-band damage rate at sigma=40 MPa governs (conservative upper bound)"
  compliance_statement: "Analysis compliant with DNV-RP-C203 (2021) Section 5"

validation:
  method: "Comparison against analytical closed-form solutions and published worked examples"
  test_file: "digitalmodel/tests/test_spectral_fatigue_validation.py"
  test_count: 35
  test_categories:
    - "S-N curve reference values (DNV-RP-C203 Table 2-1): 10 tests"
    - "Miner's damage accumulation (hand calculations): 6 tests"
    - "Spectral fatigue methods (NB, Dirlik, TB): 8 tests"
