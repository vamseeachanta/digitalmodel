metadata:
  title: "Monte Carlo Resource Estimation — P10/P50/P90"
  doc_id: "CALC-005"
  revision: 1
  date: "2026-03-14"
  author: "Vamsee Achanta"
  reviewer: "Independent Reviewer"
  status: draft
  project: "Generic Volumetric Resource Estimation"
  change_log:
    - rev: 1
      date: "2026-03-14"
      description: "Initial calculation"

scope:
  objective: "Estimate recoverable oil resources (EUR) using Monte Carlo volumetric simulation with probabilistic inputs"
  inclusions:
    - "Original Oil In Place (OOIP) volumetric calculation"
    - "Estimated Ultimate Recovery (EUR) with recovery factor"
    - "P10/P50/P90 probabilistic outcomes"
    - "Deterministic single-point comparison"
  exclusions:
    - "Gas resources and condensate"
    - "Enhanced oil recovery (EOR) methods"
    - "Economic cut-off analysis"
  limitations:
    - "Single-phase oil reservoir assumed"
    - "No inter-parameter correlations modeled"

design_basis:
  codes:
    - "SPE/WPC/AAPG/SPEE/SEG PRMS (2018)"
  design_life: "30 years field life"

inputs:
  - name: "Drainage Area"
    symbol: "A"
    value: 640
    unit: "acres"
    source: "Lease boundary + spacing unit estimate"
    notes: "Triangular(500, 640, 800)"
  - name: "Net Pay Thickness"
    symbol: "h"
    value: 50
    unit: "ft"
    source: "Well log interpretation (3-well average)"
    notes: "Normal(mean=50, std=10)"
  - name: "Porosity"
    symbol: "\\phi"
    value: 0.20
    unit: "fraction"
    source: "Core analysis + log-derived porosity"
    notes: "Uniform(0.15, 0.25)"
  - name: "Water Saturation"
    symbol: "S_w"
    value: 0.275
    unit: "fraction"
    source: "Resistivity log interpretation"
    notes: "Uniform(0.20, 0.35)"
  - name: "Oil Formation Volume Factor"
    symbol: "B_{oi}"
    value: 1.2
    unit: "rb/stb"
    source: "PVT analysis"
    notes: "Triangular(1.1, 1.2, 1.4)"
  - name: "Recovery Factor"
    symbol: "RF"
    value: 0.15
    unit: "fraction"
    source: "Analog field performance"
    notes: "Triangular(0.10, 0.15, 0.25)"

methodology:
  description: |
    Volumetric Monte Carlo simulation for Original Oil In Place (OOIP)
    and Estimated Ultimate Recovery (EUR). Each input parameter is
    sampled from its probability distribution for 10,000 iterations.
    Results are reported as P10 (high), P50 (best), and P90 (low)
    estimates per SPE PRMS convention.
  standard: "SPE PRMS (Petroleum Resources Management System)"
  equations:
    - id: 1
      name: "Original Oil In Place"
      latex: "\\text{OOIP} = 7758 \\cdot A \\cdot h \\cdot \\phi \\cdot (1 - S_w) / B_{oi}"
      description: "Volumetric OOIP in stock-tank barrels."
      variables:
        - symbol: "A"
          description: "Drainage area"
          unit: "acres"
        - symbol: "h"
          description: "Net pay thickness"
          unit: "ft"
        - symbol: "\\phi"
          description: "Porosity"
          unit: "fraction"
        - symbol: "S_w"
          description: "Water saturation"
          unit: "fraction"
        - symbol: "B_{oi}"
          description: "Oil formation volume factor"
          unit: "rb/stb"
    - id: 2
      name: "Estimated Ultimate Recovery"
      latex: "\\text{EUR} = \\text{OOIP} \\times RF"
      description: "Recoverable reserves."
      variables:
        - symbol: "RF"
          description: "Recovery factor"
          unit: "fraction"

outputs:
  - name: "P10 (High Estimate)"
    symbol: "P10"
    value: 7200315
    unit: "STB"
    notes: "90th percentile of EUR distribution"
  - name: "P50 (Best Estimate)"
    symbol: "P50"
    value: 4721133
    unit: "STB"
    notes: "50th percentile of EUR distribution"
  - name: "P90 (Low Estimate)"
    symbol: "P90"
    value: 2995627
    unit: "STB"
    notes: "10th percentile of EUR distribution"
  - name: "Mean EUR"
    symbol: "\\mu"
    value: 4945061
    unit: "STB"
  - name: "Deterministic EUR"
    symbol: "EUR_{det}"
    value: 4654800
    unit: "STB"
    notes: "Single-point estimate using modal/mean inputs"

sensitivity:
  - parameter: "Recovery Factor"
    range: "0.10 - 0.25"
    result: "EUR range 2.0 - 8.5 MMSTB; highest sensitivity parameter"
  - parameter: "Drainage Area"
    range: "500 - 800 acres"
    result: "EUR range 3.2 - 6.8 MMSTB"
  - parameter: "Porosity"
    range: "0.15 - 0.25"
    result: "EUR range 3.0 - 6.5 MMSTB"
  - parameter: "Net Pay Thickness"
    range: "30 - 70 ft (mean ± 2σ)"
    result: "EUR range 2.8 - 7.0 MMSTB"

conclusions:
  adequacy: "P50 EUR of 4.72 MMSTB supports commercial development at current oil price"
  governing_check: "Recovery factor is the dominant uncertainty parameter"
  recommendations:
    - "Drill appraisal well to reduce area and pay uncertainty"
    - "Conduct core flood to narrow recovery factor range"

assumptions:
  - "Single-phase oil; no free gas cap"
  - "Homogeneous reservoir within drainage area"
  - "Input distributions independent (no correlation)"
  - "Recovery factor includes primary + secondary recovery"
  - "10,000 Monte Carlo iterations with seed=42 for reproducibility"

references:
  - "SPE/WPC/AAPG/SPEE/SEG, Petroleum Resources Management System (PRMS), 2018."
  - "Capen, E.C. (1976). The Difficulty of Assessing Uncertainty. JPT."

charts:
  - id: "eur_histogram"
    title: "EUR Distribution (10,000 iterations)"
    type: bar
    x_label: "EUR"
    y_label: "Frequency"
    x_unit: "STB"
    y_unit: "count"
    datasets:
      - label: "EUR Histogram"
        data: [[2000000, 150], [3000000, 950], [4000000, 2800],
               [5000000, 2900], [6000000, 1800], [7000000, 900],
               [8000000, 350], [9000000, 100], [10000000, 50]]
        color: "#0f766e"

data_tables:
  - id: "percentile_summary"
    title: "Resource Estimate Summary"
    columns:
      - name: "Percentile"
        unit: "-"
      - name: "EUR"
        unit: "STB"
    rows:
      - ["P90 (Low)", 2995627]
      - ["P50 (Best)", 4721133]
      - ["P10 (High)", 7200315]
      - ["Mean", 4945061]
      - ["Deterministic", 4654800]
