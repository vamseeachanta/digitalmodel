metadata:
  title: "SEPD Decline Curve — Unconventional Well Forecast"
  doc_id: "CALC-004"
  revision: 1
  date: "2026-03-14"
  author: "Vamsee Achanta"
  reviewer: "Independent Reviewer"
  status: draft
  project: "Generic Unconventional Production Forecast"
  change_log:
    - rev: 1
      date: "2026-03-14"
      description: "Initial calculation"

inputs:
  - name: "Initial Production Rate"
    symbol: "q_i"
    value: 1000.0
    unit: "bbl/day"
    source: "IP30 average from completion report"
  - name: "Characteristic Time Constant"
    symbol: "\\tau"
    value: 365.0
    unit: "days"
    source: "Type-curve match to analogous Permian wells"
  - name: "Stretching Exponent"
    symbol: "n"
    value: 0.5
    unit: "-"
    source: "Best-fit to 12-month production history"
    notes: "n < 1 characteristic of unconventional shale wells"

methodology:
  description: |
    Stretched Exponential Production Decline (SEPD) model applied to an
    unconventional (shale) well. Unlike Arps hyperbolic decline, SEPD
    avoids the over-prediction of late-life reserves by using a stretched
    exponential kernel that naturally converges to finite EUR without an
    arbitrary b-factor switch. The model is fitted to early production
    history and extrapolated for long-term forecasting.
  standard: "Valko & Lee (2010), SPE 134231"
  equations:
    - id: 1
      name: "SEPD Rate"
      latex: "q(t) = q_i \\exp\\!\\left(-\\left(\\frac{t}{\\tau}\\right)^n\\right)"
      description: "Production rate at time t."
      variables:
        - symbol: "q_i"
          description: "Initial production rate"
          unit: "bbl/day"
        - symbol: "\\tau"
          description: "Characteristic time constant"
          unit: "days"
        - symbol: "n"
          description: "Stretching exponent (0 < n <= 1)"
          unit: "-"
    - id: 2
      name: "SEPD Cumulative Production"
      latex: "Q(t) = \\frac{q_i \\tau}{n}\\,\\Gamma\\!\\left(\\frac{1}{n}\\right)\\,P\\!\\left(\\frac{1}{n},\\left(\\frac{t}{\\tau}\\right)^n\\right)"
      description: "Cumulative production from 0 to t using the lower regularised incomplete gamma function P(a,x)."
      variables:
        - symbol: "Q(t)"
          description: "Cumulative production"
          unit: "bbl"
        - symbol: "\\Gamma"
          description: "Complete gamma function"
          unit: "-"
        - symbol: "P(a,x)"
          description: "Lower regularised incomplete gamma function"
          unit: "-"

outputs:
  - name: "Rate at 1 Year"
    symbol: "q(365)"
    value: 367.88
    unit: "bbl/day"
    notes: "SEPD rate at t = 365 days"
  - name: "Rate at 5 Years"
    symbol: "q(1825)"
    value: 106.88
    unit: "bbl/day"
    notes: "SEPD rate at t = 1825 days"
  - name: "Cumulative at 1 Year"
    symbol: "Q(365)"
    value: 192896
    unit: "bbl"
  - name: "Cumulative at 5 Years"
    symbol: "Q(1825)"
    value: 477519
    unit: "bbl"
  - name: "Estimated Ultimate Recovery"
    symbol: "EUR"
    value: 729635
    unit: "bbl"
    notes: "Cumulative at t = 100 years (convergent)"

assumptions:
  - "Single-phase oil flow; no gas lift or ESP interference"
  - "Constant bottomhole pressure throughout forecast period"
  - "No refracturing or well intervention modelled"
  - "Stretching exponent n is constant over the well life"
  - "Type-curve parameters from analogous Permian Basin completions"

references:
  - "Valko, P.P. & Lee, W.J. (2010). A Better Way to Forecast Production from Unconventional Gas Wells. SPE 134231."
  - "Ilk, D. et al. (2008). Exponential vs. Hyperbolic Decline in Tight Gas Sands. SPE 116731."

charts:
  - id: "rate_forecast"
    title: "SEPD Rate Forecast"
    type: line
    x_label: "Time"
    y_label: "Production Rate"
    x_unit: "days"
    y_unit: "bbl/day"
    datasets:
      - label: "SEPD (n=0.5)"
        data: [[0, 1000], [30, 811], [90, 636], [180, 492],
               [365, 368], [730, 221], [1095, 157],
               [1460, 124], [1825, 107], [2555, 84], [3650, 63]]
        color: "#0f766e"
  - id: "cumulative_forecast"
    title: "SEPD Cumulative Production"
    type: line
    x_label: "Time"
    y_label: "Cumulative Production"
    x_unit: "days"
    y_unit: "bbl"
    datasets:
      - label: "Cumulative"
        data: [[0, 0], [365, 192896], [730, 328368],
               [1095, 408812], [1825, 477519],
               [3650, 606244], [7300, 680693]]
        color: "#1e40af"

