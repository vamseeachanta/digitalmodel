metadata:
  title: "Cathodic Protection Anode Design — DNV-RP-B401 (2011)"
  doc_id: CALC-CP-001
  revision: "0"
  date: "2026-03-15"
  author: "workspace-hub/digitalmodel"
  status: draft

inputs:
  - name: Surface area
    symbol: A_c
    value: 5000
    unit: "m²"
    source: "Project-specific jacket surface area"
  - name: Design life
    symbol: t_f
    value: 25
    unit: years
    source: "Design basis"
  - name: Mean current density
    symbol: i_cm
    value: 0.070
    unit: "A/m²"
    source: "DNV-RP-B401 Table 10-2, Tropical, 0-30m"
  - name: Initial current density
    symbol: i_ci
    value: 0.150
    unit: "A/m²"
    source: "DNV-RP-B401 Table 10-1, Tropical, 0-30m, initial"
  - name: Final current density
    symbol: i_cf
    value: 0.100
    unit: "A/m²"
    source: "DNV-RP-B401 Table 10-1, Tropical, 0-30m, final"
  - name: Coating breakdown factor (initial)
    symbol: f_ci
    value: 0.02
    unit: "-"
    source: "DNV-RP-B401 Table 10-4, Category III, 0-30m: a=0.02, b=0.012 → f_ci = a + 0*b = 0.02"
  - name: Coating breakdown factor (mean)
    symbol: f_cm
    value: 0.17
    unit: "-"
    source: "DNV-RP-B401 §7.3: f_cm = a + b*(t_f/2) = 0.02 + 0.012*(25/2) = 0.17"
  - name: Coating breakdown factor (final)
    symbol: f_cf
    value: 0.32
    unit: "-"
    source: "DNV-RP-B401 §7.3: f_cf = a + b*t_f = 0.02 + 0.012*25 = 0.32"
  - name: Anode electrochemical capacity
    symbol: epsilon
    value: 2000
    unit: "Ah/kg"
    source: "DNV-RP-B401 Table 10-6, Al-based, seawater"
  - name: Anode utilisation factor
    symbol: u_f
    value: 0.90
    unit: "-"
    source: "DNV-RP-B401 Table 10-8, Long slender stand-off (L ≥ 4r)"
  - name: Anode closed circuit potential
    symbol: E_a
    value: -1.05
    unit: V
    source: "DNV-RP-B401 Table 10-6, Al-based, seawater"
  - name: Protection potential
    symbol: E_p
    value: -0.80
    unit: V
    source: "DNV-RP-B401 §5.4.1 vs Ag/AgCl"
  - name: Seawater resistivity
    symbol: rho
    value: 0.30
    unit: "Ω·m"
    source: "DNV-RP-B401 Figure 10-1, ~20°C"

methodology:
  description: >
    Sacrificial anode CP design for an offshore jacket in tropical waters.
    Calculates current demand at initial, mean, and final conditions,
    then sizes anodes to meet the total charge requirement over design life.
  standard: "DNV-RP-B401 (2011) Cathodic Protection Design"
  equations:
    - id: eq1
      name: "Current demand"
      latex: "I_c = A_c \\cdot i_c \\cdot f_c"
      description: "Current demand for coated structure (§7.4.1)"
    - id: eq2
      name: "Total anode mass"
      latex: "M_a = \\frac{I_{cm} \\cdot t_f \\cdot 8760}{u_f \\cdot \\varepsilon}"
      description: "Net anode mass requirement (§7.7.1)"
    - id: eq3
      name: "Coating breakdown factor"
      latex: "f_c(t) = a + b \\cdot t"
      description: "Linear coating breakdown model (§7.3)"
    - id: eq4
      name: "Driving voltage"
      latex: "\\Delta V = |E_p - E_a|"
      description: "Design driving voltage (§5.4.1)"

outputs:
  - name: Initial current demand
    symbol: I_ci
    value: 15.0
    unit: A
    notes: "I_ci = 5000 × 0.150 × 0.02 = 15.0 A"
  - name: Mean current demand
    symbol: I_cm
    value: 59.5
    unit: A
    notes: "I_cm = 5000 × 0.070 × 0.17 = 59.5 A"
  - name: Final current demand
    symbol: I_cf
    value: 160.0
    unit: A
    notes: "I_cf = 5000 × 0.100 × 0.32 = 160.0 A"
  - name: Design driving voltage
    symbol: delta_V
    value: 0.25
    unit: V
    notes: "|−0.80 − (−1.05)| = 0.25 V"
  - name: Total anode mass
    symbol: M_a
    value: 7239.2
    unit: kg
    notes: "M_a = (59.5 × 25 × 8760) / (0.90 × 2000) = 7239.2 kg"

assumptions:
  - "Jacket in tropical waters (surface temperature > 20°C)"
  - "Water depth 0-30m (single zone)"
  - "Coating Category III (high-quality marine coating)"
  - "Al-Zn-In anode alloy (seawater environment)"
  - "Long slender stand-off anode geometry (L ≥ 4r)"
  - "Uniform current density distribution over jacket surface"
  - "Linear coating breakdown model (conservative for high-quality coatings)"

references:
  - "DNV-RP-B401 (2011) Cathodic Protection Design"
  - "DNV-RP-B401 Table 10-1: Design current densities"
  - "DNV-RP-B401 Table 10-2: Mean design current densities"
  - "DNV-RP-B401 Table 10-4: Coating breakdown constants"
  - "DNV-RP-B401 Table 10-6: Anode electrochemical properties"
  - "DNV-RP-B401 Table 10-8: Anode utilisation factors"
