# Weld-fatigue S-N quick-check — Manufacturing demo (issue #818)
#
# First runnable Manufacturing proof. Run with:
#
#   uv run python -m digitalmodel.fatigue.weld_fatigue_quickcheck \
#       examples/manufacturing/weld_fatigue.yml --out-dir examples/manufacturing
#
# Produces weld_fatigue_result.csv and weld_fatigue_result.html next to it.
#
# Standard: DNV-RP-C203 "Fatigue design of offshore steel structures".
#   S-N class parameters: Table 2-1 (in air) / Table 2-2 (seawater w/ CP).
#   Allowable cycles:  N = a * S^(-m),  log10(a) and m per detail class.
#   Thickness effect:  S_corr = S * (t/t_ref)^k, t_ref = 25 mm (Sec. 2.4).
#   Damage:            Palmgren-Miner  D = sum(n_i / N_i).

weld_fatigue:
  # DNV-RP-C203 detail category for a fillet-welded attachment.
  weld_class: F
  # 'air', 'seawater_cp', or 'free_corrosion'.
  environment: seawater_cp
  # Plate thickness (mm). > t_ref (25) so the thickness penalty applies.
  thickness_mm: 40.0
  # Required fatigue design life.
  design_life_years: 25.0
  # Calendar period represented by the histogram below.
  block_years: 1.0
  # Palmgren-Miner allowable damage for PASS.
  allowable_damage: 1.0
  # Stress-range histogram (nominal hot-spot stress range, MPa) for one
  # block_years. A small two-bin spectrum here for the demo; this design
  # passes with comfortable margin (Miner damage ~0.45 over 25 yr).
  histogram:
    - {stress_range: 28.0, cycles: 1.0e5}
    - {stress_range: 16.0, cycles: 1.0e6}
