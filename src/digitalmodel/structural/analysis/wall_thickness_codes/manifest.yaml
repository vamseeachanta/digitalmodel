module: structural/analysis/wall_thickness_codes
description: "Pipeline wall thickness design checks per multiple codes"
primary_standard:
  id: ASME-B31.4
  edition: 2019
  title: "Pipeline Transportation Systems for Liquids and Slurries"
functions:
  - name: AsmeB314Strategy.run_checks
    clause: "S403.2"
    equation: ""
    description: "Run all ASME B31.4 design checks (burst, collapse, propagation)"
    inputs: [PipeGeometry, PipeMaterial, DesignLoads, DesignFactors]
    outputs: [Dict of utilisation results]
  - name: AsmeB314Strategy._check_burst
    clause: "S403.2.1"
    equation: "Barlow formula"
    description: "Internal pressure containment (burst) check"
    inputs: [PipeGeometry, PipeMaterial, DesignLoads]
    outputs: [utilisation, details]
  - name: AsmeB314Strategy._check_collapse
    clause: "S403.2.2"
    equation: "Elastic-plastic transition"
    description: "External pressure collapse check"
    inputs: [PipeGeometry, PipeMaterial, DesignLoads]
    outputs: [utilisation, details]
  - name: AsmeB314Strategy._check_propagation
    clause: "S403.2.3"
    equation: "Battelle/AGA"
    description: "Propagation buckling check"
    inputs: [PipeGeometry, PipeMaterial, DesignLoads]
    outputs: [utilisation, details]
  - name: DnvStF201Strategy.run_checks
    standard: "DNV-ST-F201 (Dynamic risers, 2021)"
    clause: "Sec. 5 (Bursting / pressure containment)"
    equation: "(gamma_dyn*(p_li-p_e)) <= p_b(t1)/(gamma_m*gamma_SC); p_b=(2t/(D-t))*(2/sqrt3)*min(SMYS*alpha_U, SMTS*alpha_U/1.15)"
    description: "Dynamic-riser LRFD pressure-containment (burst) limit state"
    inputs: [PipeGeometry, PipeMaterial, DesignLoads, DesignFactors]
    outputs: [Dict of utilisation results]
    assumed_factors: "alpha_U=0.96, gamma_m=1.15, gamma_dyn=1.0, gamma_SC={low:1.046, normal:1.138, high:1.308} (all overridable)"
