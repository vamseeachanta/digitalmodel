basename: installation_pamphlet

installation_pamphlet:
  # Vessel resolved by case-insensitive substring of the display name in the
  # vessel database (marine_ops.vessel_db.loader.installation_vessels).
  vessel: BokaLift

  # Ordered lift items. Each item either carries an explicit mass_air_te, or
  # references a catalog (source: mudmat|jumper) + id resolved from the catalogs
  # below. Order is preserved (deterministic).
  catalogs:
    mudmats: examples/demos/gtm/data/mudmat_structures.json
    structures: examples/demos/gtm/data/subsea_structures.json
    jumpers: examples/demos/gtm/data/rigid_jumpers.json
  lift_items:
    - {item: "Mudmat (small)", kind: mudmat, source: mudmat, id: MUD-S}
    - {item: "Mudmat (medium)", kind: mudmat, source: mudmat, id: MUD-M}
    - {item: "Subsea structure / template (large)", kind: structure, source: mudmat, id: MUD-L}
    - {item: "Production manifold (250 te)", kind: structure, source: structure, id: MAN-250}
    - {item: "Rigid jumper (short 20 m)", kind: jumper, source: jumper, id: JMP-20}
    - {item: "Rigid jumper (long 100 m)", kind: jumper, source: jumper, id: JMP-100}

  lift_radius_m: 40.0
  daf: 1.30  # DNV-ST-N001 dynamic amplification for subsea lift through splash zone

  # RAO basis: "auto" selects from completed_runs (barge -> drillship -> vessel
  # as licensed runs land), or pin to barge|drillship|fpso|vessel explicitly.
  rao_basis: auto

  operations: [transit, dp_station_keeping, heavy_lift]
  tp_grid_s: [6.0, 8.0, 10.0, 12.0, 14.0, 16.0]
  hs_scatter_limits: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0]

  # Provenance source: an explicit list of completed licensed runs, OR set
  # queue_results_dir to scan a licensed-run queue (finished + returncode 0).
  completed_runs:
    - {run_id: lr_acma_8de9c018adbd, workflow: orcawave-diffraction, input: acma/orcawave-diffraction-fpso/input.yml}
    - {run_id: lr_acma_mooring_001, workflow: mooring-fatigue, input: acma/mooring-fatigue/input.yml}
    - {run_id: lr_acma_weather_001, workflow: weather-window, input: acma/weather-window/input.yml}
  # queue_results_dir: <repo-relative or configured path>/queue/results

  # Deterministic label stamped into the artifact (never datetime.now).
  generated_label: "(generated by installation_pamphlet workflow)"

  output_dir: results

default:
  log_level: INFO
  config:
    overwrite:
      output: true
