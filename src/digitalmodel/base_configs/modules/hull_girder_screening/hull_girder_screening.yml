basename: hull_girder_screening

# Hull-girder longitudinal strength SCREENING: still-water shear force /
# bending moment from a loading condition vs user-supplied allowable curves,
# with an optional section-modulus check. Screening tier only — class
# compliance requires the approved loading instrument. Loading condition,
# buoyancy description and allowables are supplied by the user configuration;
# see docs/domains/ship-design/hull-girder-strength-screening.md.

default:
  log_level: INFO
  config:
    overwrite:
      output: true
