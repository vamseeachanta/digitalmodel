basename: response_spectrum

response_spectrum:
  record:
    file: null
    units: g
    dt_s: null
  baseline:
    method: pre_event_mean
    samples: 20
  filter:
    enabled: true
    band_hz: [0.1, 25.0]
    order: 4
  output_dir: results
  generated_label: "(generated by response_spectrum workflow)"

default:
  log_level: INFO
  config:
    overwrite:
      output: true
