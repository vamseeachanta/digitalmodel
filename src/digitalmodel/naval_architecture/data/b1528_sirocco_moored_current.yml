case:
  id: b1528_sirocco_moored_current_rudder_forces
  description: B1528 SIROCCO moored-current rudder force component sweep at COG.
  aliases:
    - SIROCCO
    - Sirocco
    - Sorrocco
source_pack:
  issue: https://github.com/vamseeachanta/workspace-hub/issues/2569
  source_pack_path: docs/projects/acma/B1528/sirocco-rudder-source-pack.md
moored_current_report:
  issue: https://github.com/vamseeachanta/workspace-hub/issues/2642
static_report:
  issue: https://github.com/vamseeachanta/workspace-hub/issues/2570
  packaged_input: digitalmodel.naval_architecture.data/b1528_sirocco_yaw_moment.yml
time_trace_report:
  issue: https://github.com/vamseeachanta/workspace-hub/issues/2571
  packaged_input: digitalmodel.naval_architecture.data/b1528_sirocco_time_trace.yml
vessel:
  lbp_m: 225.5
  yaw_lever_m: 135.3
rudder:
  area_m2: 44.93956319369854
  span_m: 9.0
scenario:
  vessel_condition: moored
  ship_sog_kn: 0.0
  current_speed_kn: 3.5
  current_relative_direction: aligned_with_centerline
  rudder_angles_deg:
    - 1
    - 2
    - 3
    - 4
    - 5
environment:
  rho_kg_m3: 1025.0
workbook_regression:
  beta: 600.0
  prop_rotation_factor: 1.0
  prop_rotation_factor_logic: Cr=1.0 because the vessel is moored and the requested case excludes propeller-rotation correction.
force_convention:
  x_positive: downstream/current drag direction
  y_positive: port
  z_positive: upward
  yaw_positive: bow_to_port
  yaw_lever_basis: B1528 Barrass workbook family, 0.6 * LBP
outputs:
  directory: outputs/b1528_sirocco/moored_current
  project_pdf_directory: ../acma-projects/B1528/output
limitations:
  - rudder-induced moored-current loads only
  - hull current force, bank effect, tug loads, mooring-line stiffness, current-profile variation, and propeller race are excluded
  - current is assumed aligned with vessel centerline and passes the rudder at 3.5 kn
  - Cr=1.0 is a neutral no-propeller-rotation correction value
  - no class compliance conclusion
