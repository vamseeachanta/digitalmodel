metadata:
  code_id: api-rp-2sm
  publisher: API
  revision: 2001+2007
  source_note: >
    Bounded preliminary-screening defaults for issue 584. Values are local
    engineering defaults with API RP 2SM citation sidecars; project/vendor data
    should replace them for final design.

default_profile_keys:
  polyester: 160mm_polyester
  hmpe: 180mm_hmpe
  nylon: 160mm_nylon
  aramid: 160mm_aramid

fatigue_event_thresholds:
  limited:
    watch: 100000
    critical: 1000000
  moderate:
    watch: 250000
    critical: 2000000
  good:
    watch: 1000000
    critical: 5000000

