    riser_od_in: "21"
    water_depth_band: 1000-1500m
    rig_ref: drillship-16w-wireline
  - rsu_id: RSU-0008
    topology_class: production-scr-hangoff
    stackup_type: component-library
    operation: ""
    riser_od_in: "12.75"
    water_depth_band: ""
    rig_ref: ""
  - rsu_id: RSU-0009
