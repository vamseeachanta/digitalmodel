# ABOUTME: Registry of data, calculation, and analysis needs across all digitalmodel domains
# ABOUTME: Tracks current footprint vs future footprint — what we have, what we need
#
# Purpose: When agents discover documents, datasets, or standards, they check this
# registry to see if it fills a known gap. When modules are built, they register
# data needs here so document-intelligence pipelines can prioritize extraction.
#
# Lifecycle:
#   1. Module author adds a need (status: needed)
#   2. Document-intelligence pipeline finds a source (status: source-identified)
#   3. Data is extracted and validated (status: extracted)
#   4. Data is integrated into module code/tests (status: integrated)
#
# Query examples:
#   status: needed              → what data are we still looking for?
#   domain: naval-architecture  → all needs for naval arch modules
#   type: tabular-data          → all table/curve extraction needs
#   priority: high              → most impactful gaps to fill
#   blocked_modules: [...]      → what modules are waiting on this data?

generated: "2026-03-23"
repo: digitalmodel
description: >
  Data needs registry — tracks what data, calculations, standards, and analysis
  capabilities are needed to complete digitalmodel modules. Each entry defines
  what is needed, why, what module it unblocks, and where to find it.

# ===========================================================================
# Need types:
#   tabular-data    — lookup tables, curves, coefficients
#   worked-example  — textbook problems with known answers (for TDD)
#   standard        — industry standard formulas or procedures
#   calculation     — computational method not yet implemented
#   analysis        — end-to-end analysis workflow
#   dataset         — bulk data for validation or training
# ===========================================================================

