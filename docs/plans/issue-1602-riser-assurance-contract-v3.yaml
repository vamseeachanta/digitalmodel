source_evidence_rules:
  drive_index_hits: private_source_evidence_only
  private_paths_in_tracked_artifacts: forbidden
  private_or_client_data_seeding_public_rows: forbidden
  public_source_capture: requires_URL_date_license_and_content_commitment
  standards_derived_constants: citation_sidecar_required_and_fail_closed
  tracked_resource_intel_disposition: repo_relative_tool_commit_and_abstract_index_names_are_disclosure_safe_but_private_locations_results_and_identifiers_remain_redacted

closeout_rules:
  blockers: [all_scoped_child_plans_owner_approved,
    all_scoped_child_artifacts_no_MAJOR_after_cross_review,
    legal_and_security_scans_pass,
    public_source_record_and_all_three_engineering_envelopes_verified,
    signed_real_solver_receipts_verified, engineering_oracles_pass,
    immutable_HF_release_and_17_configs_verified,
    website_evidence_matches_release]
  excluded_without_fresh_parent_revision: [operating_atlas_population,
    real_time_monitoring_state, alarm_policy, risk_reduction_evidence]
  no_child_implementation_authorized_by_parent_plan: true

public_dataset_surface_extensions:
  add_configs: [floating_hosts, hydrodynamic_responses,
    hydrodynamic_response_values, vessel_motion_boundaries]
  hydrodynamic_responses_shape: record_run_validation_and_fidelity_metadata
  hydrodynamic_response_values_shape: long_form_excitation_RAO_and_matrix_ordinates
  hydrodynamic_response_values_contract:
    canonical_projection_of: [wave_excitation_payload_sha256,
      complex_RAO_payload_sha256,
      hydrodynamic_matrix_payload_sha256]
    canonical_projection_controlled_by: [wave_excitation_component_availability_sha256,
      hydrodynamic_response_value_projection_contract_sha256]
    response_kind: [wave_excitation_total, wave_excitation_froude_krylov,
      wave_excitation_diffraction, complex_RAO, added_mass,
      radiation_damping, restoring]
    required_row_fields: [hydrodynamic_response_id,
      hydrodynamic_response_envelope_sha256, response_kind, dof_row,
      dof_column, frequency_index, frequency_rad_s, heading_index,
      heading_rad, ordinate_real, ordinate_imaginary, ordinate_unit]
    kind_specific_keys:
      complex_RAO: [hydrodynamic_response_id,
        hydrodynamic_response_envelope_sha256, response_kind, dof_row,
        frequency_index, heading_index]
      wave_excitation_total: [hydrodynamic_response_id,
        hydrodynamic_response_envelope_sha256, response_kind, dof_row,
        frequency_index, heading_index]
      wave_excitation_froude_krylov: [hydrodynamic_response_id,
        hydrodynamic_response_envelope_sha256, response_kind, dof_row,
        frequency_index, heading_index]
      wave_excitation_diffraction: [hydrodynamic_response_id,
        hydrodynamic_response_envelope_sha256, response_kind, dof_row,
        frequency_index, heading_index]
      added_mass: [hydrodynamic_response_id,
        hydrodynamic_response_envelope_sha256, response_kind, dof_row,
        dof_column, frequency_index]
      radiation_damping: [hydrodynamic_response_id,
        hydrodynamic_response_envelope_sha256, response_kind, dof_row,
        dof_column, frequency_index]
      restoring: [hydrodynamic_response_id,
        hydrodynamic_response_envelope_sha256, response_kind, dof_row,
        dof_column]
    value_encoding:
      complex_RAO: explicit_SI_real_and_imaginary
      wave_excitation_total: explicit_SI_real_and_imaginary
      wave_excitation_froude_krylov: explicit_SI_real_and_imaginary
      wave_excitation_diffraction: explicit_SI_real_and_imaginary
      added_mass: explicit_SI_real
      radiation_damping: explicit_SI_real
      restoring: explicit_SI_real
    kind_specific_non_null_fields:
      wave_excitation_total: [dof_row, frequency_index, frequency_rad_s,
        heading_index, heading_rad, ordinate_real, ordinate_imaginary,
        ordinate_unit]
      wave_excitation_froude_krylov: [dof_row, frequency_index,
        frequency_rad_s, heading_index, heading_rad, ordinate_real,
        ordinate_imaginary, ordinate_unit]
      wave_excitation_diffraction: [dof_row, frequency_index,
        frequency_rad_s, heading_index, heading_rad, ordinate_real,
        ordinate_imaginary, ordinate_unit]
      complex_RAO: [dof_row, frequency_index, frequency_rad_s,
        heading_index, heading_rad, ordinate_real, ordinate_imaginary,
        ordinate_unit]
      added_mass: [dof_row, dof_column, frequency_index, frequency_rad_s,
        ordinate_real, ordinate_unit]
      radiation_damping: [dof_row, dof_column, frequency_index,
        frequency_rad_s, ordinate_real, ordinate_unit]
      restoring: [dof_row, dof_column, ordinate_real, ordinate_unit]
    kind_specific_null_fields:
      wave_excitation_total: [dof_column]
      wave_excitation_froude_krylov: [dof_column]
      wave_excitation_diffraction: [dof_column]
      complex_RAO: [dof_column]
      added_mass: [heading_index, heading_rad, ordinate_imaginary]
      radiation_damping: [heading_index, heading_rad,
        ordinate_imaginary]
      restoring: [frequency_index, frequency_rad_s, heading_index,
        heading_rad, ordinate_imaginary]
    inapplicable_index_policy: null_not_sentinel_and_excluded_from_kind_key
    canonical_order: response_kind_then_kind_specific_key
    row_projection_contract_sha256: hydrodynamic_response_value_projection_contract_sha256
    projection_contract_binding: required_in_hydrodynamic_response_minimum_bindings
    exact_row_set_commitment: hydrodynamic_response_values_set_sha256
    metadata_value_join: hydrodynamic_response_id_and_envelope_sha256_exact
    disclosure_fields: [source_class, confidentiality_status,
      source_capture_commitment_sha256, source_license_id,
      redistribution_status, public_eligibility_status,
      public_eligibility_evidence_sha256]
    eligible_member_filter: public_eligibility_status_equals_approved
    ineligible_member_route: withheld_sources_with_disposition
    wave_excitation_semantics:
      scope: first_order_linear_excitation_only_mean_drift_and_QTF_excluded
      forward_speed_scope: zero_forward_speed_intrinsic_angular_frequency_only
      angular_frequency_unit: rad_per_s
      response_frame: right_handed_body_fixed_x_forward_y_port_z_up
      heading_definition: azimuth_of_wave_vector_propagation_toward_counterclockwise_from_body_positive_x
      heading_unit_and_range: radians_in_half_open_0_to_2pi
      inherited_global_heading: ENU_clockwise_from_true_north_going_to
      global_to_body_mapping: beta_body_equals_wrap_0_to_2pi_of_body_x_global_azimuth_minus_global_wave_azimuth
      body_x_global_azimuth_binding: incident_wave_basis_sha256
      incident_wave_amplitude_m: "1"
      derived_wave_height_m: "2"
      elevation_phasor: eta_of_x_t_equals_Re_of_a_exp_i_k_dot_x_minus_x_ref_minus_i_omega_t
      wave_vector: k_points_in_heading_propagation_toward_direction
      phase_origin: positive_crest_at_coordinate_frame_reference_point_at_t_zero
      time_convention: Re_of_X_exp_minus_i_omega_t
      applied_load_sign: external_load_on_body_positive_in_canonical_ordered_DOFs
      force_moment_reference: coordinate_frame_reference_point_sha256
      translational_RAO_unit: m_per_m_amplitude
      rotational_RAO_unit: rad_per_m_amplitude
      translational_excitation_unit: N_per_m_amplitude
      moment_excitation_unit: N_m_per_m_amplitude_not_dimensionally_simplified
      total_component: required
      decomposed_components: both_froude_krylov_and_diffraction_or_neither
      component_availability_commitment: wave_excitation_component_availability_sha256
      absent_decomposition_requires: hash_bound_reason_and_backend_capability_disposition
      component_reconciliation: total_equals_froude_krylov_plus_diffraction_within_citation_backed_tolerance
      surface_normal: body_outward_unit_normal_pointing_from_body_into_fluid
      pressure_traction_on_body: minus_complex_pressure_times_body_outward_normal
      translational_generalized_force: minus_surface_integral_of_complex_pressure_times_body_outward_normal_dS
      rotational_generalized_moment: minus_surface_integral_of_r_minus_reference_cross_complex_pressure_times_body_outward_normal_dS
      froude_krylov_definition: use_incident_wave_complex_pressure_in_the_canonical_force_and_moment_integrals_over_bound_mean_wetted_body_surface
      diffraction_definition: use_scattered_wave_complex_pressure_in_the_same_canonical_integrals_over_same_bound_mean_wetted_body_surface
      component_exclusions: hydrostatic_restoring_radiation_mooring_mean_drift_and_QTF
      shared_payload_preimage_equalities: [diffraction_execution_evidence_sha256,
        diffraction_run_configuration_sha256, ordered_DOF_contract_sha256,
        frequency_heading_grid_sha256, incident_wave_basis_sha256,
        unit_contract_sha256, phase_sign_heading_convention_sha256,
        coordinate_frame_reference_point_sha256]
      coherence_coordinate_rule: excitation_RAO_and_matrix_frequency_DOF_heading_coordinates_are_exactly_equal_where_applicable_and_no_interpolation_is_allowed_in_the_oracle
      canonical_impedance: Z_of_omega_equals_minus_omega_squared_times_M_plus_A_of_omega_minus_i_omega_times_B_of_omega_plus_C
      impedance_terms: M_is_bound_rigid_body_mass_matrix_A_is_added_mass_B_is_radiation_damping_C_is_bound_hydrostatic_restoring
      impedance_exclusions: external_damping_mooring_and_other_restoring_forbidden_without_fresh_committed_extension
      impedance_reference: all_6x6_mixed_unit_matrices_transformed_to_bound_coordinate_frame_reference_point_and_ordered_DOF_contract
      response_coherence: same_run_lineage_and_Z_times_RAO_equals_total_excitation_within_citation_backed_tolerance
      complex_encoding: finite_canonical_decimal_real_and_imaginary
      inapplicable_dof_column: null_and_excluded_from_kind_key
    vessel_motion_boundary_projection:
      direct_excitation_fields: forbidden
      consumed_payload: complex_RAO_payload_sha256
      indirect_lineage: hydrodynamic_response_envelope_sha256_covers_excitation_and_invalidates_boundary_on_change
  nested_array_in_single_Parquet_cell: forbidden
  private_hydrodynamic_values_including_RAO_and_excitation: forbidden
  native_diffraction_and_riser_solver_artifacts: forbidden

required_handoff_derivations:
  - {inputs: "engineering_result.floating_host_identity_envelope_sha256[*]",
     output: logical_release.floating_host_identity_set_sha256,
     member_filter: release_approved_result_and_approved_referenced_envelope,
     mode: canonical_distinct_exact_referenced_member_set}
  - {inputs: "engineering_result.hydrodynamic_response_envelope_sha256[*]",
     output: logical_release.hydrodynamic_response_set_sha256,
     member_filter: release_approved_result_and_approved_referenced_envelope,
     mode: canonical_distinct_exact_referenced_member_set}
  - {inputs: "hydrodynamic_response_values.canonical_long_form_row[*]",
     output: logical_release.hydrodynamic_response_values_set_sha256,
     member_filter: parent_envelope_is_in_hydrodynamic_response_set,
     exact_projection_of: [wave_excitation_payload_sha256,
       complex_RAO_payload_sha256,
       hydrodynamic_matrix_payload_sha256,
       wave_excitation_component_availability_sha256,
       hydrodynamic_response_value_projection_contract_sha256],
     mode: canonical_ordered_exact_row_set_commitment}
  - {inputs: "engineering_result.vessel_motion_boundary_envelope_sha256[*]",
     output: logical_release.vessel_motion_boundary_set_sha256,
     member_filter: release_approved_result_and_approved_referenced_envelope,
     mode: canonical_distinct_exact_referenced_member_set}

release_membership_contract:
  member_universes:
    envelope_sets: distinct_envelope_refs_of_release_approved_engineering_results
    hydrodynamic_response_values_set_sha256: canonical_rows_projected_only_from_envelopes_in_logical_release_hydrodynamic_response_set_sha256
  exact_sets: [floating_host_identity_set_sha256,
    hydrodynamic_response_set_sha256, hydrodynamic_response_values_set_sha256,
    vessel_motion_boundary_set_sha256]
  rules:
    envelope_sets: [every_result_reference_is_a_set_member,
      every_set_member_is_referenced_by_a_released_result,
      every_member_resolves_to_approved_producer_envelope]
    hydrodynamic_response_values_set_sha256:
      [every_row_resolves_to_an_envelope_in_logical_release_hydrodynamic_response_set_sha256,
       every_payload_of_each_envelope_in_logical_release_hydrodynamic_response_set_sha256_is_exactly_projected,
       no_omitted_duplicated_or_orphan_row]

normalized_route_handoff_expansion:
  required_branch_equalities: [host_motion_applicability,
    floating_host_id, loading_condition_id, hydrodynamic_response_id,
    floating_host_identity_envelope_sha256,
    hydrodynamic_response_envelope_sha256]
  not_applicable_branch_equalities: [host_motion_applicability,
    reviewed_disposition_sha256]
  selected_branch_by_discriminator:
    required_ref: normalized_route_handoff_expansion.required_branch_equalities
    not_applicable_ref: normalized_route_handoff_expansion.not_applicable_branch_equalities
  drilling_handoff: {from: normalized_case, to: drilling_analysis_request,
    fixed_applicability: required,
    fields_ref: normalized_route_handoff_expansion.required_branch_equalities}
  completion_workover_handoff: {from: normalized_case,
    to: completion_workover_analysis_request,
    fields_ref: normalized_route_handoff_expansion.selected_branch_by_discriminator}
  expansion_rule: selected_branch_expands_by_normalized_case_discriminator

promotion_gate_extensions:
  floater_source_to_host_identity: [public_source_commitment,
    reviewed_IMO_or_fallback_evidence, collision_and_ambiguity_rejected,
    loading_evidence_complete, dimensions_and_mass_properties_complete]
  host_to_hydrodynamic_response: [exact_host_loading_mesh_binding,
    issue_1579_1580_1582_dispositions_resolved,
    issue_1581_resolved_when_interior_or_lid_surfaces_required,
    conventions_explicit, deterministic_run_normalized,
    selected_backend_origin_restoring_units_conformance_passed,
    incident_wave_basis_heading_transform_and_excitation_units_explicit,
    excitation_component_availability_and_projection_contracts_bound,
    shared_execution_and_run_configuration_bound_in_every_payload,
    excitation_total_present_and_components_reconciled_or_dispositioned,
    excitation_RAO_same_run_dynamic_equilibrium_passed,
    validation_and_fidelity_acceptable]
  hydrodynamic_response_to_motion_boundary: [complex_RAO_present,
    direct_excitation_payload_and_basis_fields_absent,
    response_hash_preserves_indirect_excitation_lineage,
    wave_case_bound, analytic_rigid_body_transfer_passed,
    no_extrapolation_or_heading_clamp, coupling_intent_declared,
    motion_domain_is_evidenced_subset_of_hydrodynamic_domain,
    motion_boundary_domain_contains_case]
  normalized_to_bundle: [all_three_envelope_commitments_exactly_equal]
  bundle_to_execution: [boundary_coverage_contains_requested_case,
    unsupported_or_out_of_domain_is_terminal]
  execution_to_result: [receipt_and_result_preserve_all_three_commitments]
  result_to_public: [fidelity_and_limitations_publishable,
    screening_proxy_and_benchmark_never_support_actual_vessel_claim]

non_blocking_consumer_graph:
  excluded_from_parent_closeout_reachability: true
  edges:
    - immutable_HF_publication_receipt -> release_bound_monitoring_baseline
    - versioned_operating_envelope -> release_bound_monitoring_baseline
    - release_bound_monitoring_baseline -> telemetry_identity_mapping
    - telemetry_identity_mapping -> deterministic_monitoring_state
    - deterministic_monitoring_state -> human_in_the_loop_advisory_policy
    - human_in_the_loop_advisory_policy -> risk_reduction_evidence
  required_baseline_equalities: [logical_release_sha256, HF_commit_sha,
    HF_publication_receipt_sha256, floating_host_identity_set_sha256,
    hydrodynamic_response_set_sha256,
    hydrodynamic_response_values_set_sha256,
    vessel_motion_boundary_set_sha256, operating_envelope_version,
    operating_envelope_sha256]
  consumer_owner: https://github.com/vamseeachanta/digitalmodel/issues/1620

non_blocking_follow_on:
  operating_atlas: [https://github.com/vamseeachanta/digitalmodel/issues/1469,
    https://github.com/vamseeachanta/digitalmodel/issues/1612,
    https://github.com/vamseeachanta/digitalmodel/issues/1613]
  monitoring_program: [https://github.com/vamseeachanta/digitalmodel/issues/1617,
    https://github.com/vamseeachanta/digitalmodel/issues/1620,
    https://github.com/vamseeachanta/digitalmodel/issues/1621,
    https://github.com/vamseeachanta/digitalmodel/issues/1622,
    https://github.com/vamseeachanta/digitalmodel/issues/1623,
    https://github.com/vamseeachanta/digitalmodel/issues/1624]
  rule: absent_from_parent_closeout_DAG_without_fresh_revision_review_and_owner_approval
