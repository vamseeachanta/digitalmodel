contract_id: digitalmodel-riser-analysis-parent-interface
contract_version: 2.0.0-draft.2
status: planning-interface
authority_issue: https://github.com/vamseeachanta/digitalmodel/issues/1602
approved_design: 2026-07-16-issue-1602-riser-hf-analysis-design.html

authority:
  parent_owns: [SSOT_architecture, public_private_boundary, global_coordinates,
    cross_repository_DAG, envelope_identity_chain, promotion_gates,
    program_acceptance_and_closeout]
  child_owns: [exact_nested_schemas, field_and_unit_contracts,
    hash_preimages, executable_validators, conformance_fixtures,
    repository_code_tests_receipts_and_reports]
  conflict_rule: parent_invariants_win_child_details_win_within_owned_boundary
  weakening_rule: parent_revision_adversarial_review_and_owner_approval

source_of_truth:
  canonical: solver_neutral_normalized_configuration_and_analysis_case
  evidence_only: source_artifacts_and_legacy_OrcaFlex_models
  derived_only: analysis_requests_bundles_native_models_and_solver_results
  public_projection: release_approved_inputs_results_and_provenance
  forbidden_public: [raw_DAT, raw_YML, raw_YAML, confidential_models,
    licensed_text, machine_paths, user_identifiers, client_identifiers,
    project_identifiers, secrets, private_source_hashes, mock_solver_results]

owners:
  source_repair:
    issue: https://github.com/vamseeachanta/worldenergydata/issues/1046
    outputs: [validated_source_rows]
  normalized_ssot:
    issue: https://github.com/vamseeachanta/digitalmodel/issues/1603
    outputs: [normalized_case_contract, coordinate_adapter,
      deterministic_bundle_builder, public_and_withheld_source_registers]
  drilling_workflow:
    issue: https://github.com/vamseeachanta/digitalmodel/issues/811
    outputs: [drilling_request_matrix]
  analysis_semantics:
    issue: https://github.com/vamseeachanta/digitalmodel/issues/138
    outputs: [analysis_contract, completion_workover_request_matrix,
      execution_authorizer, engineering_validator, engineering_results]
  licensed_execution:
    issue: https://github.com/vamseeachanta/deckhand/issues/568
    outputs: [execution_request_schema_and_verifier, artifact_transport,
      host_execution_agent, signed_execution_receipt]
  public_release:
    issue: https://github.com/vamseeachanta/digitalmodel/issues/1604
    outputs: [public_release, HF_verifier, closeout_verifier_implementation]
  website:
    issue: https://github.com/vamseeachanta/aceengineer-website/issues/75
    outputs: [website_promotion_evidence]
  parent_closeout:
    issue: https://github.com/vamseeachanta/digitalmodel/issues/1602
    outputs: [program_closeout_evidence]

global_coordinate_contract:
  axes: ENU_right_handed
  vertical_datum: mean_water_level
  direction: clockwise_from_true_north_going_to
  vessel_heading: bow_to
  offset_reference: top_connection
  line_result_location: arc_length_from_top_connection
  exact_transform_owner: normalized_ssot
  drilling_role_mapping_owner: drilling_workflow
  rule: drilling_role_mapping_outputs_normalized_fields_and_never_reapplies_global_rotation

interface_envelopes:
  normalized_case:
    producer: normalized_ssot
    consumers: [drilling_workflow, analysis_semantics]
    minimum_bindings: [schema_version, configuration_id,
      configuration_sha256, case_id, case_sha256, source_class,
      public_source_sha256_or_safe_provenance_commitment_sha256,
      confidentiality_status, redistribution_status, units_contract_sha256,
      provenance_envelope_sha256, eligibility_status]
  analysis_contract:
    producer: analysis_semantics
    consumers: [drilling_workflow, normalized_ssot, licensed_execution]
    minimum_bindings: [model_contract_version, model_contract_sha256,
      result_contract_version, result_contract_sha256,
      criteria_contract_sha256, oracle_contract_sha256]
  drilling_analysis_request:
    producer: drilling_workflow
    consumers: [normalized_ssot, analysis_semantics]
    minimum_bindings: [request_contract_version, analysis_request_id,
      request_matrix_sha256, case_id, case_sha256, model_contract_sha256]
  completion_workover_analysis_request:
    producer: analysis_semantics
    consumers: [normalized_ssot]
    minimum_bindings: [request_contract_version, analysis_request_id,
      request_matrix_sha256, case_id, case_sha256, model_contract_sha256]
  deterministic_bundle:
    producer: normalized_ssot
    consumers: [analysis_semantics, licensed_execution]
    minimum_bindings: [case_id, case_sha256, analysis_request_id,
      model_contract_sha256, adapter_version, generator_commit,
      bundle_sha256, file_manifest_sha256]
  execution_request:
    schema_owner: licensed_execution
    producer: analysis_semantics
    consumer: licensed_execution
    minimum_bindings: [request_schema_version, execution_request_id,
      requester_principal_id, requester_signature_sha256,
      authorization_policy_version, authorization_evidence_sha256,
      case_id, case_sha256, analysis_request_id, bundle_sha256,
      model_contract_sha256, requested_solver_stages_sha256]
  execution_receipt:
    producer: licensed_execution
    consumers: [analysis_semantics, public_release]
    minimum_bindings: [receipt_schema_version, execution_request_id,
      case_id, case_sha256, analysis_request_id, bundle_sha256,
      model_contract_sha256, native_model_sha256, solver_identity_sha256,
      semantic_status, raw_solver_payload_sha256, host_signer_principal_id,
      execution_receipt_sha256]
  engineering_result:
    producer: analysis_semantics
    consumers: [public_release]
    minimum_bindings: [result_contract_version, case_id, case_sha256,
      execution_receipt_sha256, raw_solver_payload_sha256,
      engineering_result_payload_sha256, quantity_unit_contract_sha256,
      criterion_citation_contract_sha256, completeness_status,
      oracle_status, oracle_evidence_sha256, licensed_validation_evidence_sha256]
  public_release:
    producer: public_release
    consumers: [website, parent_closeout]
    minimum_bindings: [release_contract_version, release_id,
      release_envelope_sha256, release_manifest_sha256, HF_repo_id,
      HF_commit_sha, public_eligibility_evidence_sha256,
      clean_room_evidence_set_sha256, authenticated_join_evidence_sha256,
      decoded_leak_ruleset_sha256, decoded_leak_evidence_sha256,
      legal_license_evidence_sha256, exact_tree_evidence_sha256,
      semantic_remote_evidence_sha256]
  website_evidence:
    producer: website
    consumers: [parent_closeout]
    minimum_bindings: [website_commit_sha, deployment_id, public_route,
      release_envelope_sha256, HF_commit_sha, rendered_release_id,
      online_verification_sha256]
  program_closeout:
    implementation_owner: public_release
    producer: parent_closeout
    minimum_bindings: [closeout_schema_version, parent_plan_sha,
      child_approval_set_sha256, no_MAJOR_review_set_sha256,
      landed_ancestry_set_sha256, test_legal_completeness_set_sha256,
      clean_room_revalidation_sha256, public_release_envelope_sha256,
      website_evidence_sha256, scope_reduction_approval_set_sha256,
      program_closeout_evidence_sha256]

identity_chain:
  order: [approved_public_source_or_safe_provenance_commitment,
    normalized_configuration, analysis_case, analysis_request,
    deterministic_bundle, native_model, raw_solver_payload,
    execution_receipt, engineering_result_payload, public_release, HF_commit]
  acyclic_rule: receipt_signs_preexisting_raw_payload_and_engineering_result_is_derived_only_after_receipt_verification
  downstream_rule: every_consumer_verifies_all_received_upstream_bindings

milestone_DAG:
  edges:
    - source_ready -> normalized_case_ready
    - normalized_case_ready -> analysis_contract_ready
    - analysis_contract_ready -> drilling_requests_ready
    - analysis_contract_ready -> completion_workover_requests_ready
    - drilling_requests_ready -> deterministic_bundles_ready
    - completion_workover_requests_ready -> deterministic_bundles_ready
    - deterministic_bundles_ready -> execution_authorized
    - execution_authorized -> licensed_execution_complete
    - licensed_execution_complete -> licensed_engineering_validation_complete
    - licensed_engineering_validation_complete -> public_release_complete
    - public_release_complete -> website_complete
    - website_complete -> parent_closeout_complete
  milestone_owners:
    source_ready: source_repair
    normalized_case_ready: normalized_ssot
    analysis_contract_ready: analysis_semantics
    drilling_requests_ready: drilling_workflow
    completion_workover_requests_ready: analysis_semantics
    deterministic_bundles_ready: normalized_ssot
    execution_authorized: analysis_semantics
    licensed_execution_complete: licensed_execution
    licensed_engineering_validation_complete: analysis_semantics
    public_release_complete: public_release
    website_complete: website
    parent_closeout_complete: parent_closeout

compatibility:
  producer: emit_owned_reviewed_schema_version_and_envelope_hashes
  consumer: reject_unknown_or_unapproved_schema_version
  silent_field_drop_or_default: prohibited
  child_schema_change: child_review_and_owner_approval
  interface_change: parent_review_and_owner_approval

public_dataset_surfaces:
  required_configs: [source_registry, transformations, citations, criteria,
    clean_room_reviews, field_lineage, riser_components,
    riser_configurations, analysis_cases, execution_attestations,
    strength_results, operability_results, withheld_sources]
  exact_schema_owner: public_release

promotion_gates:
  source_to_normalized: [source_classified, provenance_complete,
    legal_license_approved, units_explicit, malformed_rows_rejected]
  normalized_to_bundle: [approved_schema, complete_mapping,
    no_implicit_defaults, deterministic_generation, bundle_hash_verified]
  bundle_to_execution: [independently_authorized_request, safe_transport,
    licensed_host_preflight, real_canary, bundle_and_model_contract_binding]
  execution_to_result: [real_OrcaFlex, requested_stages_complete,
    semantic_success, signed_receipt, raw_payload_hash_verified,
    engineering_completeness_and_oracles_pass]
  result_to_public: [public_sources_or_safe_commitments_only,
    clean_room_synthetic_evidence, authenticated_case_execution_result_criterion_joins,
    per_row_provenance_units_case_and_calculation_or_solver_provenance,
    decoded_leak_and_legal_license_evidence]
  public_to_website: [immutable_HF_commit_verified,
    exact_configs_rows_and_release_ID_verified, full_dataset_card_verified,
    limitations_and_withholding_documented]
  program_closeout: [child_approvals, no_MAJOR_artifact_reviews,
    landed_remote_ancestry, tests_legal_completeness, clean_room_revalidation,
    HF_and_website_live_evidence, owner_approved_scope_reductions_only]

global_invariants:
  - stable_engineering_identity_excludes_time_bearing_eligibility_attestations
  - raw_completion_models_never_enter_public_artifacts
  - public_completion_inputs_are_clean_room_synthetic
  - clean_room_author_uses_public_only_allowlist_and_records_declaration_citations_rationale_and_environment_evidence
  - clean_room_review_uses_distinct_authorized_principal_and_private_confidentiality_evidence
  - mock_or_reduced_order_results_never_claim_OrcaFlex_provenance
  - private_inputs_may_support_private_QA_but_never_seed_public_rows
  - every_eligible_family_has_baseline_statics_and_complete_requested_outputs
  - fatigue_is_outside_v1_public_release_but_may_remain_later_analysis_scope
  - every_public_row_has_schema_version_units_case_ID_and_calculation_or_solver_provenance
  - every_public_provenance_value_is_approved_for_disclosure
  - standards_identifiers_and_citations_may_publish_but_licensed_text_may_not
  - HF_publication_is_atomic_optimistic_and_exact_tree
  - website_never_renders_withheld_columns_or_values

child_acceptance_obligations:
  normalized_ssot: [complete_hash_bound_lineage, exhaustive_field_disposition,
    closed_physical_inputs, collision_free_IDs, deterministic_hashes,
    no_implicit_defaults, cross_platform_vectors,
    reconstructable_clean_room_evidence, coordinate_current_conformance]
  drilling_workflow: [complete_drilling_request_matrix,
    normalized_role_mapping_without_duplicate_rotation,
    private_corpus_never_seeds_public_rows]
  analysis_semantics: [pre_run_model_and_result_contracts,
    complete_completion_workover_request_matrix, independent_request_authorization,
    quantity_location_stage_matrix, criteria_citations_units_formulas,
    stable_result_IDs, required_cardinality, independent_oracles,
    post_run_licensed_validation, fatigue_excluded_from_v1]
  licensed_execution: [request_schema_and_signature_verification,
    nonce_TTL_revocation, real_canary, host_license_proof,
    safe_transport, signed_semantic_success_and_raw_result_receipt]
  public_release: [exact_13_config_schemas,
    authenticated_cross_layer_joins, per_row_parent_evidence,
    ruleset_bound_decoded_leak_scan, atomic_exact_tree_HF_publication,
    head_bound_remote_semantics,
    dataset_card_configs_rows_units_nulls_licenses_sources_limitations_and_issue_linked_withholding,
    executable_typed_parent_closeout_verifier]
  website: [both_render_paths_remove_withheld_values,
    fail_closed_online_validation, exact_release_and_HF_commit_binding,
    exact_commit_deployment_and_route_proof]

parent_acceptance_evidence:
  issue_tree: every_child_issue_URL_and_final_state
  approvals: owner_approval_bound_to_each_reviewed_child_plan
  reviews: final_no_MAJOR_plan_and_artifact_reviews_per_child
  repositories: landed_commit_and_remote_main_ancestry_per_child
  quality: test_legal_and_completeness_evidence_per_child
  engineering: signed_execution_receipts_and_oracle_evidence
  release: public_eligibility_join_leak_legal_HF_tree_and_semantic_evidence
  website: exact_release_envelope_HF_commit_deployment_and_route_evidence
  closeout: parent_invoked_verifier_result_and_owner_approved_scope_reductions

planning_validation:
  required_owners: [source_repair, normalized_ssot, drilling_workflow,
    analysis_semantics, licensed_execution, public_release, website,
    parent_closeout]
  required_envelopes: [normalized_case, analysis_contract,
    drilling_analysis_request, completion_workover_analysis_request,
    deterministic_bundle, execution_request, execution_receipt,
    engineering_result, public_release, website_evidence, program_closeout]
  require_DAG_acyclic: true
  require_execution_request_producer_differs_from_receipt_producer: true
  require_identity_chain_nodes_have_owner_or_envelope_binding: true
  require_security_evidence_in_release_and_closeout: true
  no_child_implementation_authorized_by_parent_alone: true
