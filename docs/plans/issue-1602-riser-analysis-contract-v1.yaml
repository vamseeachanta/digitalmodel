contract_id: digitalmodel-riser-analysis
contract_version: 1.0.0-draft.3
status: planning-contract
authority_issue: https://github.com/vamseeachanta/digitalmodel/issues/1602

normative_files:
  meta_schema: issue-1602-riser-contract-meta-schema-v1.json
  normalized_schema: issue-1602-riser-normalized-schema-v1.yaml
  release_schema: issue-1602-riser-release-schema-v1.yaml
  protocol: issue-1602-riser-protocol-v1.yaml

authority_order:
  - meta_schema validates artifact structure
  - normalized_schema defines the solver-neutral SSOT and every field disposition
  - release_schema defines exact public configs, enums, keys, constraints, and joins
  - protocol defines canonical identity, transformations, trust, transport,
    solver proof, engineering verification, publication, website, and closeout
  - parent plan defines issue ownership, dependency order, and approval gates

compatibility:
  producer_rule: emit_exact_contract_version
  consumer_rule: accept_exact_reviewed_contract_version_only
  unknown_field_enum_or_version: reject
  weakening_change: parent_plan_revision_review_and_user_approval
  child_tightening_change: child_plan_review_and_user_approval

source_of_truth:
  canonical: solver-neutral-normalized-configuration-and-analysis-case
  evidence_only: source-artifacts-and-legacy-OrcaFlex-models
  derived_only: generated-OrcaFlex-bundle-and-native-model
  publication: public-safe-release-projection-not-run-ledger
  forbidden_public_inputs: [raw_DAT, raw_YML, raw_YAML, confidential_models,
    licensed_text, machine_paths, client_identifiers, mock_solver_results]

identity_chain:
  - source_sha256
  - normalized_input_sha256
  - case_sha256
  - bundle_sha256
  - model_sha256
  - execution_id
  - result_payload_sha256
  - attestation_sha256
  - result_envelope_sha256
  - release_id
  - release_manifest_sha256
  - hf_commit_sha

release:
  repo_id: aceengineer/digitalmodel-riser-analysis
  split: train
  required_configs:
    - source_registry
    - transformations
    - citations
    - clean_room_reviews
    - field_lineage
    - riser_components
    - riser_configurations
    - analysis_cases
    - execution_attestations
    - strength_results
    - operability_results
    - withheld_sources

gates:
  source: [orthogonal_governance, source_hash, complete_lineage,
    provenance, legal, license, redistribution]
  synthetic: [signed_author_attestation, public_allowlist_hash,
    distinct_signed_private_reviewer, method_and_corpus_hash, pass]
  model: [clean_stage, transitive_closure, zero_validator_errors,
    real_OrcFxAPI_load, object_graph, units, native_save]
  execution: [safe_artifact_transport, signed_host_attestation, fresh_canary,
    current_license, lock_covers_run, semantic_success]
  engineering: [family_output_matrix, complete_case_cardinality,
    applicable_independent_oracles, deterministic_sampling, citations]
  release: [meta_schema_and_semantic_validation, decoded_leak_scan,
    exact_remote_tree, optimistic_concurrency, head_bound_viewer_semantics]
  website: [withheld_removed_in_both_renderers, fail_closed_online_validation,
    refresh, tests, build, exact_commit_deploy, public_route_release_id]
  closeout: [authoritative_live_retrieval, approvals, no_MAJOR_reviews,
    landed_ancestry, tests, legal, completeness, HF, website, clean_room]

validation_commands:
  structural: >-
    uvx check-jsonschema --schemafile
    docs/plans/issue-1602-riser-contract-meta-schema-v1.json
    docs/plans/issue-1602-riser-normalized-schema-v1.yaml
    docs/plans/issue-1602-riser-release-schema-v1.yaml
    docs/plans/issue-1602-riser-protocol-v1.yaml
  semantic: >-
    Child implementation will TDD a validator that executes every semantic check
    listed in protocol.contract_validation before any producer/consumer code.

planning_assertions:
  every_normative_file_under_400_lines: true
  every_release_primary_key_nonnullable_and_nonfloat: true
  all_release_enum_domains_closed: true
  all_release_joins_declared: true
  all_normalized_fields_have_disposition: true
  identity_construction_order_acyclic: true
  self_hash_cycles_absent: true
  website_withheld_columns_never_render: true
