protocol_id: digitalmodel-riser-analysis-protocol
protocol_version: 1.0.0-draft.4
normalized_schema: issue-1602-riser-normalized-schema-v1.yaml
release_schema: issue-1602-riser-release-schema-v1.yaml

canonical_decimal_v1:
  input: unicode-decimal-string-no-exponent
  parse: arbitrary-precision-base10
  reject: [leading_plus, exponent, NaN, Infinity]
  normalize: [remove_leading_integer_zeroes_leaving_one_zero,
    remove_all_trailing_fraction_zeroes, remove_decimal_point_when_fraction_empty,
    map_every_zero_representation_to_0, retain_minus_only_when_value_less_than_zero]
  examples: {'0001.2300': '1.23', '1.00': '1', '-0.0': '0', '0.0100': '0.01'}
  rounding: prohibited

hash_framing_v1:
  function: SHA-256
  domain_bytes: NFC_UTF8_of_exact_ASCII_domain_literal
  digest_bytes: raw_32_byte_SHA256_output
  digest_text: lowercase_64_character_hex_of_digest_bytes
  framed_hash_bytes: SHA256(domain_bytes + 0x00 + uint64_be(payload_byte_length) + payload_bytes)
  framed_hash_text: lowercase_hex(framed_hash_bytes)
  hash_id: prefix + '_' + framed_hash_text(domain_literal, payload_bytes)
  logical_payload_bytes: UTF8(RFC8785_JCS(NFC_strings_and_canonical_decimal_strings))
  set_order: ascending_unsigned_lexicographic_UTF8_bytes_of_each_canonical_scalar_or_primary_key
  ordered_array_order: preserved_exactly
  table_order: ascending_unsigned_lexicographic_UTF8_config_name_then_primary_key_tuple
  collection_payload: JCS_object_with_exact_table_name_primary_key_and_sorted_record_array
  file_manifest_order: ascending_unsigned_lexicographic_UTF8_relative_POSIX_path
  contract_version_tuple: [1.0.0-draft.4, ENU_TRUE_NORTH_1.0.0,
    canonical_decimal_v1, hash_framing_v1, transport_zip_store_v1]
  absent_vs_null: distinct_and_never_coerced
  binary_float_in_logical_preimage: prohibited

identity_construction_order:
  - transformation_id = hash_id('trn', 'ACE_RISER_TRANSFORMATION_V1', transformation_without_id)
  - citation_id = hash_id('cit', 'ACE_RISER_CITATION_V1', citation_without_id)
  - source_id = hash_id('src', 'ACE_RISER_SOURCE_V1', source_without_id)
  - criterion_id = hash_id('crt', 'ACE_RISER_CRITERION_V1', criterion_without_id_with_resolved_citation_and_method)
  - component_seed_sha256 = framed_hash_text('ACE_RISER_COMPONENT_SEED_V1', component_engineering_fields_without_ids_or_lineage)
  - component_lineage_ids = hash_each_lineage_against_component_seed_sha256
  - component_instance_id = hash_id('cmp', 'ACE_RISER_COMPONENT_V1', component_seed_plus_sorted_complete_lineage_ids_plus_resolved_criteria)
  - connection_id = hash_id('con', 'ACE_RISER_CONNECTION_V1', connection_without_id_with_resolved_component_ids_and_criterion)
  - configuration_seed_sha256 = framed_hash_text('ACE_RISER_CONFIGURATION_SEED_V1', configuration_engineering_core_with_component_and_connection_ids_without_lineage_attestations_or_final_id)
  - configuration_lineage_ids = hash_each_lineage_against_configuration_seed_sha256
  - author_claim_sha256 = framed_hash_text('ACE_RISER_CLEAN_AUTHOR_V1', signed_author_claims_including_configuration_seed_and_issued_at_without_id_or_signature)
  - author_attestation_id = 'caa_' + author_claim_sha256
  - review_claim_sha256 = framed_hash_text('ACE_RISER_CLEAN_REVIEW_V1', signed_review_claims_including_configuration_seed_blinded_evidence_and_issued_at_without_id_or_signature)
  - review_attestation_id = 'car_' + review_claim_sha256
  - lineage_set_sha256 = framed_hash_text('ACE_RISER_LINEAGE_SET_V1', sorted_complete_configuration_and_component_lineage_rows)
  - public_evidence_envelope_sha256 = framed_hash_text('ACE_RISER_CLEAN_PUBLIC_ENVELOPE_V1', public_claim_hashes_key_ids_signatures_timestamps_method_verdict_reason_blinded_commitment)
  - normalized_input_sha256 = framed_hash_text('ACE_RISER_CONFIGURATION_V1', configuration_seed_plus_lineage_set_sha256_plus_clean_room_claim_hashes_or_explicit_nulls)
  - configuration_id = 'cfg_' + normalized_input_sha256
  - case_seed_sha256 = framed_hash_text('ACE_RISER_CASE_SEED_V1', complete_case_fields_without_case_id_or_case_lineage)
  - case_lineage_ids = hash_each_lineage_against_case_seed_sha256
  - case_sha256 = framed_hash_text('ACE_RISER_CASE_V1', case_seed_plus_configuration_id_resolved_criteria_and_sorted_case_lineage_ids)
  - case_id = 'case_' + case_sha256
  - matrix_point_id = hash_id('mp', 'ACE_RISER_MATRIX_POINT_V1', case_id_plus_environment_loading_coordinates)
  - bundle_sha256 = framed_hash_text('ACE_RISER_BUNDLE_V1', sorted_model_input_file_manifest_without_bundle_hash)
  - model_sha256 = framed_hash_text('ACE_RISER_NATIVE_MODEL_V1', exact_solver_native_saved_model_bytes)
  - execution_id = hash_id('exe', 'ACE_RISER_EXECUTION_REQUEST_V1', signed_request_nonce_expiry_case_bundle_model_code_workflow_hashes)
  - strength_result_id = hash_id('str', 'ACE_RISER_STRENGTH_ROW_V1', strength_row_without_id_or_result_payload_hash)
  - operability_result_id = hash_id('opr', 'ACE_RISER_OPERABILITY_ROW_V1', operability_row_without_id_or_result_payload_hash)
  - result_payload_sha256 = framed_hash_text('ACE_RISER_RESULT_PAYLOAD_V1', sorted_strength_and_operability_tables_with_row_ids_without_result_payload_hash)
  - attestation_sha256 = framed_hash_text('ACE_RISER_ATTESTATION_V1', complete_signed_attestation_claims_without_attestation_envelope_or_signature)
  - signature = Ed25519.sign(host_private_key, domain_bytes('ACE_RISER_SIGNED_EXECUTION_V1') + digest_bytes(attestation_sha256))
  - result_envelope_sha256 = framed_hash_text('ACE_RISER_RESULT_ENVELOPE_V1', digest_bytes(attestation_sha256) + signature_bytes)
  - release_id = framed_hash_text('ACE_RISER_LOGICAL_RELEASE_V1', sorted_tables_without_release_id_plus_contract_version_tuple)
  - release_manifest_sha256 = framed_hash_text('ACE_RISER_RELEASE_MANIFEST_V1', release_id_plus_sorted_serialized_file_manifest_without_manifest_hash)

cross_platform_golden_vectors:
  required_platforms: [linux_x86_64, windows_x86_64]
  fixture_contains: [every_entity, unicode_NFC_pair, decimal_equivalence_set,
    null_and_absent_cases, sorted_sets, ordered_arrays, veering_current,
    zero_reference_current, multi_file_bundle, signature_test_key_public_only]
  assertions: [all_ids_equal, all_logical_hashes_equal, file_manifest_equal,
    every_nonexcluded_field_mutation_changes_owning_hash,
    every_seed_to_final_binding_is_acyclic_and_equal]

coordinate_adapter_ENU_TRUE_NORTH_1_0_0:
  canonical: {x: east, y: north, z: up, datum: mean_water_level,
    direction: clockwise_from_true_north_going_to}
  fixed_solver_fields:
    General.NorthDirection: 90
    Vessel.InitialX: top_connection_offset_east_m
    Vessel.InitialY: top_connection_offset_north_m
    Vessel.InitialHeading: vessel_bow_to_deg_true_north
    lower_connection_z: negative_water_depth_m
  wave_mapping: Environment.WaveTrains[].WaveDirection = wave_direction_to_deg_true_north
  current_mapping:
    input_order: strictly_increasing_depth_with_first_depth_equal_0
    reference_speed: first_profile_point.speed_m_s
    reference_direction: first_profile_point.direction_to_deg_true_north
    Environment.RefCurrentSpeed: reference_speed
    Environment.RefCurrentDirection: reference_direction
    Environment.CurrentDepth: each_profile_point.depth_below_mwl_m
    Environment.CurrentFactor: each_profile_point.speed_m_s / reference_speed
    Environment.CurrentRotation: wrap_half_open_minus180_180(each_direction - reference_direction)
    wrap_definition: ((angle_deg + 180) modulo 360) - 180
    zero_reference_rule: reference_speed_zero_requires_all_speeds_zero_then_all_factors_and_rotations_are_zero
  cardinal_vectors:
    - {canonical_to: north_0, solver_direction: 0, vector_EN: [0, 1]}
    - {canonical_to: east_90, solver_direction: 90, vector_EN: [1, 0]}
    - {canonical_to: south_180, solver_direction: 180, vector_EN: [0, -1]}
    - {canonical_to: west_270, solver_direction: 270, vector_EN: [-1, 0]}
  proof: licensed_canary_exports_reloads_cardinal_and_veering_models_before_adapter_promotion

field_disposition_validation:
  universe: every_leaf_field_in_normalized_schema_entities
  exactly_one_disposition: required
  adapter_consumes: [direct_solver_map, transformed_solver_map, execution_control]
  adapter_preserves_metadata: [solver_metadata]
  adapter_must_not_consume: [result_only, publication_only, rejected]
  negative_test: delete_each_required_leaf_and_assert_validation_failure_before_generator

model_and_bundle:
  stage: absent_new_directory_owned_by_execution_id
  model_dependency_resolver:
    method: parse_generated_master_and_explicit_model_reference_fields_from_reviewed_allowlist
    includes: [master_model, included_YAML_or_DAT, vessel_motion_payload,
      referenced_tabular_curves, generated_support_files]
    excludes: [OrcFxAPI_DLL, license_files, Python_runtime, OS_files, logs]
  runtime_dependency_attestation:
    method: allowlisted_version_and_binary_hash_inventory_outside_bundle
    includes: [OrcFxAPI_module, solver_DLL, Python_executable, execution_agent]
  reject: [unresolved_model_reference, unmanifested_model_input,
    manifested_unreferenced_extra, symlink, reparse_point, absolute_path,
    dot_dot, unicode_collision, casefold_collision]
  model_verified: [zero_post_validator_errors, OrcFxAPI_load_success,
    expected_object_type_count_connection_graph, SI_units_match,
    solver_native_save_success, native_model_hash_recorded]

transport_zip_store_v1:
  compression_method: store
  zip64: required_when_needed
  member_order: bytewise_UTF8_relative_POSIX_path
  member_timestamp: '1980-01-01T00:00:00'
  creator_system: UNIX_3
  version_made_by: '3.0'
  external_file_attributes: '0644 << 16'
  filename_encoding: UTF-8-NFC
  general_purpose_bit_11_UTF8: set
  extra_fields: none
  archive_comment: none
  limits: {archive_bytes: 2147483648, uncompressed_bytes: 2147483648,
    member_bytes: 536870912, members: 10000}
  artifact_sha256: framed_hash_text('ACE_RISER_TRANSPORT_ARCHIVE_V1', exact_archive_bytes)
  retry_identity: execution_id_plus_artifact_sha256
  acceptance: [archive_hash_matches, safe_extract, bundle_manifest_matches,
    every_extracted_file_hash_matches, signed_result_payload_hash_matches,
    signed_envelope_hash_matches]

host_attestation:
  request_claims: [execution_id, request_nonce, request_issued_at,
    request_expires_at, case_id, case_sha256, bundle_sha256, model_sha256,
    workflow_version, agent_commit, digitalmodel_commit, adapter_version]
  signed_result_claims: [all_request_claims, request_received_at,
    solver_api_version, solver_dll_version, python_bitness,
    runtime_dependency_manifest_sha256, license_session_id_sha256,
    lock_acquired_at, lock_released_at, canary_case_sha256,
    canary_result_sha256, canary_issued_at, canary_attestation_sha256,
    solver_run_started_at, solver_run_ended_at, attestation_issued_at,
    host_role, signer_key_id, semantic_status, result_payload_sha256]
  signing_bytes: domain_bytes('ACE_RISER_SIGNED_EXECUTION_V1') + digest_bytes(attestation_sha256)
  request_freshness: request_received_at_less_equal_request_expires_at
  canary_max_age_before_production_start_seconds: 86400
  canary_same_claims: [signer_key_id, workflow_version, agent_commit,
    solver_api_version, solver_dll_version, python_bitness]
  production_binding: [lock_interval_covers_solver_run,
    canary_issued_at_precedes_solver_run_started_at, semantic_status_verified_success]
  key_registry: [key_id, public_key, machine_id_private, host_role_public,
    valid_from, revoked_at_nullable, revocation_reason_nullable]

clean_room_attestation:
  author_signed_claims: [configuration_seed_sha256, author_signer_id,
    allowlist_manifest_sha256, environment_attestation_sha256, citation_ids,
    engineering_rationale_sha256, declaration, issued_at]
  reviewer_signed_claims: [configuration_seed_sha256, reviewer_signer_id,
    author_signer_id, method_id, private_evidence_id,
    blinded_evidence_commitment, verdict, reason_code, issued_at]
  signatures: Ed25519
  author_reviewer_key_inequality: required
  pass_requires: [both_signatures_valid, keys_valid_at_each_signed_issued_at,
    identical_configuration_seed, allowlist_hash_matches,
    method_is_private_similarity_review_v1, verdict_pass,
    reason_no_disclosure_signal]
  public_envelope: [configuration_seed_sha256, both_key_ids,
    both_claim_hashes, both_signatures, both_issued_at_values,
    method_id, opaque_private_evidence_id, blinded_evidence_commitment,
    verdict, reason_code]
  public_forbidden: [private_corpus_path, private_corpus_sha256,
    comparison_corpus_manifest_sha256, raw_similarity_findings]

result_join_validation:
  required_equalities:
    - result.case_id = execution_attestation.case_id
    - execution_attestation.case_sha256 = analysis_case.case_sha256
    - result.result_payload_sha256 = execution_attestation.result_payload_sha256
    - execution_attestation.semantic_status = verified_success
    - result.criterion_id_and_citation_id = criteria.criterion_id_and_citation_id
  enforcement: fail_before_release_serialization

family_output_matrix:
  common_quantities: [effective_tension_N, bend_moment_Nm,
    curvature_per_m, combined_stress_Pa]
  utilization: required_only_when_qualified_capacity_criterion_exists
  drilling:
    always_locations: [top_connection, upper_flex_joint, lower_flex_joint, lower_connection]
    when_present_locations: [stress_joint, connector, tree, lower_package]
    required_operability: [upper_flex_joint_angle, lower_flex_joint_angle,
      tensioner_force, tensioner_stroke, minimum_effective_tension, maximum_offset]
  completion_workover_synthetic:
    always_locations: [top_connection, lower_connection]
    when_present_locations: [upper_flex_joint, lower_flex_joint, stress_joint,
      connector, tree, lower_package]
    required_operability: [minimum_effective_tension, maximum_offset]
  status_rules: [not_modeled_blocks_requested_case,
    missing_requested_case_blocks_release]

engineering_oracles:
  all_statics: [vector_static_equilibrium, endpoint_and_water_depth_geometry]
  conditional: [M_over_EI_curvature, independent_stress_reconstruction,
    zero_environment_symmetry, monotonic_controlled_sweep]
  dynamics: [time_step_convergence, duration_convergence,
    seed_repetition, transient_discard_sensitivity]
  sample_selection:
    mandatory: [minimum_offset, maximum_offset, maximum_environment,
      every_limiting_criterion, every_failure_boundary_neighbor]
    fill_order: ascending_SHA256_case_id
    target_per_family: ceil_5_percent_successful_with_minimum_3
    fewer_than_target: sample_all

decoded_leak_scan:
  scope: [logical_rows_before_serialization, staged_parquet_decoded_by_schema,
    README_and_release_manifest, downloaded_remote_parquet_decoded_by_schema]
  checks: [secret_patterns, private_paths, client_identifiers,
    source_allowlist, license_and_redistribution, forbidden_extensions,
    clean_room_public_forbidden_fields, unexpected_columns]
  size_skip: prohibited
  parse_or_download_failure: release_blocking
  evidence: per_surface_scanner_version_input_hash_row_count_and_zero_findings

hf_publication:
  operation: one_atomic_create_commit_with_deletes_and_uploads
  parent_commit: observed_head_required
  expected_tree: [.gitattributes, README.md, release_manifest.json,
    'data/{config}/train-00000-of-00001.parquet']
  unexpected_remote_file: delete_in_same_commit_or_fail
  verify: [returned_commit_equals_head, exact_tree, every_size_and_hash,
    decoded_remote_parquet_equals_logical_release]
  dataset_server: [head_equals_returned_commit_before_and_after_polling,
    is_valid_true, exact_13_configs, exactly_train_per_config,
    exact_rows_features_primary_keys_and_release_id]

website_withholding:
  owner_issue: https://github.com/vamseeachanta/aceengineer-website/issues/75
  required_code_paths: [scripts/render-capabilities.js,
    assets/js/capabilities-refresh.js, scripts/validate-capabilities.js,
    scripts/verify-capabilities-online.js]
  rule: withheld_columns_are_removed_not_merely_deprioritized
  tests: [baked_DOM_has_no_withheld_column_or_value,
    refreshed_DOM_has_no_withheld_column_or_value,
    highlight_and_withheld_overlap_fails, network_or_API_warning_fails,
    every_required_config_release_id_matches]

closeout_evidence_manifest:
  schema_version: 1.0.0-draft.4
  repositories:
    type: array_of_repo_evidence
    required_per_repo: [repo_url, issue_urls, approval_comment_urls,
      approval_marker_paths, reviewed_commit_shas, landed_commit_shas,
      remote_main_sha, test_report_sha256, legal_report_sha256,
      code_review_artifact_sha256]
  release:
    required: [hf_repo_id, hf_commit_sha, release_manifest_sha256,
      exact_tree_evidence_sha256, dataset_server_evidence_sha256,
      decoded_leak_scan_evidence_sha256]
  clean_room:
    required_per_synthetic_configuration: [configuration_id,
      configuration_seed_sha256, author_claim_sha256, review_claim_sha256,
      public_evidence_envelope_sha256, signature_verification_evidence_sha256]
  website:
    required: [website_commit_sha, deployment_id, public_route_url,
      rendered_release_id, online_verification_evidence_sha256]
  parent:
    required: [parent_issue_url, parent_plan_sha, contract_file_shas,
      completeness_report_sha256, completeness_score,
      completeness_verified_label]
  authoritative_retrieval: [live_GitHub_labels_comments_commits_and_ancestry,
    recomputed_report_hashes, live_HF_head_tree_and_dataset_server,
    deployed_website_exact_commit_and_rendered_release_id]
  input_claims: never_trusted_without_authoritative_retrieval

contract_validation:
  meta_schema: issue-1602-riser-contract-meta-schema-v1.json
  semantic_validator_command: uv_run_python_inline_block_in_parent_plan
  semantic_checks: [exact_version_equality, all_references_exist,
    all_enum_domains_closed, every_primary_key_nonnullable_nonfloat,
    every_foreign_key_type_matches, every_normalized_leaf_has_one_disposition,
    every_release_config_has_const_version, exactly_13_release_configs,
    no_identity_preimage_contains_own_output, construction_order_acyclic,
    seed_bindings_equal, public_source_rows_fail_closed,
    criteria_public_and_joined, result_composite_joins_complete,
    poisson_bounds_equal, veering_current_defined,
    clean_room_public_forbidden_fields_absent]
