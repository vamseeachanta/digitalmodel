schema_id: digitalmodel-riser-hf-release
schema_version: 1.0.0-draft.3
split: train
additional_columns: reject
row_common:
  release_id: {type: string, format: sha256, nullable: false}
  schema_version: {type: string, const: 1.0.0, nullable: false}

enums:
  source_canonicality: [canonical, duplicate]
  source_origin: [repository_file, public_reference, synthetic_seed]
  source_derivation: [original, derived, synthetic]
  source_confidentiality: [public, private]
  source_license_class: [publisher_owned, permissive, attribution, proprietary, unknown]
  redistribution: [approved, denied, undecided]
  release_status: [withheld, quarantined, eligible, approved]
  transformation_kind: [identity, unit_conversion, composition, coordinate_transform, formula]
  lineage_entity_type: [component, configuration, analysis_case, criterion]
  riser_family: [drilling, completion_workover_synthetic]
  component_type: [riser_joint, buoyancy_joint, pup_joint, telescopic_joint,
    upper_flex_joint, lower_flex_joint, stress_joint, connector, tensioner,
    lmrp, bop, tree, lower_package]
  boundary_type: [vessel_top_connection, seabed_wellhead, subsea_tree]
  analysis_stage: [statics, dynamics]
  terminal_status: [requested, model_failed, solver_failed, completed,
    result_quarantined, release_approved]
  semantic_status: [verified_success, verified_failure]
  statistic: [minimum, maximum, mean, absolute_maximum]
  strength_quantity: [effective_tension_N, bend_moment_Nm, curvature_per_m,
    combined_stress_Pa, utilization_ratio]
  location_kind: [top_connection, upper_flex_joint, lower_flex_joint,
    lower_connection, stress_joint, connector, distributed_arc_length]
  criterion_kind: [strength, flex_joint_angle, tensioner_stroke,
    tensioner_force, minimum_tension, maximum_offset]
  withheld_reason: [confidential, license_denied, provenance_incomplete,
    malformed_source, engineering_incomplete, solver_failed,
    result_unverified, clean_room_failed]
  affected_surface: [source, configuration, case, result, publication]
  review_state: [pending, rejected, approved]
  clean_room_reason: [no_disclosure_signal, material_similarity_detected,
    insufficient_evidence]

configs:
  source_registry:
    primary_key: [source_id]
    columns:
      source_id: {type: string, nullable: false}
      canonical_source_id: {type: string, nullable: true}
      canonicality: {type: enum.source_canonicality, nullable: false}
      origin: {type: enum.source_origin, nullable: false}
      derivation: {type: enum.source_derivation, nullable: false}
      confidentiality: {type: enum.source_confidentiality, nullable: false}
      license_class: {type: enum.source_license_class, nullable: false}
      license_id: {type: string, nullable: false}
      redistribution: {type: enum.redistribution, nullable: false}
      release_status: {type: enum.release_status, nullable: false}
      source_sha256: {type: string, format: sha256, nullable: false}
      provenance_record_sha256: {type: string, format: sha256, nullable: false}
      legal_review_id: {type: string, nullable: false}
      issue_url: {type: string, format: github_url, nullable: false}

  transformations:
    primary_key: [transformation_id]
    columns:
      transformation_id: {type: string, nullable: false}
      name: {type: string, nullable: false}
      version: {type: string, format: semver, nullable: false}
      kind: {type: enum.transformation_kind, nullable: false}
      implementation_commit: {type: string, format: git_sha, nullable: false}
      formula_sha256: {type: string, format: sha256, nullable: true}
      parameters_jcs: {type: string, nullable: false}
      input_unit: {type: string, nullable: true}
      output_unit: {type: string, nullable: false}

  citations:
    primary_key: [citation_id]
    columns:
      citation_id: {type: string, nullable: false}
      publisher: {type: string, nullable: false}
      document_id: {type: string, nullable: false}
      revision: {type: string, nullable: false}
      section_locator: {type: string, nullable: false}
      public_resolver: {type: string, format: relative_path, nullable: false}
      application_note_sha256: {type: string, format: sha256, nullable: false}
      licensed_text_included: {type: bool, const: false, nullable: false}

  clean_room_reviews:
    primary_key: [review_attestation_id]
    conditional: [pass_requires_no_disclosure_signal, author_and_reviewer_keys_must_differ]
    columns:
      review_attestation_id: {type: string, nullable: false}
      configuration_id: {type: string, nullable: false}
      author_signer_role: {type: string, const: synthetic_author, nullable: false}
      reviewer_signer_role: {type: string, const: confidentiality_reviewer, nullable: false}
      author_signer_key_id: {type: string, nullable: false}
      reviewer_signer_key_id: {type: string, nullable: false}
      allowlist_manifest_sha256: {type: string, format: sha256, nullable: false}
      method_id: {type: string, const: private_similarity_review_v1, nullable: false}
      comparison_corpus_manifest_sha256: {type: string, format: sha256, nullable: false}
      author_attestation_sha256: {type: string, format: sha256, nullable: false}
      author_signature_base64: {type: string, format: base64, nullable: false}
      review_attestation_sha256: {type: string, format: sha256, nullable: false}
      reviewer_signature_base64: {type: string, format: base64, nullable: false}
      public_evidence_envelope_sha256: {type: string, format: sha256, nullable: false}
      verdict: {type: string, enum: [pass], nullable: false}
      reason_code: {type: enum.clean_room_reason, nullable: false}

  field_lineage:
    primary_key: [lineage_id]
    unique: [[entity_type, entity_id, field_path, ordinal]]
    columns:
      lineage_id: {type: string, nullable: false}
      entity_type: {type: enum.lineage_entity_type, nullable: false}
      entity_id: {type: string, nullable: false}
      field_path: {type: string, format: json_pointer, nullable: false}
      ordinal: {type: int32, minimum: 0, nullable: false}
      source_id: {type: string, nullable: false}
      source_field: {type: string, nullable: false}
      source_locator: {type: string, nullable: false}
      source_sha256: {type: string, format: sha256, nullable: false}
      transformation_id: {type: string, nullable: false}
      input_value_sha256: {type: string, format: sha256, nullable: false}
      output_value_sha256: {type: string, format: sha256, nullable: false}

  riser_components:
    primary_key: [component_instance_id]
    unique: [[configuration_id, sequence_from_top]]
    columns:
      component_instance_id: {type: string, nullable: false}
      configuration_id: {type: string, nullable: false}
      component_type: {type: enum.component_type, nullable: false}
      sequence_from_top: {type: int32, minimum: 0, nullable: false}
      length_m: {type: float64, exclusive_minimum: 0, nullable: false}
      outer_diameter_m: {type: float64, exclusive_minimum: 0, nullable: false}
      wall_thickness_m: {type: float64, exclusive_minimum: 0, nullable: false}
      mass_per_length_kg_m: {type: float64, exclusive_minimum: 0, nullable: false}
      youngs_modulus_pa: {type: float64, exclusive_minimum: 0, nullable: false}
      poissons_ratio: {type: float64, minimum: 0, exclusive_maximum: 0.5, nullable: false}
      material_ref: {type: string, nullable: false}

  riser_configurations:
    primary_key: [configuration_id]
    columns:
      configuration_id: {type: string, nullable: false}
      riser_family: {type: enum.riser_family, nullable: false}
      synthetic: {type: bool, nullable: false}
      water_depth_m: {type: float64, exclusive_minimum: 0, nullable: false}
      contents_density_kg_m3: {type: float64, minimum: 0, nullable: false}
      top_boundary_type: {type: enum.boundary_type, nullable: false}
      lower_boundary_type: {type: enum.boundary_type, nullable: false}
      normalized_input_sha256: {type: string, format: sha256, nullable: false}
      lineage_set_sha256: {type: string, format: sha256, nullable: false}
      clean_room_review_id: {type: string, nullable: true}

  analysis_cases:
    primary_key: [case_id]
    columns:
      case_id: {type: string, nullable: false}
      configuration_id: {type: string, nullable: false}
      case_sha256: {type: string, format: sha256, nullable: false}
      requested_stages_json: {type: string, nullable: false}
      coordinate_contract_version: {type: string, const: ENU_TRUE_NORTH_1.0.0, nullable: false}
      top_connection_offset_east_m: {type: float64, nullable: false}
      top_connection_offset_north_m: {type: float64, nullable: false}
      vessel_bow_to_deg_true_north: {type: float64, minimum: 0, exclusive_maximum: 360, nullable: false}
      wave_height_m: {type: float64, minimum: 0, nullable: false}
      wave_period_s: {type: float64, exclusive_minimum: 0, nullable: false}
      wave_direction_to_deg_true_north: {type: float64, minimum: 0, exclusive_maximum: 360, nullable: false}
      current_profile_jcs: {type: string, nullable: false}
      top_tension_n: {type: float64, exclusive_minimum: 0, nullable: false}
      terminal_status: {type: enum.terminal_status, nullable: false}
      failure_reason_code: {type: string, nullable: true}

  execution_attestations:
    primary_key: [execution_id]
    columns:
      execution_id: {type: string, nullable: false}
      case_id: {type: string, nullable: false}
      request_nonce: {type: string, nullable: false}
      issued_at: {type: string, format: rfc3339_utc, nullable: false}
      archival_valid_after: {type: string, format: rfc3339_utc, nullable: false}
      workflow_version: {type: string, nullable: false}
      agent_commit: {type: string, format: git_sha, nullable: false}
      digitalmodel_commit: {type: string, format: git_sha, nullable: false}
      adapter_version: {type: string, nullable: false}
      case_sha256: {type: string, format: sha256, nullable: false}
      bundle_sha256: {type: string, format: sha256, nullable: false}
      model_sha256: {type: string, format: sha256, nullable: false}
      solver_api_version: {type: string, nullable: false}
      solver_dll_version: {type: string, nullable: false}
      python_bitness: {type: int32, enum: [64], nullable: false}
      license_session_id_sha256: {type: string, format: sha256, nullable: false}
      lock_acquired_at: {type: string, format: rfc3339_utc, nullable: false}
      lock_released_at: {type: string, format: rfc3339_utc, nullable: false}
      canary_case_sha256: {type: string, format: sha256, nullable: false}
      canary_result_sha256: {type: string, format: sha256, nullable: false}
      host_role: {type: string, nullable: false}
      signer_key_id: {type: string, nullable: false}
      semantic_status: {type: enum.semantic_status, nullable: false}
      result_payload_sha256: {type: string, format: sha256, nullable: false}
      attestation_sha256: {type: string, format: sha256, nullable: false}
      result_envelope_sha256: {type: string, format: sha256, nullable: false}
      signature_base64: {type: string, format: base64, nullable: false}

  strength_results:
    primary_key: [strength_result_id]
    unique: [[execution_id, object_id, requested_stage, statistic, quantity,
      location_id, criterion_id]]
    columns:
      strength_result_id: {type: string, nullable: false}
      execution_id: {type: string, nullable: false}
      case_id: {type: string, nullable: false}
      object_id: {type: string, nullable: false}
      requested_stage: {type: enum.analysis_stage, nullable: false}
      statistic: {type: enum.statistic, nullable: false}
      quantity: {type: enum.strength_quantity, nullable: false}
      location_id: {type: string, nullable: false}
      location_kind: {type: enum.location_kind, nullable: false}
      arc_length_from_top_m: {type: float64, nullable: true}
      value_si: {type: float64, nullable: false}
      unit_si: {type: string, nullable: false}
      criterion_id: {type: string, nullable: true}
      citation_id: {type: string, nullable: true}
      result_payload_sha256: {type: string, format: sha256, nullable: false}
    conditional: [utilization_requires_criterion_and_citation,
      nonutilization_forbids_criterion_unless_value_is_limit_checked]

  operability_results:
    primary_key: [operability_result_id]
    unique: [[execution_id, matrix_point_id, criterion_id]]
    columns:
      operability_result_id: {type: string, nullable: false}
      execution_id: {type: string, nullable: false}
      case_id: {type: string, nullable: false}
      matrix_point_id: {type: string, nullable: false}
      criterion_id: {type: string, nullable: false}
      citation_id: {type: string, nullable: false}
      criterion_kind: {type: enum.criterion_kind, nullable: false}
      governing_value_si: {type: float64, nullable: false}
      limit_value_si: {type: float64, nullable: false}
      margin_value_si: {type: float64, nullable: false}
      unit_si: {type: string, nullable: false}
      utilization_ratio: {type: float64, minimum: 0, nullable: false}
      limiting_location_id: {type: string, nullable: false}
      operable: {type: bool, nullable: false}
      result_payload_sha256: {type: string, format: sha256, nullable: false}

  withheld_sources:
    primary_key: [withheld_id]
    columns:
      withheld_id: {type: string, nullable: false}
      origin: {type: enum.source_origin, nullable: false}
      confidentiality: {type: enum.source_confidentiality, nullable: false}
      reason_code: {type: enum.withheld_reason, nullable: false}
      affected_surface: {type: enum.affected_surface, nullable: false}
      issue_url: {type: string, format: github_url, nullable: false}
      review_state: {type: enum.review_state, nullable: false}

foreign_keys:
  - source_registry.canonical_source_id -> source_registry.source_id nullable many_to_one
  - field_lineage.source_id -> source_registry.source_id required many_to_one
  - field_lineage.transformation_id -> transformations.transformation_id required many_to_one
  - riser_components.configuration_id -> riser_configurations.configuration_id required many_to_one
  - riser_configurations.clean_room_review_id -> clean_room_reviews.review_attestation_id conditional one_to_one
  - analysis_cases.configuration_id -> riser_configurations.configuration_id required many_to_one
  - execution_attestations.case_id -> analysis_cases.case_id required many_to_one
  - strength_results.execution_id -> execution_attestations.execution_id required many_to_one
  - strength_results.case_id -> analysis_cases.case_id required many_to_one
  - strength_results.citation_id -> citations.citation_id conditional many_to_one
  - operability_results.execution_id -> execution_attestations.execution_id required many_to_one
  - operability_results.case_id -> analysis_cases.case_id required many_to_one
  - operability_results.citation_id -> citations.citation_id required many_to_one
