schema_id: digitalmodel-riser-normalized-input
schema_version: 1.0.0-draft.3
additional_fields: reject
implicit_defaults: reject
decimal_type: canonical_decimal_v1

enums:
  riser_family: [drilling, completion_workover_synthetic]
  canonicality: [canonical, duplicate]
  origin: [repository_file, public_reference, synthetic_seed]
  derivation: [original, derived, synthetic]
  confidentiality: [public, private]
  license_class: [publisher_owned, permissive, attribution, proprietary, unknown]
  redistribution: [approved, denied, undecided]
  release_status: [withheld, quarantined, eligible, approved]
  component_type: [riser_joint, buoyancy_joint, pup_joint, telescopic_joint,
    upper_flex_joint, lower_flex_joint, stress_joint, connector, tensioner,
    lmrp, bop, tree, lower_package]
  boundary_type: [vessel_top_connection, seabed_wellhead, subsea_tree]
  analysis_stage: [statics, dynamics]
  wave_model: [airy, dean_stream, jonswap]
  criterion_kind: [strength, flex_joint_angle, tensioner_stroke,
    tensioner_force, minimum_tension, maximum_offset]
  terminal_status: [requested, model_failed, solver_failed, completed,
    result_quarantined, release_approved]
  disposition: [direct_solver_map, transformed_solver_map, solver_metadata,
    execution_control, result_only, publication_only, rejected]

entities:
  source_record:
    key: [source_id]
    fields:
      schema_version: {type: const, value: 1.0.0, disposition: solver_metadata}
      source_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      canonical_source_id: {type: string, nullable: true, disposition: solver_metadata}
      canonicality: {type: enum.canonicality, disposition: solver_metadata}
      origin: {type: enum.origin, disposition: solver_metadata}
      derivation: {type: enum.derivation, disposition: solver_metadata}
      confidentiality: {type: enum.confidentiality, disposition: solver_metadata}
      license_class: {type: enum.license_class, disposition: solver_metadata}
      license_id: {type: string, disposition: solver_metadata}
      redistribution: {type: enum.redistribution, disposition: solver_metadata}
      release_status: {type: enum.release_status, disposition: solver_metadata}
      source_sha256: {type: sha256, disposition: solver_metadata}
      provenance_record_sha256: {type: sha256, disposition: solver_metadata}
      legal_review_id: {type: string, disposition: solver_metadata}
      issue_url: {type: github_url, disposition: publication_only}
    constraints:
      - duplicate_requires_canonical_source_id
      - canonical_forbids_canonical_source_id
      - public_approved_requires_source_hash_provenance_legal_license

  transformation_record:
    key: [transformation_id]
    fields:
      schema_version: {type: const, value: 1.0.0, disposition: solver_metadata}
      transformation_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      name: {type: string, disposition: solver_metadata}
      version: {type: semver, disposition: solver_metadata}
      kind: {type: enum, values: [identity, unit_conversion, composition,
        coordinate_transform, formula], disposition: solver_metadata}
      implementation_commit: {type: git_sha, disposition: solver_metadata}
      formula_sha256: {type: sha256, nullable: true, disposition: solver_metadata}
      parameters_jcs: {type: jcs_object, disposition: solver_metadata}
      input_unit: {type: unit, nullable: true, disposition: solver_metadata}
      output_unit: {type: unit, disposition: solver_metadata}

  field_lineage_record:
    key: [entity_type, entity_id, field_path, ordinal]
    fields:
      schema_version: {type: const, value: 1.0.0, disposition: solver_metadata}
      lineage_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      entity_type: {type: enum, values: [component, configuration, analysis_case,
        criterion], disposition: solver_metadata}
      entity_id: {type: string, disposition: solver_metadata}
      field_path: {type: json_pointer, disposition: solver_metadata}
      ordinal: {type: int32, minimum: 0, disposition: solver_metadata}
      source_id: {type: ref.source_record, disposition: solver_metadata}
      source_field: {type: string, disposition: solver_metadata}
      source_locator: {type: public_locator, disposition: solver_metadata}
      source_sha256: {type: sha256, disposition: solver_metadata}
      transformation_id: {type: ref.transformation_record, disposition: solver_metadata}
      input_value_sha256: {type: sha256, disposition: solver_metadata}
      output_value_sha256: {type: sha256, disposition: solver_metadata}
    constraints: [every_normalized_leaf_has_at_least_one_lineage_record,
      lineage_source_hash_matches_source_record]

  citation_record:
    key: [citation_id]
    fields:
      schema_version: {type: const, value: 1.0.0, disposition: solver_metadata}
      citation_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      publisher: {type: string, disposition: solver_metadata}
      document_id: {type: string, disposition: solver_metadata}
      revision: {type: string, disposition: solver_metadata}
      section_locator: {type: string, disposition: solver_metadata}
      public_resolver: {type: relative_path, disposition: publication_only}
      application_note_sha256: {type: sha256, disposition: solver_metadata}
      licensed_text_included: {type: const, value: false, disposition: publication_only}

  criterion_record:
    key: [criterion_id]
    fields:
      schema_version: {type: const, value: 1.0.0, disposition: solver_metadata}
      criterion_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      kind: {type: enum.criterion_kind, disposition: result_only}
      riser_family: {type: enum.riser_family, disposition: result_only}
      component_type: {type: enum.component_type, nullable: true, disposition: result_only}
      quantity: {type: string, disposition: result_only}
      limit_value_si: {type: decimal, disposition: result_only}
      unit_si: {type: unit, disposition: result_only}
      comparison: {type: enum, values: [less_equal, greater_equal], disposition: result_only}
      citation_id: {type: ref.citation_record, disposition: result_only}
      calculation_method_id: {type: ref.transformation_record, disposition: result_only}

  clean_room_author_attestation:
    key: [author_attestation_id]
    fields:
      schema_version: {type: const, value: 1.0.0, disposition: solver_metadata}
      author_attestation_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      configuration_id: {type: string, disposition: solver_metadata}
      author_signer_id: {type: signer_id, disposition: solver_metadata}
      allowlist_manifest_sha256: {type: sha256, disposition: solver_metadata}
      environment_attestation_sha256: {type: sha256, disposition: solver_metadata}
      citation_ids: {type: set.ref.citation_record, disposition: solver_metadata}
      engineering_rationale_sha256: {type: sha256, disposition: solver_metadata}
      declaration: {type: const, value: no_private_source_access, disposition: solver_metadata}
      issued_at: {type: rfc3339_utc, identity_role: excluded_from_configuration_hash, disposition: solver_metadata}
      signature_ed25519: {type: signature, identity_role: excluded_from_signed_payload, disposition: solver_metadata}

  clean_room_review_attestation:
    key: [review_attestation_id]
    fields:
      schema_version: {type: const, value: 1.0.0, disposition: solver_metadata}
      review_attestation_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      configuration_id: {type: string, disposition: solver_metadata}
      reviewer_signer_id: {type: signer_id, disposition: solver_metadata}
      author_signer_id: {type: signer_id, disposition: solver_metadata}
      method_id: {type: const, value: private_similarity_review_v1, disposition: solver_metadata}
      comparison_corpus_manifest_sha256: {type: sha256, disposition: solver_metadata}
      private_evidence_sha256: {type: sha256, disposition: solver_metadata}
      verdict: {type: enum, values: [pass, fail], disposition: solver_metadata}
      reason_code: {type: enum, values: [no_disclosure_signal,
        material_similarity_detected, insufficient_evidence], disposition: publication_only}
      issued_at: {type: rfc3339_utc, identity_role: excluded_from_configuration_hash, disposition: solver_metadata}
      signature_ed25519: {type: signature, identity_role: excluded_from_signed_payload, disposition: solver_metadata}
    constraints: [reviewer_signer_differs_from_author_signer, pass_required_for_release]

  component:
    key: [component_instance_id]
    fields:
      schema_version: {type: const, value: 1.0.0, disposition: direct_solver_map}
      component_instance_id: {type: content_id, identity_role: output_excluded, disposition: direct_solver_map}
      component_type: {type: enum.component_type, disposition: direct_solver_map}
      sequence_from_top: {type: int32, minimum: 0, disposition: transformed_solver_map}
      length_m: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      outer_diameter_m: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      wall_thickness_m: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      mass_per_length_kg_m: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      youngs_modulus_pa: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      poissons_ratio: {type: decimal, minimum: 0, maximum: 0.5, disposition: direct_solver_map}
      material_ref: {type: string, disposition: solver_metadata}
      qualified_capacity_criterion_ids: {type: set.ref.criterion_record, disposition: result_only}

  configuration:
    key: [configuration_id]
    fields:
      schema_version: {type: const, value: 1.0.0, disposition: solver_metadata}
      configuration_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      riser_family: {type: enum.riser_family, disposition: solver_metadata}
      synthetic: {type: bool, disposition: solver_metadata}
      water_depth_m: {type: decimal, exclusive_minimum: 0, disposition: transformed_solver_map}
      contents_density_kg_m3: {type: decimal, minimum: 0, disposition: direct_solver_map}
      top_boundary_type: {type: enum.boundary_type, disposition: direct_solver_map}
      lower_boundary_type: {type: enum.boundary_type, disposition: direct_solver_map}
      component_ids: {type: ordered.ref.component, min_items: 1, disposition: direct_solver_map}
      top_connection_east_m: {type: decimal, disposition: transformed_solver_map}
      top_connection_north_m: {type: decimal, disposition: transformed_solver_map}
      top_connection_z_m: {type: decimal, disposition: transformed_solver_map}
      lower_connection_east_m: {type: decimal, disposition: transformed_solver_map}
      lower_connection_north_m: {type: decimal, disposition: transformed_solver_map}
      lower_connection_z_m: {type: decimal, disposition: transformed_solver_map}
      source_ids: {type: set.ref.source_record, min_items: 1, disposition: solver_metadata}
      lineage_ids: {type: set.ref.field_lineage_record, min_items: 1, disposition: solver_metadata}
      author_attestation_id: {type: ref.clean_room_author_attestation, nullable: true, disposition: solver_metadata}
      review_attestation_id: {type: ref.clean_room_review_attestation, nullable: true, disposition: solver_metadata}
    constraints: [synthetic_requires_both_clean_room_attestations,
      nonsynthetic_forbids_clean_room_attestations, lower_connection_z_equals_negative_water_depth]

  current_profile_point:
    key: [depth_below_mwl_m]
    fields:
      depth_below_mwl_m: {type: decimal, minimum: 0, disposition: transformed_solver_map}
      speed_m_s: {type: decimal, minimum: 0, disposition: transformed_solver_map}
      direction_to_deg_true_north: {type: decimal, minimum: 0, exclusive_maximum: 360, disposition: transformed_solver_map}

  analysis_case:
    key: [case_id]
    fields:
      schema_version: {type: const, value: 1.0.0, disposition: solver_metadata}
      case_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      configuration_id: {type: ref.configuration, disposition: solver_metadata}
      requested_stages: {type: ordered_unique.enum.analysis_stage, min_items: 1, disposition: execution_control}
      coordinate_contract_version: {type: const, value: ENU_TRUE_NORTH_1.0.0, disposition: transformed_solver_map}
      top_connection_offset_east_m: {type: decimal, disposition: transformed_solver_map}
      top_connection_offset_north_m: {type: decimal, disposition: transformed_solver_map}
      vessel_bow_to_deg_true_north: {type: decimal, minimum: 0, exclusive_maximum: 360, disposition: transformed_solver_map}
      wave_model: {type: enum.wave_model, disposition: direct_solver_map}
      wave_height_m: {type: decimal, minimum: 0, disposition: direct_solver_map}
      wave_period_s: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      wave_direction_to_deg_true_north: {type: decimal, minimum: 0, exclusive_maximum: 360, disposition: direct_solver_map}
      current_profile: {type: ordered.ref.current_profile_point, min_items: 1, disposition: transformed_solver_map}
      top_tension_n: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      internal_pressure_pa: {type: decimal, minimum: 0, disposition: direct_solver_map}
      external_pressure_model_id: {type: string, disposition: transformed_solver_map}
      criterion_ids: {type: set.ref.criterion_record, min_items: 1, disposition: result_only}
      dynamics_time_step_s: {type: decimal, nullable: true, disposition: execution_control}
      dynamics_duration_s: {type: decimal, nullable: true, disposition: execution_control}
      dynamics_seed: {type: int64, nullable: true, disposition: execution_control}
    constraints: [dynamics_stage_requires_time_step_duration_seed,
      statics_only_forbids_dynamics_fields]

referential_integrity:
  - field_lineage_record.source_id -> source_record.source_id many_to_one
  - field_lineage_record.transformation_id -> transformation_record.transformation_id many_to_one
  - criterion_record.citation_id -> citation_record.citation_id many_to_one
  - criterion_record.calculation_method_id -> transformation_record.transformation_id many_to_one
  - configuration.component_ids -> component.component_instance_id ordered_many
  - configuration.source_ids -> source_record.source_id set_many
  - configuration.lineage_ids -> field_lineage_record.lineage_id set_many
  - analysis_case.configuration_id -> configuration.configuration_id many_to_one
  - analysis_case.criterion_ids -> criterion_record.criterion_id set_many
