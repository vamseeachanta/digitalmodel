schema_id: digitalmodel-riser-normalized-input
schema_version: 1.0.0-draft.5
additional_fields: reject
implicit_defaults: reject
decimal_type: canonical_decimal_v1

enums:
  riser_family: [drilling, completion_workover_synthetic]
  canonicality: [canonical, duplicate]
  origin: [repository_file, public_reference, synthetic_seed]
  derivation: [original, derived, synthetic]
  confidentiality: [public, private]
  license_class: [publisher_owned, permissive, attribution, proprietary, unknown]
  redistribution: [approved, denied, undecided]
  release_status: [withheld, quarantined, eligible, approved]
  component_type: [riser_joint, buoyancy_joint, pup_joint, telescopic_joint,
    upper_flex_joint, lower_flex_joint, stress_joint, connector, tensioner,
    lmrp, bop, tree, lower_package]
  connection_type: [line_end, rigid_joint, flex_joint, connector, tensioner_link]
  component_variant: [line_section, flex_joint, telescopic_joint, tensioner,
    rigid_package, connector]
  boundary_type: [vessel_top_connection, seabed_wellhead, subsea_tree]
  vessel_motion_mode: [fixed, prescribed_rao, prescribed_time_history]
  analysis_stage: [statics, dynamics]
  wave_model: [airy, dean_stream, jonswap]
  criterion_kind: [strength, flex_joint_angle, tensioner_stroke,
    tensioner_force, minimum_tension, maximum_offset]
  disposition: [direct_solver_map, transformed_solver_map, solver_metadata,
    execution_control, result_only, publication_only, rejected]

entities:
  source_record:
    key: [source_id]
    fields:
      schema_version: {type: const, value: 1.0.0-draft.5, disposition: solver_metadata}
      source_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      canonical_source_id: {type: string, nullable: true, disposition: solver_metadata}
      canonicality: {type: enum.canonicality, disposition: solver_metadata}
      origin: {type: enum.origin, disposition: solver_metadata}
      derivation: {type: enum.derivation, disposition: solver_metadata}
      confidentiality: {type: enum.confidentiality, disposition: solver_metadata}
      license_class: {type: enum.license_class, disposition: solver_metadata}
      license_id: {type: string, disposition: solver_metadata}
      redistribution: {type: enum.redistribution, disposition: solver_metadata}
      release_status: {type: enum.release_status, disposition: solver_metadata}
      source_sha256: {type: sha256, disposition: solver_metadata}
      provenance_record_sha256: {type: sha256, disposition: solver_metadata}
      legal_review_id: {type: string, disposition: solver_metadata}
      issue_url: {type: github_url, disposition: publication_only}
    constraints: [duplicate_requires_canonical_source_id,
      canonical_forbids_canonical_source_id,
      public_release_requires_public_approved_nonproprietary_source]

  transformation_record:
    key: [transformation_id]
    fields:
      schema_version: {type: const, value: 1.0.0-draft.5, disposition: solver_metadata}
      transformation_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      name: {type: string, disposition: solver_metadata}
      version: {type: semver, disposition: solver_metadata}
      kind: {type: enum, values: [identity, unit_conversion, composition,
        coordinate_transform, formula], disposition: solver_metadata}
      implementation_commit: {type: git_sha, disposition: solver_metadata}
      formula_sha256: {type: sha256, nullable: true, disposition: solver_metadata}
      parameters_jcs: {type: jcs_object, disposition: solver_metadata}
      input_unit: {type: unit, nullable: true, disposition: solver_metadata}
      output_unit: {type: unit, disposition: solver_metadata}

  citation_record:
    key: [citation_id]
    fields:
      schema_version: {type: const, value: 1.0.0-draft.5, disposition: solver_metadata}
      citation_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      publisher: {type: string, disposition: solver_metadata}
      document_id: {type: string, disposition: solver_metadata}
      revision: {type: string, disposition: solver_metadata}
      section_locator: {type: string, disposition: solver_metadata}
      public_resolver: {type: relative_path, disposition: publication_only}
      application_note_sha256: {type: sha256, disposition: solver_metadata}
      licensed_text_included: {type: const, value: false, disposition: publication_only}

  criterion_record:
    key: [criterion_id]
    fields:
      schema_version: {type: const, value: 1.0.0-draft.5, disposition: result_only}
      criterion_seed_sha256: {type: sha256, identity_role: seed, disposition: solver_metadata}
      criterion_id: {type: content_id, identity_role: output_excluded, disposition: result_only}
      kind: {type: enum.criterion_kind, disposition: result_only}
      riser_family: {type: enum.riser_family, disposition: result_only}
      component_type: {type: enum.component_type, nullable: true, disposition: result_only}
      quantity: {type: string, disposition: result_only}
      limit_value_si: {type: decimal, disposition: result_only}
      unit_si: {type: unit, disposition: result_only}
      comparison: {type: enum, values: [less_equal, greater_equal], disposition: result_only}
      citation_id: {type: ref.citation_record, disposition: result_only}
      calculation_method_id: {type: ref.transformation_record, disposition: result_only}

  field_lineage_record:
    key: [subject_kind, subject_seed_sha256, field_path, ordinal]
    fields:
      schema_version: {type: const, value: 1.0.0-draft.5, disposition: solver_metadata}
      lineage_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      subject_kind: {type: enum, values: [component, connection,
        boundary_attachment, configuration, analysis_case, criterion], disposition: solver_metadata}
      subject_seed_sha256: {type: sha256, disposition: solver_metadata}
      field_path: {type: json_pointer, disposition: solver_metadata}
      ordinal: {type: int32, minimum: 0, disposition: solver_metadata}
      source_id: {type: ref.source_record, disposition: solver_metadata}
      source_field: {type: string, disposition: solver_metadata}
      source_locator: {type: public_locator, disposition: solver_metadata}
      source_sha256: {type: sha256, disposition: solver_metadata}
      transformation_id: {type: ref.transformation_record, disposition: solver_metadata}
      input_value_sha256: {type: sha256, disposition: solver_metadata}
      output_value_sha256: {type: sha256, disposition: solver_metadata}
    constraints: [every_normalized_leaf_has_at_least_one_lineage_record,
      lineage_source_hash_matches_source_record]

  clean_room_author_attestation:
    key: [author_attestation_id]
    fields:
      schema_version: {type: const, value: 1.0.0-draft.5, disposition: solver_metadata}
      author_attestation_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      configuration_seed_sha256: {type: sha256, disposition: solver_metadata}
      configuration_id: {type: string, disposition: solver_metadata}
      author_signer_id: {type: signer_id, disposition: solver_metadata}
      allowlist_manifest_sha256: {type: sha256, disposition: solver_metadata}
      environment_attestation_sha256: {type: sha256, disposition: solver_metadata}
      citation_ids: {type: set.ref.citation_record, disposition: solver_metadata}
      engineering_rationale_sha256: {type: sha256, disposition: solver_metadata}
      declaration: {type: const, value: no_private_source_access, disposition: solver_metadata}
      issued_at: {type: rfc3339_utc, identity_role: signed_claim, disposition: solver_metadata}
      signature_ed25519: {type: signature, identity_role: output_excluded, disposition: solver_metadata}

  clean_room_review_attestation:
    key: [review_attestation_id]
    fields:
      schema_version: {type: const, value: 1.0.0-draft.5, disposition: solver_metadata}
      review_attestation_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      configuration_seed_sha256: {type: sha256, disposition: solver_metadata}
      configuration_id: {type: string, disposition: solver_metadata}
      author_claim_sha256: {type: sha256, disposition: solver_metadata}
      reviewer_signer_id: {type: signer_id, disposition: solver_metadata}
      author_signer_id: {type: signer_id, disposition: solver_metadata}
      method_id: {type: const, value: private_similarity_review_v1, disposition: solver_metadata}
      private_evidence_id: {type: opaque_identifier, disposition: solver_metadata}
      blinded_evidence_commitment: {type: hmac_sha256, disposition: solver_metadata}
      verdict: {type: enum, values: [pass, fail], disposition: solver_metadata}
      reason_code: {type: enum, values: [no_disclosure_signal,
        material_similarity_detected, insufficient_evidence], disposition: publication_only}
      issued_at: {type: rfc3339_utc, identity_role: signed_claim, disposition: solver_metadata}
      signature_ed25519: {type: signature, identity_role: output_excluded, disposition: solver_metadata}
    constraints: [reviewer_signer_differs_from_author_signer,
      pass_required_for_release]

  line_section_properties:
    key: [line_section_properties_id]
    fields:
      line_section_properties_id: {type: content_id, identity_role: output_excluded, disposition: direct_solver_map}
      length_m: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      outer_diameter_m: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      wall_thickness_m: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      mass_per_length_kg_m: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      displaced_diameter_m: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      drag_coefficient: {type: decimal, minimum: 0, disposition: direct_solver_map}
      added_mass_coefficient: {type: decimal, minimum: 0, disposition: direct_solver_map}
      youngs_modulus_pa: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      poissons_ratio: {type: decimal, minimum: 0, exclusive_maximum: 0.5, disposition: direct_solver_map}
      material_ref: {type: string, disposition: solver_metadata}
      axial_geometry_profile_jcs: {type: jcs_array, disposition: direct_solver_map}

  flex_joint_properties:
    key: [flex_joint_properties_id]
    fields:
      flex_joint_properties_id: {type: content_id, identity_role: output_excluded, disposition: direct_solver_map}
      rotational_stiffness_curve_jcs: {type: jcs_array, disposition: direct_solver_map}
      angle_limit_deg: {type: decimal, exclusive_minimum: 0, disposition: result_only}
      local_axis_orientation_jcs: {type: jcs_array, disposition: transformed_solver_map}

  tensioner_properties:
    key: [tensioner_properties_id]
    fields:
      tensioner_properties_id: {type: content_id, identity_role: output_excluded, disposition: direct_solver_map}
      count: {type: int32, minimum: 1, disposition: direct_solver_map}
      force_stroke_curve_jcs: {type: jcs_array, disposition: direct_solver_map}
      pretension_n: {type: decimal, minimum: 0, disposition: direct_solver_map}
      stroke_min_m: {type: decimal, disposition: direct_solver_map}
      stroke_max_m: {type: decimal, disposition: direct_solver_map}
      capacity_n: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      redundancy_count: {type: int32, minimum: 0, disposition: execution_control}
      attachment_geometry_jcs: {type: jcs_array, disposition: transformed_solver_map}

  telescopic_joint_properties:
    key: [telescopic_joint_properties_id]
    fields:
      telescopic_joint_properties_id: {type: content_id, identity_role: output_excluded, disposition: direct_solver_map}
      inner_line_properties_id: {type: ref.line_section_properties, disposition: direct_solver_map}
      outer_line_properties_id: {type: ref.line_section_properties, disposition: direct_solver_map}
      stroke_min_m: {type: decimal, disposition: direct_solver_map}
      stroke_max_m: {type: decimal, disposition: direct_solver_map}

  rigid_package_properties:
    key: [rigid_package_properties_id]
    fields:
      rigid_package_properties_id: {type: content_id, identity_role: output_excluded, disposition: direct_solver_map}
      mass_kg: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      inertia_xyz_kg_m2_jcs: {type: jcs_array, disposition: direct_solver_map}
      center_of_mass_local_m_jcs: {type: jcs_array, disposition: transformed_solver_map}
      displaced_volume_m3: {type: decimal, minimum: 0, disposition: direct_solver_map}
      drag_area_coefficient_jcs: {type: jcs_object, disposition: direct_solver_map}

  connector_properties:
    key: [connector_properties_id]
    fields:
      connector_properties_id: {type: content_id, identity_role: output_excluded, disposition: direct_solver_map}
      six_dof_stiffness_jcs: {type: jcs_array, disposition: direct_solver_map}
      capacity_criterion_ids: {type: set.ref.criterion_record, min_items: 1, disposition: result_only}

  component:
    key: [component_instance_id]
    fields:
      schema_version: {type: const, value: 1.0.0-draft.5, disposition: direct_solver_map}
      component_instance_id: {type: content_id, identity_role: output_excluded, disposition: direct_solver_map}
      component_seed_sha256: {type: sha256, identity_role: seed, disposition: solver_metadata}
      component_type: {type: enum.component_type, disposition: direct_solver_map}
      component_variant: {type: enum.component_variant, disposition: direct_solver_map}
      sequence_from_top: {type: int32, minimum: 0, disposition: transformed_solver_map}
      line_section_properties_id: {type: ref.line_section_properties, nullable: true, disposition: direct_solver_map}
      flex_joint_properties_id: {type: ref.flex_joint_properties, nullable: true, disposition: direct_solver_map}
      telescopic_joint_properties_id: {type: ref.telescopic_joint_properties, nullable: true, disposition: direct_solver_map}
      tensioner_properties_id: {type: ref.tensioner_properties, nullable: true, disposition: direct_solver_map}
      rigid_package_properties_id: {type: ref.rigid_package_properties, nullable: true, disposition: direct_solver_map}
      connector_properties_id: {type: ref.connector_properties, nullable: true, disposition: direct_solver_map}
      qualified_capacity_criterion_ids: {type: set.ref.criterion_record, disposition: result_only}
    constraints: [component_variant_requires_exactly_one_matching_properties_id,
      nonmatching_properties_ids_must_be_null]

  connection:
    key: [connection_id]
    fields:
      schema_version: {type: const, value: 1.0.0-draft.5, disposition: direct_solver_map}
      connection_id: {type: content_id, identity_role: output_excluded, disposition: direct_solver_map}
      connection_seed_sha256: {type: sha256, identity_role: seed, disposition: solver_metadata}
      from_component_id: {type: ref.component, disposition: direct_solver_map}
      from_end: {type: enum, values: [end_a, end_b], disposition: direct_solver_map}
      to_component_id: {type: ref.component, disposition: direct_solver_map}
      to_end: {type: enum, values: [end_a, end_b], disposition: direct_solver_map}
      connection_type: {type: enum.connection_type, disposition: direct_solver_map}
      connector_capacity_criterion_id: {type: ref.criterion_record, nullable: true, disposition: result_only}

  boundary_attachment:
    key: [boundary_attachment_id]
    fields:
      boundary_attachment_id: {type: content_id, identity_role: output_excluded, disposition: direct_solver_map}
      boundary_attachment_seed_sha256: {type: sha256, identity_role: seed, disposition: solver_metadata}
      boundary_type: {type: enum.boundary_type, disposition: direct_solver_map}
      component_id: {type: ref.component, disposition: direct_solver_map}
      component_end: {type: enum, values: [end_a, end_b], disposition: direct_solver_map}
      position_enu_m_jcs: {type: jcs_array, disposition: transformed_solver_map}
      local_orientation_jcs: {type: jcs_array, disposition: transformed_solver_map}
      six_dof_stiffness_jcs: {type: jcs_array, disposition: direct_solver_map}

  vessel_motion:
    key: [vessel_motion_id]
    fields:
      vessel_motion_id: {type: content_id, identity_role: output_excluded, disposition: execution_control}
      mode: {type: enum.vessel_motion_mode, disposition: execution_control}
      reference_origin_enu_m_jcs: {type: jcs_array, disposition: transformed_solver_map}
      axes_convention: {type: const, value: ENU_RH_ROLL_PITCH_YAW_1.0.0, disposition: transformed_solver_map}
      phase_convention: {type: string, disposition: transformed_solver_map}
      interpolation_method: {type: string, disposition: transformed_solver_map}
      frequency_heading_payload_jcs: {type: jcs_object, nullable: true, disposition: direct_solver_map}
      time_history_payload_jcs: {type: jcs_object, nullable: true, disposition: direct_solver_map}
      source_id: {type: ref.source_record, nullable: true, disposition: solver_metadata}
    constraints: [fixed_forbids_motion_payloads,
      prescribed_rao_requires_frequency_heading_payload,
      prescribed_time_history_requires_time_history_payload]

  external_pressure_model:
    key: [external_pressure_model_id]
    fields:
      external_pressure_model_id: {type: content_id, identity_role: output_excluded, disposition: transformed_solver_map}
      fluid_density_kg_m3: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      reference_pressure_pa: {type: decimal, minimum: 0, disposition: direct_solver_map}
      reference_z_m: {type: decimal, disposition: transformed_solver_map}
      gravity_m_s2: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      transformation_id: {type: ref.transformation_record, disposition: transformed_solver_map}

  configuration:
    key: [configuration_id]
    fields:
      schema_version: {type: const, value: 1.0.0-draft.5, disposition: solver_metadata}
      configuration_seed_sha256: {type: sha256, identity_role: seed, disposition: solver_metadata}
      configuration_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      riser_family: {type: enum.riser_family, disposition: solver_metadata}
      synthetic: {type: bool, disposition: solver_metadata}
      water_depth_m: {type: decimal, exclusive_minimum: 0, disposition: transformed_solver_map}
      contents_density_kg_m3: {type: decimal, minimum: 0, disposition: direct_solver_map}
      top_boundary_type: {type: enum.boundary_type, disposition: direct_solver_map}
      lower_boundary_type: {type: enum.boundary_type, disposition: direct_solver_map}
      component_ids: {type: ordered.ref.component, min_items: 1, disposition: direct_solver_map}
      connection_ids: {type: set.ref.connection, min_items: 1, disposition: direct_solver_map}
      boundary_attachment_ids: {type: set.ref.boundary_attachment, min_items: 2, disposition: direct_solver_map}
      vessel_reference_id: {type: string, disposition: solver_metadata}
      vessel_motion_id: {type: ref.vessel_motion, disposition: execution_control}
      source_ids: {type: set.ref.source_record, min_items: 1, disposition: solver_metadata}
      lineage_ids: {type: set.ref.field_lineage_record, min_items: 1, disposition: solver_metadata}
      author_attestation_id: {type: ref.clean_room_author_attestation, nullable: true, disposition: solver_metadata}
      review_attestation_id: {type: ref.clean_room_review_attestation, nullable: true, disposition: solver_metadata}
    constraints: [synthetic_requires_matching_seed_on_both_clean_room_attestations,
      nonsynthetic_forbids_clean_room_attestations,
      lower_connection_z_equals_negative_water_depth,
      exactly_one_top_and_one_lower_boundary_attachment]

  current_profile_point:
    key: [depth_below_mwl_m]
    fields:
      depth_below_mwl_m: {type: decimal, minimum: 0, disposition: transformed_solver_map}
      speed_m_s: {type: decimal, minimum: 0, disposition: transformed_solver_map}
      direction_to_deg_true_north: {type: decimal, minimum: 0, exclusive_maximum: 360, disposition: transformed_solver_map}

  analysis_case:
    key: [case_id]
    fields:
      schema_version: {type: const, value: 1.0.0-draft.5, disposition: solver_metadata}
      case_seed_sha256: {type: sha256, identity_role: seed, disposition: solver_metadata}
      case_id: {type: content_id, identity_role: output_excluded, disposition: solver_metadata}
      configuration_id: {type: ref.configuration, disposition: solver_metadata}
      requested_stages: {type: ordered_unique.enum.analysis_stage, min_items: 1, disposition: execution_control}
      coordinate_contract_version: {type: const, value: ENU_TRUE_NORTH_1.0.0, disposition: transformed_solver_map}
      top_connection_offset_enu_m_jcs: {type: jcs_array, disposition: transformed_solver_map}
      vessel_bow_to_deg_true_north: {type: decimal, minimum: 0, exclusive_maximum: 360, disposition: transformed_solver_map}
      wave_model: {type: enum.wave_model, disposition: direct_solver_map}
      wave_height_m: {type: decimal, minimum: 0, disposition: direct_solver_map}
      wave_period_s: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      wave_period_basis: {type: enum, values: [regular_period, spectral_peak_period, spectral_zero_crossing_period], disposition: direct_solver_map}
      wave_gamma: {type: decimal, nullable: true, disposition: direct_solver_map}
      wave_direction_to_deg_true_north: {type: decimal, minimum: 0, exclusive_maximum: 360, disposition: direct_solver_map}
      wave_time_origin_s: {type: decimal, disposition: direct_solver_map}
      wave_phase_seed: {type: int64, nullable: true, disposition: execution_control}
      wave_component_count: {type: int32, nullable: true, minimum: 1, disposition: execution_control}
      current_profile: {type: ordered.ref.current_profile_point, min_items: 1, disposition: transformed_solver_map}
      top_tension_n: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      internal_pressure_pa: {type: decimal, minimum: 0, disposition: direct_solver_map}
      external_pressure_model_id: {type: ref.external_pressure_model, disposition: transformed_solver_map}
      seawater_density_kg_m3: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      gravity_m_s2: {type: decimal, exclusive_minimum: 0, disposition: direct_solver_map}
      seabed_contact_model_jcs: {type: jcs_object, disposition: direct_solver_map}
      criterion_ids: {type: set.ref.criterion_record, min_items: 1, disposition: result_only}
      dynamics_time_step_s: {type: decimal, nullable: true, disposition: execution_control}
      dynamics_duration_s: {type: decimal, nullable: true, disposition: execution_control}
      dynamics_seed: {type: int64, nullable: true, disposition: execution_control}
    constraints: [jonswap_requires_gamma_phase_and_component_count,
      dynamics_stage_requires_time_step_duration_seed,
      statics_only_forbids_dynamics_fields]

referential_integrity:
  - field_lineage_record.source_id -> source_record.source_id many_to_one
  - field_lineage_record.transformation_id -> transformation_record.transformation_id many_to_one
  - criterion_record.citation_id -> citation_record.citation_id many_to_one
  - criterion_record.calculation_method_id -> transformation_record.transformation_id many_to_one
  - clean_room_author_attestation.citation_ids -> citation_record.citation_id set_many
  - connector_properties.capacity_criterion_ids -> criterion_record.criterion_id set_many
  - component.line_section_properties_id -> line_section_properties.line_section_properties_id conditional_one
  - component.flex_joint_properties_id -> flex_joint_properties.flex_joint_properties_id conditional_one
  - telescopic_joint_properties.inner_line_properties_id -> line_section_properties.line_section_properties_id many_to_one
  - telescopic_joint_properties.outer_line_properties_id -> line_section_properties.line_section_properties_id many_to_one
  - component.telescopic_joint_properties_id -> telescopic_joint_properties.telescopic_joint_properties_id conditional_one
  - component.tensioner_properties_id -> tensioner_properties.tensioner_properties_id conditional_one
  - component.rigid_package_properties_id -> rigid_package_properties.rigid_package_properties_id conditional_one
  - component.connector_properties_id -> connector_properties.connector_properties_id conditional_one
  - component.qualified_capacity_criterion_ids -> criterion_record.criterion_id set_many
  - connection.from_component_id -> component.component_instance_id many_to_one
  - connection.to_component_id -> component.component_instance_id many_to_one
  - connection.connector_capacity_criterion_id -> criterion_record.criterion_id conditional_one
  - boundary_attachment.component_id -> component.component_instance_id many_to_one
  - vessel_motion.source_id -> source_record.source_id conditional_one
  - external_pressure_model.transformation_id -> transformation_record.transformation_id many_to_one
  - configuration.component_ids -> component.component_instance_id ordered_many
  - configuration.connection_ids -> connection.connection_id set_many
  - configuration.boundary_attachment_ids -> boundary_attachment.boundary_attachment_id set_many
  - configuration.vessel_motion_id -> vessel_motion.vessel_motion_id many_to_one
  - configuration.source_ids -> source_record.source_id set_many
  - configuration.lineage_ids -> field_lineage_record.lineage_id set_many
