  - id: riser-fatigue
    basename: riser_fatigue
    title: Combined wave + VIV riser fatigue damage (DNV-RP-C203)
    input: examples/workflows/riser-fatigue/input.yml
    outputs:
      - examples/workflows/riser-fatigue/results/input.yml
      - examples/workflows/riser-fatigue/results/input_riser_fatigue.csv
      - examples/workflows/riser-fatigue/results/input_riser_fatigue_summary.csv
    test: tests/workflows/test_durable_workflows.py::test_workflow_registry[riser-fatigue]
    runtime: offline
    parametric:
      physics: log_log
      response: annual_damage
      tolerance: {metric: max_rel_error, threshold: 0.10}
      axes:
        - {name: scf, scale: linear, grid: [1.0, 1.1, 1.2, 1.3, 1.4]}
        - {name: viv_stress_scale, scale: linear, grid: [0.8, 1.0, 1.2, 1.4, 1.6]}
      atlas: atlases/riser_fatigue
  - id: riser-fatigue-atlas-query
    basename: parametric_query
    title: Instant interpolated riser fatigue life from the pre-computed annual-damage atlas
    input: examples/workflows/riser-fatigue-atlas-query/input.yml
    outputs:
      - examples/workflows/riser-fatigue-atlas-query/results/input_result.yml
    test: tests/workflows/test_durable_workflows.py::test_workflow_registry[riser-fatigue-atlas-query]
    runtime: offline
  - id: mooring-fatigue
    basename: mooring_fatigue
    title: Metallic mooring-line fatigue damage from tension-range bins
    input: examples/workflows/mooring-fatigue/input.yml
    outputs:
      - examples/workflows/mooring-fatigue/results/input.yml
      - examples/workflows/mooring-fatigue/results/input_mooring_fatigue.csv
      - examples/workflows/mooring-fatigue/results/input_mooring_fatigue_summary.csv
    test: tests/workflows/test_durable_workflows.py::test_workflow_registry[mooring-fatigue]
    runtime: offline
    version: 1
    status: stable
    latest: true
    parametric:
      physics: log_log
      response: damage
      response_kwargs: {environment: seawater_cp}
      tolerance: {metric: max_rel_error, threshold: 0.10}
      # damage depends on (tension,area) only through stress = T*1000/A, so the
      # atlas grids on a DERIVED stress axis (#830) — collapses the old
      # tension x area grid (~16x fewer cells). The query supplies raw
      # tension_range_kN + area_mm2 and the stress is derived at lookup.
      axes:
        - name: stress_MPa
          scale: log
          grid: [11, 14, 18, 22, 27, 33, 40, 50, 62, 78, 98, 122, 150]
          derived: {fn: stress_from_tension_area, inputs: [tension_range_kN, area_mm2]}
        - {name: n_cycles, scale: log, grid: [10000, 100000, 1000000]}
        - {name: sn_curve, values: [B1, B2, C, C1, C2, D, E, F]}
      atlas: atlases/mooring_fatigue
  # Versioned-routing canary (schema v2): a second algorithm version of the same
  # id. v2 assesses against the DNV-RP-C203 free-corrosion S-N basis (single
  # slope, no endurance limit, no cathodic-protection credit) — more conservative
  # than v1's seawater-CP bilinear curve. Shipped `experimental` so unpinned
  # routing stays on v1 (latest-stable); pin `digitalmodel:mooring-fatigue@2`
  # to opt in.
  - id: mooring-fatigue
    version: 2
    status: experimental
    basename: mooring_fatigue
    title: Metallic mooring-line fatigue — conservative free-corrosion S-N basis
    input: examples/workflows/mooring-fatigue-v2/input.yml
    outputs:
      - examples/workflows/mooring-fatigue-v2/results/input.yml
      - examples/workflows/mooring-fatigue-v2/results/input_mooring_fatigue.csv
      - examples/workflows/mooring-fatigue-v2/results/input_mooring_fatigue_summary.csv
    test: tests/workflows/test_durable_workflows.py::test_workflow_registry[mooring-fatigue]
    runtime: offline
  - id: mooring-fatigue-atlas-query
    basename: parametric_query
    title: Instant interpolated mooring fatigue life from the pre-computed atlas
    input: examples/workflows/mooring-fatigue-atlas-query/input.yml
    outputs:
      - examples/workflows/mooring-fatigue-atlas-query/results/input_result.yml
    test: tests/workflows/test_durable_workflows.py::test_workflow_registry[mooring-fatigue-atlas-query]
    runtime: offline
  - id: synthetic-rope-mooring-fatigue
    basename: synthetic_rope_mooring_fatigue
    title: Synthetic fibre-rope mooring service life (T-T fatigue + creep + min-tension)
    input: examples/workflows/synthetic-rope-mooring-fatigue/input.yml
    outputs:
      - examples/workflows/synthetic-rope-mooring-fatigue/results/input.yml
      - examples/workflows/synthetic-rope-mooring-fatigue/results/input_synthetic_rope_mooring_fatigue.csv
      - examples/workflows/synthetic-rope-mooring-fatigue/results/input_synthetic_rope_mooring_fatigue_summary.csv
    test: tests/workflows/test_durable_workflows.py::test_workflow_registry[synthetic-rope-mooring-fatigue]
    runtime: offline
    parametric:
      physics: log_log
      response: damage
      response_kwargs: {tn_intercept: 0.259, tn_slope: 13.46, mean_load_knockdown: 0.0, load_ratio: 0.30}
      tolerance: {metric: max_rel_error, threshold: 0.10}
      # FATIGUE (T-N) limit state only; creep + min-tension remain full-run checks
      axes:
        - {name: tension_range_kN, scale: log, grid: [200, 400, 700, 1200, 2000, 3000]}
        - {name: n_cycles, scale: log, grid: [10000, 100000, 1000000, 10000000]}
        - {name: MBL_kN, scale: log, grid: [5000, 10000, 20000, 35000, 50000]}
      atlas: atlases/synthetic_rope_mooring_fatigue
  - id: synthetic-rope-atlas-query
    basename: parametric_query
    title: Instant interpolated synthetic-rope T-N fatigue life from the pre-computed atlas
    input: examples/workflows/synthetic-rope-atlas-query/input.yml
    outputs:
      - examples/workflows/synthetic-rope-atlas-query/results/input_result.yml
    test: tests/workflows/test_durable_workflows.py::test_workflow_registry[synthetic-rope-atlas-query]
    runtime: offline
  - id: spectral-fatigue
    basename: spectral_fatigue
    title: Frequency-domain (spectral) fatigue from a stress PSD (Dirlik / DNV-RP-C203)
    input: examples/workflows/spectral-fatigue/input.yml
    outputs:
      - examples/workflows/spectral-fatigue/results/input.yml
      - examples/workflows/spectral-fatigue/results/input_spectral_fatigue.csv
      - examples/workflows/spectral-fatigue/results/input_spectral_fatigue_summary.csv
    test: tests/workflows/test_durable_workflows.py::test_workflow_registry[spectral-fatigue]
    runtime: offline
    parametric:
      physics: log_log
      response: annual_damage
      # SCREENING: JONSWAP wave spectrum -> stress PSD via a FIXED quasi-static
      # stress gain (MPa per m); a project re-bakes its own stress-RAO H(f).
      response_kwargs: {gamma: 3.3, stress_gain_MPa_per_m: 20.0, sn_slope: 3.0, sn_intercept: 12.164}
      tolerance: {metric: max_rel_error, threshold: 0.10}
      axes:
        - {name: Hs, scale: log, grid: [1.0, 2.0, 3.0, 4.5, 6.0, 8.0]}
        - {name: Tp, scale: linear, grid: [6, 7, 8, 9, 10, 11, 12, 13, 14, 16]}
      atlas: atlases/spectral_fatigue
  - id: spectral-fatigue-atlas-query
    basename: parametric_query
    title: Instant interpolated spectral fatigue life for a JONSWAP sea state (screening)
    input: examples/workflows/spectral-fatigue-atlas-query/input.yml
    outputs:
      - examples/workflows/spectral-fatigue-atlas-query/results/input_result.yml
    test: tests/workflows/test_durable_workflows.py::test_workflow_registry[spectral-fatigue-atlas-query]
    runtime: offline
  - id: rao-spectral-fatigue
