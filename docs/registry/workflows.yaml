      tolerance: {metric: max_rel_error, threshold: 0.10}
      axes:
        - {name: span_length_ft, scale: log, grid: [40, 60, 80, 100, 120]}
        - {name: current_speed_in_s, scale: log, grid: [12, 24, 36, 48, 72]}
