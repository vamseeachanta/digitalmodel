statement: >
  What is an adaptive, closed-loop drilling process used to precisely control the annular pressure profile throughout the wellbore?

find:
  - "Name the process"

solution:
  method: "Petroleum-engineering concept recall (no calculation)."
  answer: "Managed Pressure Drilling (MPD) - an adaptive closed-loop method holding bottomhole/annular pressure in a narrow tolerance via a rotating control device, surface choke manifold, and back-pressure pump."
