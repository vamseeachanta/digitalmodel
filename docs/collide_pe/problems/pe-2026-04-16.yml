statement: >
  What is a standard semilog graphical technique used to analyze pressure buildup (PBU) data from well tests to get reservoir pressure, skin, and permeability, plotting against log cycles and shut-in bottomhole pressure?

find:
  - "Name the technique"

solution:
  method: "Petroleum-engineering concept recall (no calculation)."
  answer: "The Horner plot (Horner pressure-buildup analysis) - shut-in pressure vs the log of the Horner time ratio (tp+dt)/dt; slope gives kh, offset gives skin, extrapolation to ratio=1 gives p*."
  confidence: high
  solved_by: "petroleum-engineering domain knowledge (Deckhand wells-subsurface pack / Claude API solver)"

