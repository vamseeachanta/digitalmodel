statement: >
  What aspects keep a well under control during underbalanced drilling? Give three (free response).

find:
  - "Give any three"

solution:
  method: "Petroleum-engineering concept recall (no calculation)."
  answer: "Any three of: a rotating control device (RCD) for continuous surface containment; choke/backpressure (surface or downhole MPD) management; dedicated surface separation/flaring of returns; continuous influx/flow-out monitoring; a downhole deployment/isolation valve."
  confidence: high
  solved_by: "petroleum-engineering domain knowledge (Deckhand wells-subsurface pack / Claude API solver)"
