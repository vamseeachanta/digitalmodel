statement: >
  What is the purpose of a standing valve in a gas-lift configuration? Several answers exist; one is enough.

find:
  - "Give one valid purpose"

solution:
  method: "Petroleum-engineering concept recall (no calculation)."
  answer: "A check valve at the tubing intake: it lets fluid flow up from the formation but blocks backflow, holding the fluid column and preventing U-tubing of injected gas/fluid back into the formation (aids unloading)."
  confidence: high
  solved_by: "petroleum-engineering domain knowledge (Deckhand wells-subsurface pack / Claude API solver)"

