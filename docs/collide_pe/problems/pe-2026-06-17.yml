statement: >
  Clastic reservoir: fine-medium sandstone with interbedded shale, cross-bedding, ripple laminations, mud drapes, upward-fining sequences, GR coarsening/fining cycles, moderate lateral heterogeneity and compartmentalization. Most likely depositional environment? A) fluvial channel-levee  B) deep-marine turbidite fan  C) aeolian dune field  D) carbonate reef platform

find:
  - "Choose A/B/C/D"

solution:
  method: "Petroleum-engineering concept recall (no calculation)."
  answer: "A - fluvial channel-levee system. Upward-fining cycles, cross-bedding, ripples, mud drapes, and strong compartmentalization point to laterally-confined channel sands in floodplain shale."
  confidence: high
  solved_by: "petroleum-engineering domain knowledge (Deckhand wells-subsurface pack / Claude API solver)"

