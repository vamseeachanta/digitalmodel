statement: >
  High gamma but high potassium on the spectral gamma ray could indicate WHAT MINERAL in the rock? (one answer)

find:
  - "Name the mineral"

solution:
  method: "Petroleum-engineering concept recall (no calculation)."
  answer: "Potassium feldspar (K-feldspar; orthoclase/microcline) - or another K-bearing mineral such as mica, glauconite, or illite clay. A high-GR signal driven by the K channel (not U/Th) can flag arkosic/micaceous sand rather than shale."
  confidence: high
  solved_by: "petroleum-engineering domain knowledge (Deckhand wells-subsurface pack / Claude API solver)"

