statement: >
  What is the technique of creating a new wellbore from an existing one, branching off at an angle to bypass obstacles (e.g. stuck tools) or to reach a new geological target?

find:
  - "Name the technique"

solution:
  method: "Petroleum-engineering concept recall (no calculation)."
  answer: "Sidetracking (drilling a sidetrack) - branching a new wellbore off an existing one via a whipstock or cement plug to bypass an obstruction or reach a new target."
