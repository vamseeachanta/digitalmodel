statement: >
  What is a mobile, specialized unit used to perform remedial, maintenance, or intervention operations on existing oil and gas wells? (one answer)

find:
  - "Name the unit"

solution:
  method: "Petroleum-engineering concept recall (no calculation)."
  answer: "A workover rig (well-servicing / pulling unit). Coiled-tubing and hydraulic workover units also perform interventions, but the workover rig is the classic mobile servicing unit."
