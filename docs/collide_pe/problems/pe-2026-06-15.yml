tags: [drilling, upstream, equipment, field-service]
type: multiple-choice

statement: >
  Directional well in reactive shales, tight pore throats, moderate overpressure. Symptoms: rising torque and drag, tight spots tripping out, cuttings balled on the BHA, no losses or influx, adequate mud weight but LOW inhibitive mud. Most likely cause? A) shale swelling and wellbore instability from insufficient mud inhibition  B) differential sticking from excessive overbalance  C) lost circulation leading to hole collapse  D) bit wear

find:
  - "Choose A/B/C/D"

solution:
  method: "Petroleum-engineering concept recall (no calculation)."
  answer: "A - shale swelling and wellbore instability due to insufficient mud inhibition. Adequate mud weight + no losses/influx rule out pressure causes; balling and tight spots are the reactive-shale signature. Fix: raise mud inhibition (inhibitive system)."
  confidence: high
  solved_by: "petroleum-engineering domain knowledge (Deckhand wells-subsurface pack / Claude API solver)"

