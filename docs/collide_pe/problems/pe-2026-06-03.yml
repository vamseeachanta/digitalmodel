statement: >
  What is the main purpose of drilling fluid? A) cooling and lubricating the bit  B) increasing reservoir pressure  C) producing more oil  D) cementing the casing

find:
  - "Choose A/B/C/D"

solution:
  method: "Petroleum-engineering concept recall (no calculation)."
  answer: "A — cooling and lubricating the bit. (Mud also carries cuttings and maintains well control, but among the choices A is correct.)"
