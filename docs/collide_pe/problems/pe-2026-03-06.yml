statement: >
  What drive mechanism is present in unconventional (shale/tight) oil wells?

find:
  - "Name the drive mechanism"

solution:
  method: "Petroleum-engineering concept recall (no calculation)."
  answer: "Depletion drive — pressure depletion / solution-gas drive within the stimulated rock volume. Unconventional wells have essentially no natural water or gas-cap drive, hence steep decline and low recovery."
  confidence: high
  solved_by: "petroleum-engineering domain knowledge (Deckhand wells-subsurface pack / Claude API solver)"

