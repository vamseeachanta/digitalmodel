statement: >
  What is an SP (spontaneous potential) log ACTUALLY measuring? (Do not just spell out the name.)

find:
  - "State the physical quantity measured"

solution:
  method: "Petroleum-engineering concept recall (no calculation)."
  answer: "A naturally occurring electrical potential difference — a small DC voltage (mV) in the borehole between mud filtrate and formation water across permeable beds (electrochemical membrane + liquid-junction, plus a small electrokinetic term). It measures voltage, not lithology directly."
  confidence: high
  solved_by: "petroleum-engineering domain knowledge (Deckhand wells-subsurface pack / Claude API solver)"

