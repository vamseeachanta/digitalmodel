# OrcaFlex Jumper Installation Analysis - Input Specification
# Ballymore PLET-to-PLEM Jumper
#
# This spec.yml feeds the jumper_lift.py calculation module which generates
# OrcaFlex line-section YAML segments for the model generator.
#
# Pipeline: spec.yml → jumper_lift.py → orcaflex model.yml → analysis → postprocess → outputs
#
# Two configurations: SZ (Saipem) and DZ+AHCon (active heave compensation ON).
# The SZ.dat model is the baseline; DZ uses different crane config with AHC offsets.
#
# NOTE: Segment lengths need verification from SZ_Ballymore_Jumper_MF.xlsm workbook.
# Current values use MF-PLET baseline (same pipe, geometry TBD from workbook conversion).
#
# Usage:
#   from digitalmodel.marine_ops.installation.jumper_lift import run_jumper_analysis
#   from digitalmodel.infrastructure.spec_loader import load_spec
#   cfg = load_spec("spec.yml")
#   results = run_jumper_analysis(cfg.jumper)

metadata:
  name: "ballymore_plet_plem_jumper"
  description: "Ballymore PLET-to-PLEM Jumper Installation Analysis (SZ + DZ/AHC)"
  structure: jumper
  operation: installation/lift
  cranes: [SZ, DZ]

environment:
  water:
    depth: 1400                        # Approximate water depth (m) – Ballymore GOM
    density: 1.025                     # Seawater density (te/m3)
  seabed:
    soil_type: soft_clay
    stiffness:
      normal: 1000

pipe:
  name: "jumper_plet_plem"
  outer_diameter: 0.27305              # Steel OD (m) – 10.75 in (same as MF-PLET)
  wall_thickness: 0.045466             # Wall thickness (m) – 1.79 in
  bend_radius: 1.27                    # Bend radius (m) – 50 in
  insulated_od: 0.42545                # OD with insulation (m) – 16.75 in
  insulation:
    thickness: 0.0762
    density: 978.7
  steel_density: 7850

buoyancy_modules:
  length_m: 1.016
  dry_weight_lbs: 1287.0
  wet_weight_lbs: -613.0
  od_drag_m: 1.5403
  # TODO: Verify from SZ_Ballymore_Jumper_MF.xlsm (currently using MF-PLET values)
  placement:
    segment_C: 2
    segment_D: 20
    segment_E: 2

strake_modules:
  length_m: 2.159
  base_dry_lbs: 36.12
  wt_lbs_per_joint: 3.0
  od_drag_m: 0.653
  num_strakes: 2

rigging:
  masterlink:
    wll_te: 98.0
  fiber_rope:
    type: "Dyneema SK75"
    diameter_mm: 78
    length_m: 0.6096
    mbl_te: 600.0
  upper_wire:
    diameter_in: 2.25
    mbl_te: 224.0
  lower_wire:
    diameter_in: 1.5
    mbl_te: 103.0
  turnbuckle:
    wll_te: 27.0
  sling_stiffness:
    mbl_te: 1200.0
    elongation: 0.045
  spreader_bar:
    length_ft: 110.0
    od_in: 20.0
    wall_in: 1.281

# SZ crane: static jumper model (no AHC)
# DZ crane: jumper with active heave compensation offset
crane_configuration:
  SZ:
    radius_m: 18.0
    swl_te: 77.5
    ddf: 1.3
  DZ:
    radius_m: 12.0
    swl_te: 100.0
    ddf: 1.3
    ahc_offset: true                   # Active heave compensation ON for DZ

jumper:
  config_name: "ballymore_plet_plem"
  # TODO: Verify segment lengths from SZ_Ballymore_Jumper_MF.xlsm
  # Using MF-PLET baseline until workbook is converted
  seg_a_inch: 336.0
  seg_b_inch: 160.0
  seg_c_inch: 525.0
  seg_d_inch: 1046.3
  seg_e_inch: 370.0
  seg_f_inch: 160.0
  seg_g_inch: 352.0
  connector_weight_kg: 1678.5
  connector_length_m: 1.3
  clamp_weight_kg: 260.0
  clamp_wll_te: 15.0
